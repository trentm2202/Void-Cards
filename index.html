        <div style={{background:"linear-gradient(135deg,#0f0a1e,#1e0a3c)",border:"1px solid #4c1d9555",borderRadius:16,padding:24}}>
          {/* Mode toggle */}
          <div style={{display:"flex",background:"#0f172a",borderRadius:10,padding:3,marginBottom:20}}>
            {["login","signup"].map(m=>(
              <button key={m} onClick={()=>{setMode(m);setError("");}} style={{flex:1,background:mode===m?"linear-gradient(135deg,#7c3aed,#a855f7)":"transparent",color:mode===m?"white":"#475569",border:"none",borderRadius:8,padding:"8px",fontWeight:700,fontSize:12,cursor:"pointer",transition:"all .2s"}}>
                {m==="login"?"Sign In":"Sign Up"}
              </button>
            ))}
          </div>

          {/* Email */}
          <div style={{marginBottom:12}}>
            <div style={{color:"#64748b",fontSize:11,fontWeight:600,marginBottom:5}}>EMAIL</div>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="commander@galaxy.com"
              style={{width:"100%",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:"11px 14px",color:"white",fontSize:13,boxSizing:"border-box"}}
              onKeyDown={e=>e.key==="Enter"&&submit()}/>
          </div>

          {/* Password */}
          <div style={{marginBottom:16}}>
            <div style={{color:"#64748b",fontSize:11,fontWeight:600,marginBottom:5}}>PASSWORD</div>
            <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="Min 6 characters"
              style={{width:"100%",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:"11px 14px",color:"white",fontSize:13,boxSizing:"border-box"}}
              onKeyDown={e=>e.key==="Enter"&&submit()}/>
          </div>

          {/* Error */}
          {error&&<div style={{background:"#1a0000",border:"1px solid #ef444455",borderRadius:8,padding:"10px 12px",color:"#ef4444",fontSize:12,marginBottom:14}}>{error}</div>}

          {/* Submit */}
          <button onClick={submit} disabled={loading} style={{width:"100%",background:loading?"#1e293b":"linear-gradient(135deg,#7c3aed,#a855f7)",color:"white",border:"none",borderRadius:10,padding:"13px",fontWeight:800,fontSize:14,cursor:loading?"not-allowed":"pointer",boxShadow:loading?"none":"0 0 20px #a855f744",transition:"all .2s"}}>
            {loading?"Connecting...":mode==="login"?"Sign In ✨":"Create Account 🚀"}
          </button>

          {mode==="signup"&&<div style={{color:"#334155",fontSize:11,textAlign:"center",marginTop:12}}>
            Your progress saves automatically to your account across all devices.
          </div>}
          {mode==="login"&&<button onClick={async()=>{
            if(!email){setError("Enter your email above first.");return;}
            setLoading(true);setError("");
            try{
              const r=await fetch(sb._url+"/auth/v1/recover",{method:"POST",headers:sb._h(),body:JSON.stringify({email})});
              setError("✅ Password reset email sent! Check your inbox.");
            }catch(e){setError("Could not send reset email.");}
            setLoading(false);
          }} style={{width:"100%",background:"transparent",color:"#475569",border:"none",fontSize:11,cursor:"pointer",marginTop:10,textDecoration:"underline",padding:"4px"}}>
            Forgot password? Send reset email
          </button>}
        </div>
      </div>
    </div>
  );
}

// ── Responsive hook ───────────────────────────────────────────────────────────
function useWindowWidth(){
  const [w,setW]=useState(typeof window!=="undefined"?window.innerWidth:375);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener("resize",h);
    return ()=>window.removeEventListener("resize",h);
  },[]);
  return w;
}

function App() {
  const [authed,setAuthed]         = useState(false);
  const [cloudSave,setCloudSave]   = useState(null); // loaded save from Supabase
  const [newPlayer,setNewPlayer]   = useState(()=>S.get("newPlayer",true));
  const [coins,setCoins]           = useState(()=>S.get("coins",500));
  const [collection,setCollection] = useState(()=>S.get("collection",[]));
  const [playerXp,setPlayerXp]     = useState(()=>S.get("playerXp",0));
  const [playerLevel,setPlayerLevel]= useState(()=>S.get("playerLevel",1));
  const [wins,setWins]             = useState(()=>S.get("wins",0));
  const [losses,setLosses]         = useState(()=>S.get("losses",0));
  const [totalPacks,setTotalPacks] = useState(()=>S.get("totalPacks",0));
  const [totalSold,setTotalSold]   = useState(()=>S.get("totalSold",0));
  const [newCardIds,setNewCardIds] = useState(()=>new Set(S.get("newCardIds",[])));
  const [streak,setStreak]         = useState(()=>S.get("streak",0));
  const [lastLogin,setLastLogin]   = useState(()=>S.get("lastLogin",""));
  const [dailyGems,setDailyGems]   = useState(()=>S.get("dailyGems",false));
  const [decks,setDecks]           = useState(()=>S.get("decks",[]));
  const [quests,setQuests]         = useState(()=>S.get("quests",null));
  const [questProg,setQuestProg]   = useState(()=>S.get("questProgress",{}));
  const [unlockedAch,setUnlockedAch]=useState(()=>S.get("achievements",[]));
  const [muted,setMuted]           = useState(false);

  const [tab,setTab]               = useState("home");
  const [auctions,setAuctions]     = useState(AUCTION_INIT);
  const [auctionLog,setAuctionLog] = useState([]);
  const [wonAuction,setWonAuction] = useState(null); // card just won
  const [toast,setToast]           = useState(null);
  const [detail,setDetail]         = useState(null);
  const [battleCard,setBattleCard] = useState(null);
  const [openingPack,setOpeningPack]=useState(null);
  const [sellCard,setSellCard]     = useState(null);
  const [deckBuilder,setDeckBuilder]=useState(false);
  const [fusionModal,setFusionModal]=useState(false);
  const [teamBattle,setTeamBattle] =useState(false);
  const [deckBattle,setDeckBattle] =useState(false);
  const [dailyShop,setDailyShop]   =useState(false);
  const [legFlash,setLegFlash]     =useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [sfxVol,setSfxVol]         =useState(()=>S.get("sfxVol",0.5));
  const [teamWins,setTeamWins]       =useState(()=>S.get("teamWins",0));
  const [pullHistory,setPullHistory] =useState(()=>S.get("pullHistory",[]));
  const [packsSinceLeg,setPacksSinceLeg]=useState(()=>S.get("packsSinceLeg",0));
  const [claimedMilestones,setClaimedMilestones]=useState(()=>S.get("claimedMilestones",[]));
  const [binderView,setBinderView] = useState("rarity");
  const [dailyFreePack,setDailyFreePack]=useState(()=>S.get("dailyFreePack",""));
  const [onboardingStep,setOnboardingStep]=useState(()=>S.get("onboardingDone",false)?0:-1);
  const [battleResult,setBattleResult]=useState(null); // {won, xp, coins, cardName}

  useEffect(()=>S.set("coins",coins),[coins]);
  useEffect(()=>S.set("collection",collection),[collection]);
  useEffect(()=>S.set("playerXp",playerXp),[playerXp]);
  useEffect(()=>S.set("playerLevel",playerLevel),[playerLevel]);
  useEffect(()=>S.set("wins",wins),[wins]);
  useEffect(()=>S.set("losses",losses),[losses]);
  useEffect(()=>S.set("totalPacks",totalPacks),[totalPacks]);
  useEffect(()=>S.set("totalSold",totalSold),[totalSold]);
  useEffect(()=>S.set("teamWins",teamWins),[teamWins]);
  useEffect(()=>S.set("pullHistory",pullHistory),[pullHistory]);
  useEffect(()=>S.set("packsSinceLeg",packsSinceLeg),[packsSinceLeg]);
  useEffect(()=>S.set("claimedMilestones",claimedMilestones),[claimedMilestones]);
  useEffect(()=>S.set("dailyFreePack",dailyFreePack),[dailyFreePack]);
  useEffect(()=>S.set("newCardIds",[...newCardIds]),[newCardIds]);
  useEffect(()=>S.set("sfxVol",sfxVol),[sfxVol]);

  // ── Auction house live tick ──────────────────────────────────────────────────
  useEffect(()=>{
    if(tab!=="auction")return;
    const t=setInterval(()=>{
      setAuctions(prev=>prev.map(a=>{
        if(a.secsLeft<=0||a.seller==="You")return a;
        const newSecs=a.secsLeft-1;
        // Rival auto-bid: based on rivalSpeed (lower = more aggressive)
        let newPrice=a.price, newBids=a.bids, rivalBid=null;
        if(newSecs>0 && Math.random()*a.rivalSpeed<1){
          const rival=RIVALS[Math.floor(Math.random()*RIVALS.length)];
          const bump=a.minBid+Math.floor(Math.random()*a.minBid);
          newPrice=a.price+bump;
          newBids=a.bids+1;
          rivalBid={rival,amount:newPrice,cardName:a.card.name};
        }
        if(rivalBid){
          setAuctionLog(l=>[{...rivalBid,ts:Date.now()},...l].slice(0,12));
        }
        // Auction ends
        if(newSecs<=0){
          if(a.playerBid){
            // Player won!
            setWonAuction(a.card);
            setCollection(prev=>[...prev,a.card]);
            setCoins(c=>c-a.price);
            notify(`🏆 Won auction: ${a.card.name}!`,"ach");
            SFX.play("achievement");
          }
        }
        return {...a,secsLeft:newSecs,price:newPrice,bids:newBids};
      }));
    },1000);
    return ()=>clearInterval(t);
  },[tab]);
  useEffect(()=>S.set("streak",streak),[streak]);
  useEffect(()=>S.set("decks",decks),[decks]);
  useEffect(()=>S.set("quests",quests),[quests]);
  useEffect(()=>S.set("questProgress",questProg),[questProg]);
  useEffect(()=>S.set("achievements",unlockedAch),[unlockedAch]);
  useEffect(()=>S.set("newPlayer",newPlayer),[newPlayer]);
  useEffect(()=>{ MUSIC.setTab(tab); },[tab]);
  useEffect(()=>{ if(tab==="collection") setNewCardIds(new Set()); },[tab]);

  // ── Cloud save sync — writes to Supabase every 30s and on key changes ───────
  const getSaveData=()=>({
    coins,collection,playerXp,playerLevel,wins,losses,totalPacks,totalSold,
    streak,lastLogin,dailyGems,decks,quests,questProg,unlockedAch,
    teamWins,pullHistory,packsSinceLeg,claimedMilestones,dailyFreePack,newPlayer,
  });
  useEffect(()=>{
    if(!authed)return;
    const t=setInterval(()=>sb.writeSave(getSaveData()),30000);
    return ()=>clearInterval(t);
  },[authed,coins,collection,wins,losses]);
  useEffect(()=>{ if(authed) sb.writeSave(getSaveData()); },[coins,wins,collection.length]);

  useEffect(()=>{
    const today=new Date().toDateString();
    if(lastLogin===today)return;
    const yesterday=new Date(Date.now()-86400000).toDateString();
    const ns=lastLogin===yesterday?streak+1:1;
    setStreak(ns);setLastLogin(today);setDailyGems(false);
    S.set("lastLogin",today);S.set("streak",ns);
    const shuffled=[...DAILY_QUESTS_POOL].sort(()=>Math.random()-.5).slice(0,3);
    setQuests(shuffled);setQuestProg({});
    S.set("quests",shuffled);S.set("questProgress",{});
  },[]);

  const checkAch=useCallback((state)=>{
    const newOnes=ACHIEVEMENTS.filter(a=>!unlockedAch.includes(a.id)&&a.check(state));
    if(newOnes.length){
      setUnlockedAch(prev=>[...prev,...newOnes.map(a=>a.id)]);
      SFX.play("achievement");
      newOnes.forEach(a=>notify(`🏆 ${a.name}: ${a.desc}`,"ach"));
    }
  },[unlockedAch]);

  const toastQ={ok:"#14532d|#22c55e",err:"#7f1d1d|#ef4444",ach:"#1c1008|#f59e0b",quest:"#172554|#3b82f6",level:"#2e1065|#a855f7"};
  const notify=(msg,type="ok")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3200); };

  const updateQuest=(type,amount=1)=>{
    if(!quests)return;
    setQuestProg(prev=>{
      const next={...prev};
      quests.forEach(q=>{
        if(q.type===type){
          next[q.id]=(next[q.id]||0)+amount;
          if(next[q.id]>=q.target&&!(prev[q.id]>=q.target)){
            setCoins(c=>{S.set("coins",c+q.reward);return c+q.reward;});
            SFX.play("coin");
            notify(`✅ Quest: ${q.desc} +${q.reward}💎`,"quest");
          }
        }
      });
      return next;
    });
  };

  const buyPack=p=>{ if(coins<p.price){notify("Not enough credits!","err");return;} setCoins(c=>c-p.price); setOpeningPack(p); };

  const COLLECTION_MILESTONES=[
    {count:10,  reward:200,  label:"First 10!"},
    {count:25,  reward:400,  label:"Quarter Century"},
    {count:50,  reward:800,  label:"Halfway There"},
    {count:75,  reward:1200, label:"Almost Complete"},
    {count:100, reward:2500, label:"Full Collection!"},
  ];

  // ── Player XP helper ──────────────────────────────────────────────────────
  const XP_PER_LEVEL=500;
  const givePlayerXp=(amount)=>{
    setPlayerXp(prev=>{
      const newXp=prev+amount;
      const curLv=playerLevel;
      const newLv=Math.floor(newXp/XP_PER_LEVEL)+1;
      if(newLv>curLv){
        setPlayerLevel(newLv);
        SFX.play("levelUp");
        notify("⬆️ Player Level "+newLv+"! You're growing stronger, Commander!","ach");
      }
      return newXp;
    });
  };

  const onCardsEarned=cards=>{
    const newCollection=[...collection,...cards];
    setCollection(newCollection);
    // Mark newly pulled cards as "new" — cleared when user visits binder
    const existingIds=new Set(collection.map(c=>c.id));
    const brandNew=cards.filter(c=>!existingIds.has(c.id)).map(c=>c.id);
    if(brandNew.length>0) setNewCardIds(prev=>new Set([...prev,...brandNew]));
    setTotalPacks(t=>t+1);
    updateQuest("cards",cards.length);
    updateQuest("packs",1);

    // XP for opening a pack
    givePlayerXp(50);

    // Pull history — keep last 50 entries
    const date=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
    const newPulls=cards.map(c=>({name:c.name,rarity:c.rarity,type:c.type,color:c.color,date,packName:openingPack?.name||"Pack"}));
    setPullHistory(prev=>[...newPulls,...prev].slice(0,50));

    // Guaranteed Legendary tracker
    const hasLeg=cards.some(c=>c.rarity==="Legendary");
    if(hasLeg){
      setPacksSinceLeg(0);
    } else {
      setPacksSinceLeg(prev=>{
        const next=prev+1;
        if(next>=20){
          const legs=ALL_CARDS.filter(c=>c.rarity==="Legendary");
          const free=legs[Math.floor(Math.random()*legs.length)];
          setCollection(p=>[...p,free]);
          notify("🌟 Guaranteed Legendary! "+free.name+" added!","ach");
          SFX.play("legendaryReveal");
          setLegFlash(true);setTimeout(()=>setLegFlash(false),1000);
          return 0;
        }
        return next;
      });
    }

    // Collection milestones
    const uniqueBefore=new Set(collection.map(c=>c.id)).size;
    const uniqueAfter=new Set(newCollection.map(c=>c.id)).size;
    COLLECTION_MILESTONES.forEach(m=>{
      if(uniqueBefore<m.count&&uniqueAfter>=m.count&&!claimedMilestones.includes(m.count)){
        setClaimedMilestones(prev=>[...prev,m.count]);
        setCoins(c=>c+m.reward);
        notify("🎉 Milestone: "+m.label+"! +"+m.reward+" 💎","ach");
        SFX.play("achievement");
      }
    });

    checkAch({collection:newCollection,wins,coins,streak,cardLevels,decks,totalSold});
  };

  const onWin=cardId=>{
    const nw=wins+1; setWins(nw); setCoins(c=>c+150); SFX.play("coin");
    givePlayerXp(120);
    updateQuest("wins",1);
    checkAch({collection,wins:nw,coins:coins+150,streak,cardLevels:{},decks,totalSold});
    setBattleResult({won:true,xp:120,coins:150,cardName:ALL_CARDS.find(c=>c.id===cardId)?.name||""});
  };

  const onLoss=cardId=>{
    setLosses(l=>l+1);
    givePlayerXp(40);
    setBattleResult({won:false,xp:40,coins:0,cardName:ALL_CARDS.find(c=>c&&c.id===cardId)?.name||""});
  };

  // Daily free pack helpers
  const todayStr=()=>new Date().toISOString().slice(0,10);
  const canClaimFreePack=dailyFreePack!==todayStr();
  const freePackCountdown=()=>{
    const now=new Date();
    const tomorrow=new Date(now); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(0,0,0,0);
    const diff=tomorrow-now;
    const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000);
    return h+"h "+m+"m";
  };
  const claimFreePack=()=>{
    setDailyFreePack(todayStr());
    setOpeningPack(PACKS[0]);
    SFX.play("click");
    notify("🎁 Daily free pack claimed!","ach");
  };

  const claimDaily=()=>{
    const bonus=streak>=7?300:streak>=3?200:150;
    setCoins(c=>c+bonus);setDailyGems(true);S.set("dailyGems",true);
    SFX.play("daily");
    notify(`💎 Daily: +${bonus} gems! (${streak}🔥 streak)`);
    checkAch({collection,wins,coins:coins+bonus,streak,cardLevels,decks,totalSold});
  };

  const bid=(item,bump)=>{
    const newPrice=item.price+(bump||item.minBid||50);
    if(coins<newPrice){notify("Not enough gems!","err");return;}
    SFX.play("coin");
    // Deduct the difference from previous player bid if any
    const prevBid=item.playerBid?item.price:0;
    setCoins(c=>c-(newPrice-prevBid));
    setAuctions(prev=>prev.map(a=>a.id===item.id
      ?{...a,price:newPrice,bids:a.bids+1,playerBid:true,lastBidder:"You",
         secsLeft:a.secsLeft<30?30:a.secsLeft}
      :a));
    setAuctionLog(l=>[{rival:"You",amount:newPrice,cardName:item.card.name,ts:Date.now(),isPlayer:true},...l].slice(0,12));
    updateQuest("bids",1);
    notify(`⚔️ Bid 💎${newPrice} on ${item.card.name}`);
  };

  const doSell=(card,price)=>{
    setCollection(prev=>{const idx=prev.findIndex(c=>c.id===card.id);if(idx===-1)return prev;const n=[...prev];n.splice(idx,1);return n;});
    setCoins(c=>c+price);
    setAuctions(prev=>[...prev,{id:Date.now(),card,seller:"You",price,timeLeft:"24h",bids:0,isPlayer:true}]);
    setTotalSold(t=>t+1);setSellCard(null);
    SFX.play("sell");
    notify(`${card.name} listed for 💎 ${price}!`);
    checkAch({collection,wins,coins:coins+price,streak,cardLevels,decks,totalSold:totalSold+1});
  };

  const convertDupes=()=>{
    const counts={};collection.forEach(c=>{counts[c.id]=(counts[c.id]||0)+1;});
    const gv={Legendary:500,Epic:150,Rare:50,Uncommon:15,Common:5};
    let earned=0;let kept=[...collection];
    Object.entries(counts).forEach(([id,cnt])=>{
      if(cnt>1){const card=ALL_CARDS.find(c=>c.id===parseInt(id));const ex=cnt-1;
        for(let i=0;i<ex;i++){const idx=kept.findIndex(c=>c.id===parseInt(id));kept.splice(idx,1);}
        earned+=ex*(gv[card.rarity]||5);}
    });
    if(earned===0){notify("No duplicates to convert!","err");return;}
    setCollection(kept);setCoins(c=>c+earned);SFX.play("coin");
    notify(`Converted duplicates → +💎 ${earned}!`);
  };

  const rarityOrder=["Legendary","Epic","Rare","Uncommon","Common"];
  const sorted=[...collection].sort((a,b)=>rarityOrder.indexOf(a.rarity)-rarityOrder.indexOf(b.rarity));
  const countById={};collection.forEach(c=>{countById[c.id]=(countById[c.id]||0)+1;});
  const unique=[...new Map(sorted.map(c=>[c.id,c])).values()];
  const groupCards=(key,vals)=>{const g={};vals.forEach(v=>{const k=v[key];if(!g[k])g[k]=[];if(!g[k].find(x=>x.id===v.id))g[k].push(v);});return g;};

  const renderGroup=cards=>(
    <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
      {cards.map((c,i)=>(
        <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
          <Card card={c} onClick={setDetail} count={countById[c.id]} level={1}/>
          {countById[c.id]>1&&<button onClick={()=>{SFX.play("click");setSellCard(c);}} style={{background:"linear-gradient(135deg,#059669,#10b981)",color:"white",border:"none",borderRadius:6,padding:"5px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>💰 Sell</button>}
        </div>
      ))}
    </div>
  );

  const renderBinder=()=>{
    if(!unique.length)return <div style={{textAlign:"center",color:"#334155",paddingTop:60}}><div style={{fontSize:48}}>🌌</div><div style={{marginTop:12}}>No cards yet — visit the Shop!</div></div>;
    if(binderView==="rarity")return rarityOrder.map(r=>{const cs=unique.filter(c=>c.rarity===r);if(!cs.length)return null;const rc=RC[r];return <div key={r} style={{marginBottom:26}}><div style={{color:rc.color,fontSize:11,fontWeight:700,letterSpacing:2,marginBottom:10}}>{"★".repeat(rc.stars)} {r.toUpperCase()} ({cs.length})</div>{renderGroup(cs)}</div>;});
    if(binderView==="series"){const g=groupCards("series",unique);return["Series 1"].map(s=>{const cs=g[s];if(!cs?.length)return null;return <div key={s} style={{marginBottom:26}}><div style={{color:"#a855f7",fontSize:11,fontWeight:700,letterSpacing:2,marginBottom:10}}>📀 {s.toUpperCase()} ({cs.length}/{ALL_CARDS.filter(c=>c.series===s).length})</div>{renderGroup(cs)}</div>;});}
    if(binderView==="type"){const g=groupCards("type",unique);return["Alien","Robot"].map(t=>{const cs=g[t];if(!cs?.length)return null;return <div key={t} style={{marginBottom:26}}><div style={{color:"#06b6d4",fontSize:11,fontWeight:700,letterSpacing:2,marginBottom:10}}>{t==="Alien"?"👽":"🤖"} {t.toUpperCase()} ({cs.length}/{ALL_CARDS.filter(c=>c.type===t).length})</div>{renderGroup(cs)}</div>;});}
  };

  const TABS=[{id:"home",l:"Home",i:"🌌"},{id:"collection",l:"Binder",i:"📦"},{id:"battle",l:"Battle",i:"⚔️"},{id:"fusion",l:"Fusion",i:"✨"},{id:"quests",l:"Quests",i:"🎯"},{id:"auction",l:"Auction House",i:"⚖️"},{id:"profile",l:"Profile",i:"👤"}];
  const winW=useWindowWidth();
  const isDesktop=winW>=860;

  const onAuth=(save)=>{
    setAuthed(true);
    if(save){
      // Load cloud save into state
      if(save.coins!=null) setCoins(save.coins);
      if(save.collection) setCollection(save.collection);
      if(save.playerXp!=null) setPlayerXp(save.playerXp);
      if(save.playerLevel!=null) setPlayerLevel(save.playerLevel);
      if(save.wins!=null) setWins(save.wins);
      if(save.losses!=null) setLosses(save.losses);
      if(save.totalPacks!=null) setTotalPacks(save.totalPacks);
      if(save.totalSold!=null) setTotalSold(save.totalSold);
      if(save.streak!=null) setStreak(save.streak);
      if(save.decks) setDecks(save.decks);
      if(save.quests) setQuests(save.quests);

            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <span style={{color:"#94a3b8",fontSize:13}}>Music & SFX</span>
              <button onClick={()=>{const m=SFX.toggle();MUSIC.toggle();setMuted(m);}} style={{background:muted?"#1e293b":"linear-gradient(135deg,#7c3aed,#a855f7)",color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>{muted?"Off":"On"}</button>
            </div>
          </div>

          {/* Stats */}
          <div style={{background:"linear-gradient(135deg,#0f172a,#1e0a3c)",border:"1px solid #2e1065",borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{color:"#a855f7",fontWeight:700,marginBottom:12}}>📊 Game Stats</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{l:"Cards Owned",v:unique.length},{l:"Packs Opened",v:totalPacks},{l:"Total Wins",v:wins},{l:"Login Streak",v:`${streak}d`}].map((s,i)=>(
                <div key={i} style={{background:"#0f172a",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{color:"white",fontWeight:700,fontSize:14}}>{s.v}</div>
                  <div style={{color:"#475569",fontSize:10}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Version */}
          <div style={{textAlign:"center",color:"#1e293b",fontSize:10,marginTop:8}}>
            Void Cards · Series 1 · v1.0
          </div>
          {authed&&<button onClick={async()=>{await sb.signOut();setAuthed(false);setShowSettings(false);}} style={{width:"100%",background:"#0f172a",color:"#475569",border:"1px solid #1e293b",borderRadius:10,padding:"11px",fontWeight:700,fontSize:13,cursor:"pointer",marginTop:10}}>
            🚪 Sign Out
          </button>}
        </div>
      </Modal>}
      {sellCard&&<SellModal card={sellCard} onClose={()=>setSellCard(null)} onSell={doSell}/>}
      {deckBuilder&&<DeckBuilderModal collection={unique} cardLevels={cardLevels} onSave={d=>{SFX.play("achievement");setDecks(p=>[...p,d]);setDeckBuilder(false);notify(`Deck "${d.name}" saved!`);checkAch({collection,wins,coins,streak,cardLevels,decks:[...decks,d],totalSold});}} onClose={()=>setDeckBuilder(false)}/>}
      {dailyShop&&<DailyShopModal collection={collection} coins={coins} packsSinceLeg={packsSinceLeg} onBuyPack={p=>{buyPack(p);setDailyShop(false);}} onBuy={(card,price)=>{setCoins(c=>c-price);setCollection(prev=>[...prev,card]);SFX.play("coin");notify(`${card.name} added to collection!`,"ach");setDailyShop(false);}} onClose={()=>setDailyShop(false)}/>}
      {deckBattle&&<DeckBattleModal collection={collection} cardLevels={cardLevels} coins={coins} onClose={()=>setDeckBattle(false)} onWin={()=>{const nw=wins+1;setWins(nw);setCoins(c=>c+500);SFX.play("coin");notify("⚔️ Deck Victory! +500 💎","ach");updateQuest("wins",1);checkAch({collection,wins:nw,coins:coins+500,streak,cardLevels,decks,totalSold,teamWins});}} onLose={()=>{onLoss(null);}}/>}
      {fusionModal&&<FusionModal collection={collection} cardLevels={cardLevels} onFuse={(foilCard,orig)=>{
        let removed=0;
        const newColl=collection.filter(c=>{ if(c.id===orig.id&&!c.foil&&removed<3){removed++;return false;} return true; });
        setCollection([...newColl,foilCard]);
        SFX.play("achievement");
        notify(`✨ ${foilCard.name} Foil forged!`,"ach");
        updateQuest("fuse",1);
        checkAch({collection:[...newColl,foilCard],wins,coins,streak,cardLevels,decks,totalSold});
      }} onClose={()=>setFusionModal(false)}/>}
      {teamBattle&&<TeamBattleModal collection={collection} cardLevels={cardLevels} onTeamWin={()=>{
        const nw=wins+1; setWins(nw); setTeamWins(t=>t+1); setCoins(c=>c+300); SFX.play("coin");
        notify("🏆 Team Victory! +300 💎","ach");
        updateQuest("wins",1);
        checkAch({collection,wins:nw,coins:coins+300,streak,cardLevels,decks,totalSold,teamWins:teamWins+1});
      }} onClose={()=>setTeamBattle(false)}/>}
      {/* Battle Result Overlay */}
      {battleResult&&<div style={{position:"fixed",inset:0,zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",background:"#000000cc",backdropFilter:"blur(8px)"}}>
        <div style={{background:battleResult.won?"linear-gradient(135deg,#052e16,#14532d)":"linear-gradient(135deg,#1a0000,#7f1d1d)",border:"2px solid "+(battleResult.won?"#22c55e":"#ef4444"),borderRadius:20,padding:32,textAlign:"center",maxWidth:300,width:"90%",boxShadow:"0 0 60px "+(battleResult.won?"#22c55e44":"#ef444444"),animation:"fadeIn .4s ease-out"}}>
          <div style={{fontSize:56,marginBottom:8}}>{battleResult.won?"🏆":"💀"}</div>
          <div style={{color:battleResult.won?"#22c55e":"#ef4444",fontWeight:900,fontSize:24,marginBottom:4}}>{battleResult.won?"Victory!":"Defeated"}</div>
          <div style={{color:"#94a3b8",fontSize:13,marginBottom:20}}>{battleResult.won?"Well fought, Commander":"You fought bravely"}</div>
          <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:24}}>
            <div style={{background:"#ffffff08",borderRadius:10,padding:"10px 16px",textAlign:"center"}}>
              <div style={{color:"#60a5fa",fontWeight:900,fontSize:18}}>+{battleResult.xp}</div>
              <div style={{color:"#475569",fontSize:10}}>XP</div>
            </div>
            {battleResult.coins>0&&<div style={{background:"#ffffff08",borderRadius:10,padding:"10px 16px",textAlign:"center"}}>
              <div style={{color:"#c084fc",fontWeight:900,fontSize:18}}>+{battleResult.coins}</div>
              <div style={{color:"#475569",fontSize:10}}>💎 Gems</div>
            </div>}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setBattleResult(null);setBattleCard(null);}} style={{flex:1,background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:10,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>← Back</button>
            <button onClick={()=>{setBattleResult(null);}} style={{flex:1,background:battleResult.won?"linear-gradient(135deg,#15803d,#22c55e)":"linear-gradient(135deg,#991b1b,#ef4444)",color:"white",border:"none",borderRadius:10,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>⚔️ Again</button>
          </div>
        </div>
      </div>}

      {/* Onboarding Overlay — only shows on first visit, step by step */}
      {onboardingStep===-1&&collection.length===0&&<div style={{position:"fixed",inset:0,zIndex:5000,display:"flex",alignItems:"center",justifyContent:"center",background:"#000000ee",backdropFilter:"blur(10px)"}}>
        <div style={{background:"linear-gradient(135deg,#0f0a1e,#1e0a3c)",border:"1px solid #7c3aed55",borderRadius:20,padding:32,maxWidth:320,width:"90%",textAlign:"center",animation:"fadeIn .5s ease-out"}}>
          <div style={{fontSize:52,marginBottom:12}}>🌌</div>
          <div style={{color:"#a855f7",fontSize:9,letterSpacing:4,fontWeight:800,marginBottom:8}}>WELCOME COMMANDER</div>
          <div style={{color:"white",fontWeight:900,fontSize:20,marginBottom:10}}>Your first mission</div>
          <div style={{color:"#64748b",fontSize:13,lineHeight:1.7,marginBottom:24}}>
            Open your free Starter Pack to begin your collection. Then head to Battle to test your cards. Complete Quests to earn gems and grow stronger.
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {[{i:"🎁",t:"Open your free daily pack",s:"Home screen · claim it now"},
              {i:"⚔️",t:"Battle with your cards",s:"Battle tab · pick a card to fight"},
              {i:"🎯",t:"Complete daily quests",s:"Quests tab · earn bonus gems"}
            ].map((step,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:"#ffffff06",borderRadius:10,padding:"10px 14px",textAlign:"left"}}>
                <span style={{fontSize:20,flexShrink:0}}>{step.i}</span>
                <div>
                  <div style={{color:"white",fontWeight:700,fontSize:12}}>{step.t}</div>
                  <div style={{color:"#475569",fontSize:10}}>{step.s}</div>
                </div>
              </div>
            ))}
          </div>
          <button onClick={()=>{setOnboardingStep(0);S.set("onboardingDone",true);SFX.play("click");}} style={{width:"100%",background:"linear-gradient(135deg,#7c3aed,#a855f7)",color:"white",border:"none",borderRadius:12,padding:"14px",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 0 20px #a855f744"}}>
            Let's Go! 🚀
          </button>
        </div>
      </div>}

      </div>{/* end zIndex content wrapper */}
      </div>{/* end main column */}
      </div>{/* end body flex */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
</html>
