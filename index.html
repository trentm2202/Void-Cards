// ── Sound Engine ──────────────────────────────────────────────────────────────
const SFX = {
  _ctx: null,
  _muted: false,
  ctx() { if (!this._ctx) this._ctx = new (window.AudioContext||window.webkitAudioContext)(); return this._ctx; },
  play(type) {
    if (this._muted) return;
    try {
      const ctx = this.ctx();
      const t = ctx.currentTime;
      const osc = (freq, type2="sine", start=0, dur=0.2, vol=0.15) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = type2; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, t+start);
        g.gain.exponentialRampToValueAtTime(0.001, t+start+dur);
        o.start(t+start); o.stop(t+start+dur+0.01);
        return o;
      };
      const noise = (dur=0.2, vol=0.15, hpFreq=500) => {
        const buf = ctx.createBuffer(1, ctx.sampleRate*dur, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
        const src = ctx.createBufferSource(); src.buffer = buf;
        const g = ctx.createGain(); g.gain.value = vol;
        const f = ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=hpFreq;
        src.connect(f); f.connect(g); g.connect(ctx.destination); src.start();
      };
      const sweep = (f1,f2,type2="sine",dur=0.15,vol=0.15,start=0) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type=type2; o.frequency.setValueAtTime(f1,t+start);
        o.frequency.exponentialRampToValueAtTime(f2,t+start+dur);
        g.gain.setValueAtTime(vol,t+start);
        g.gain.exponentialRampToValueAtTime(0.001,t+start+dur);
        o.start(t+start); o.stop(t+start+dur+0.01);
      };
      ({
        packCrinkle: ()=>{ noise(0.35,0.2,3500); noise(0.2,0.1,1200); },
        cardFlip:    ()=>{ sweep(900,180,"sine",0.1,0.12); },
        rareFlip:    ()=>{ sweep(700,1400,"sine",0.08,0.1); sweep(1400,700,"sine",0.08,0.08,0.08); },
        epicFlip:    ()=>{ [0,0.06,0.12].forEach((s,i)=>osc(500+i*150,"sine",s,0.15,0.12)); },
        legendaryReveal: ()=>{ [523,659,784,1047,1568].forEach((f,i)=>osc(f,"triangle",i*0.1,0.5,0.18)); },
        hit:         ()=>{ sweep(180,40,"sawtooth",0.1,0.3); noise(0.05,0.1,400); },
        specialHit:  ()=>{ noise(0.2,0.25,2000); sweep(300,1200,"square",0.15,0.12); },
        win:         ()=>{ [[523,0],[659,0.1],[784,0.2],[1047,0.32],[784,0.42],[1047,0.52]].forEach(([f,s])=>osc(f,"triangle",s,0.28,0.18)); },
        lose:        ()=>{ [380,280,180].forEach((f,i)=>osc(f,"sine",i*0.18,0.4,0.14)); },
        levelUp:     ()=>{ [350,450,570,720,900,1200].forEach((f,i)=>osc(f,"sine",i*0.07,0.35,0.16)); },
        coin:        ()=>{ sweep(880,1760,"sine",0.08,0.18); sweep(1760,2200,"sine",0.06,0.1,0.08); },
        achievement: ()=>{ [784,988,1175,1568,2093].forEach((f,i)=>osc(f,"triangle",i*0.07,0.45,0.15)); },
        click:       ()=>{ osc(600,"sine",0,0.06,0.06); },
        bid:         ()=>{ sweep(400,600,"sine",0.08,0.1); },
        sell:        ()=>{ sweep(600,900,"sine",0.08,0.12); osc(1200,"sine",0.1,0.15,0.08); },
        daily:       ()=>{ [440,550,660,880].forEach((f,i)=>osc(f,"sine",i*0.09,0.3,0.15)); },
      })[type]?.();
    } catch(e){}
  },
  toggle() { this._muted = !this._muted; return this._muted; }
};

function CardIllustration({ card, w=140, h=160 }) {
  const c = card.foil?"#f59e0b":card.color;
  const id = card.id;
  const rr = (n) => ((id*n*1664525+1013904223)&0x7fffffff)/0x7fffffff;

  const isKnight = card.type==="Knight";
  const isMage   = card.type==="Mage";
  const isDragon = card.type==="Dragon";
  const isBeast  = card.type==="Beast";

  const isEpic = card.rarity==="Epic";
  const isRare = card.rarity==="Rare";

  const bodyStyle    = id % 5;   // 0-4
  const eyeStyle     = id % 4;   // 0-3

  const bgVariant    = id % 3;   // 0-2

        <radialGradient id={`gl${id}`} cx="50%" cy="55%">

// ── Holographic Frame ─────────────────────────────────────────────────────────
function HoloFrame({ card, w, h, hov }) {
  const c=RC[card.rarity].color, isLeg=card.rarity==="Legendary", isEpic=card.rarity==="Epic", isRare=card.rarity==="Rare";
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{position:"absolute",top:0,left:0,pointerEvents:"none",borderRadius:14}}>
      <defs>
        <linearGradient id={`hf${card.id}`} x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stopColor={c} stopOpacity={hov?.95:.55}/>
          <stop offset="35%"  stopColor="white" stopOpacity={hov?.35:.1}/>
          <stop offset="65%"  stopColor={c} stopOpacity={hov?.75:.32}/>
          <stop offset="100%" stopColor={c} stopOpacity={hov?.95:.55}/>
        </linearGradient>
      </defs>
      <rect x="1.5" y="1.5" width={w-3} height={h-3} rx="13" fill="none" stroke={`url(#hf${card.id})`} strokeWidth={isLeg?3:isEpic?2.5:isRare?2:1.5}/>
      {(isLeg||isEpic) && <rect x="4" y="4" width={w-8} height={h-8} rx="11" fill="none" stroke={c} strokeWidth="0.7" opacity={hov?.55:.22}/>}
      {isLeg && <>
        {[[5,5,1,1],[w-5,5,-1,1],[5,h-5,1,-1],[w-5,h-5,-1,-1]].map(([cx,cy,sx,sy],i)=>(
          <g key={i}>
            <line x1={cx} y1={cy} x2={cx+sx*14} y2={cy} stroke={c} strokeWidth="2" opacity={hov?1:.65}/>
            <line x1={cx} y1={cy} x2={cx} y2={cy+sy*14} stroke={c} strokeWidth="2" opacity={hov?1:.65}/>
            <circle cx={cx} cy={cy} r="3.5" fill={c} opacity={hov?1:.8}/>
          </g>
        ))}
        <polygon points={`${w/2},3 ${w/2+7},10 ${w/2},14 ${w/2-7},10`} fill={c} opacity={hov?1:.8}/>
        <polygon points={`${w/2},3 ${w/2+4},9  ${w/2},12 ${w/2-4},9`}  fill="white" opacity=".4"/>
        <polygon points={`${w/2},${h-3} ${w/2+7},${h-10} ${w/2},${h-14} ${w/2-7},${h-10}`} fill={c} opacity={hov?1:.8}/>
        <circle cx={4}   cy={h/2} r="3" fill={c} opacity={hov?.9:.6}/>
        <circle cx={w-4} cy={h/2} r="3" fill={c} opacity={hov?.9:.6}/>
      </>}
      {isEpic && <>
        <polygon points={`${w/2},4 ${w/2+5},10 ${w/2},15 ${w/2-5},10`} fill={c} opacity={hov?.9:.55}/>
        <polygon points={`${w/2},${h-4} ${w/2+5},${h-10} ${w/2},${h-15} ${w/2-5},${h-10}`} fill={c} opacity={hov?.9:.55}/>
      </>}
      {isRare && [[6,6],[w-6,6],[6,h-6],[w-6,h-6]].map(([cx,cy],i)=>(
        <circle key={i} cx={cx} cy={cy} r="2.5" fill={c} opacity={hov?.7:.4}/>
      ))}
    </svg>
  );
}

// ── Card Component ────────────────────────────────────────────────────────────
function Card({ card, onClick, mini, selected, showHp, currentHp, count, level }) {
  const [hov,setHov]=useState(false);
  const isFoil=card.foil;
  const rc=isFoil?{color:"#f59e0b",bg:"#1c1008",stars:5}:RC[card.rarity];
  const w=mini?112:162, h=mini?168:248;
  const imgW=mini?100:150, imgH=mini?88:128;
  const isHov=hov||selected;
  const lv=level||1;
  const effP=card.power+(lv-1)*8+(isFoil?Math.round(card.power*.2):0);
  const effD=card.defense+(lv-1)*5+(isFoil?Math.round(card.defense*.2):0);
  const effH=card.hp+(lv-1)*15+(isFoil?Math.round(card.hp*.2):0);
  const isLeg=card.rarity==="Legendary"||isFoil;
  const isEpic=card.rarity==="Epic";
  const hpPct=showHp?Math.max(0,(currentHp??effH)/effH*100):100;
  // Breathing animation for all cards
  const breatheAnim=!mini?"cardBreathe 4s ease-in-out infinite":undefined;

  return (
    <div onClick={()=>{onClick&&onClick(card);if(onClick)SFX.play("click");}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{width:w,flexShrink:0,cursor:onClick?"pointer":"default",position:"relative",
        transition:"transform .2s,box-shadow .2s",
        transform:isHov?"translateY(-7px) scale(1.04)":"none",
        boxShadow:isHov?`0 18px 48px ${rc.color}66,0 0 30px ${rc.color}44`:`0 4px 14px #00000077${isFoil?",0 0 18px #f59e0b33":""}`,
        borderRadius:14,WebkitTapHighlightColor:"transparent",
        animation:breatheAnim}}>
      <div style={{width:w,height:h,background:isFoil?`linear-gradient(160deg,#1c0a00,#2d1a00,#1c0a00)`:`linear-gradient(160deg,#0f172a,${rc.bg},#000)`,borderRadius:14,padding:"5px 5px 7px",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,borderRadius:14,background:`radial-gradient(ellipse at 50% 28%, ${rc.color}${isFoil?"28":"14"},transparent 65%)`,pointerEvents:"none"}}/>
        {/* Legendary golden flare sweep */}

// ── Dramatic Pack Opening ─────────────────────────────────────────────────────
function PackModal({ pack, onClose, onEarn, onLegendary }) {
  const [phase, setPhase] = useState("sealed");
  const [cards, setCards] = useState([]);
  const [revealed, setRevealed] = useState([]);
  const [spotlightIdx, setSpotlightIdx] = useState(-1); // card being dramatically revealed
  const [allDone, setAllDone] = useState(false);
  const [claimed, setClaimed] = useState(false);

  const RARITY_DELAY = {Legendary:1000, Epic:700, Rare:550, Uncommon:400, Common:300};
  const RARITY_GLOW  = {Legendary:"#f59e0b",Epic:"#a855f7",Rare:"#3b82f6",Uncommon:"#22c55e",Common:"#94a3b8"};

  const open = () => {
    SFX.play("packCrinkle");
    // Each slot has a small upgrade chance — any slot can pop off
    const upgradeChance = {Common:0.03, Uncommon:0.05, Rare:0.08, Epic:0.12, Legendary:1};
    const rarityUpgrade = {Common:"Uncommon", Uncommon:"Rare", Rare:"Epic", Epic:"Legendary"};
    const drawn = pack.rarities.map(r=>{
      let finalRarity = r;
      // Roll for upgrade — each tier can upgrade to next
      while(finalRarity !== "Legendary" && Math.random() < upgradeChance[finalRarity]) {
        finalRarity = rarityUpgrade[finalRarity];
      }
      const opts=ALL_CARDS.filter(c=>c.rarity===finalRarity);
      return opts[Math.floor(Math.random()*opts.length)];
    });
    setCards(drawn);
    setPhase("tearing");
    setTimeout(()=>{ setPhase("reveal"); revealOne(drawn, 0); }, 1000);
  };

  const revealOne = (cardList, idx) => {
    if(idx >= cardList.length){ setAllDone(true); return; }
    const card = cardList[idx];
    const delay = RARITY_DELAY[card.rarity]||700;
    setSpotlightIdx(idx);
    setTimeout(()=>{
      const sfx={Legendary:"legendaryReveal",Epic:"epicFlip",Rare:"rareFlip",Uncommon:"cardFlip",Common:"cardFlip"}[card.rarity]||"cardFlip";
      SFX.play(sfx);
      if(card.rarity==="Legendary") onLegendary?.();
      setRevealed(r=>[...r, idx]);
      setSpotlightIdx(-1);
      setTimeout(()=>revealOne(cardList, idx+1), 300);
    }, delay);
  };

  const rc = spotlightIdx>=0 ? RARITY_GLOW[cards[spotlightIdx]?.rarity]||"#a855f7" : "#a855f7";

  return (
    <Modal onClose={onClose} title={`${pack.name} ${pack.icon}`}>
      <div style={{textAlign:"center",maxWidth:700,margin:"0 auto"}}>

        {phase==="sealed"&&<>
          <div style={{fontSize:96,marginBottom:16,animation:"float 2s ease-in-out infinite",filter:"drop-shadow(0 0 28px #a855f766)"}}>{pack.icon}</div>
          <div style={{color:"white",fontSize:22,fontWeight:900,marginBottom:4,letterSpacing:-.5}}>{pack.name}</div>
          <div style={{color:"#64748b",marginBottom:3,fontSize:13}}>{pack.rarities.length} cards · {pack.guaranteed}</div>
          <div style={{color:"#a855f7",fontWeight:900,fontSize:22,marginBottom:28,textShadow:"0 0 16px #a855f7"}}>💎 {pack.price}</div>
          <button onClick={open} style={{background:"linear-gradient(135deg,#4c1d95,#7c3aed,#a855f7)",color:"white",border:"none",borderRadius:14,padding:"18px 48px",fontSize:19,fontWeight:800,cursor:"pointer",width:"100%",maxWidth:300,boxShadow:"0 8px 32px #7c3aed55",letterSpacing:.5}}>✨ Open Pack!</button>
        </>}

        {phase==="tearing"&&<>
          <div style={{fontSize:96,marginBottom:20,animation:"shake .08s infinite",filter:"drop-shadow(0 0 40px #a855f7)"}}>{pack.icon}</div>
          <div style={{color:"#a855f7",fontSize:18,fontWeight:800,animation:"pulse .3s infinite",letterSpacing:2}}>OPENING...</div>
          <div style={{marginTop:16,display:"flex",justifyContent:"center",gap:6}}>
            {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#7c3aed",animation:`pulse .6s ${i*.15}s infinite`}}/>)}
          </div>
        </>}

        {phase==="reveal"&&<>
          {/* Spotlight glow behind current reveal */}
          {spotlightIdx>=0&&<div style={{position:"fixed",inset:0,background:`radial-gradient(ellipse at center, ${rc}18, transparent 60%)`,pointerEvents:"none",zIndex:0,animation:"legFlash .3s ease-out"}}/>}

          <div style={{color:"#94a3b8",fontSize:12,marginBottom:14,letterSpacing:1}}>
            {!allDone ? `CARD ${revealed.length+1} OF ${cards.length}` : "✨ PACK COMPLETE"}
          </div>

          <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:20}}>
            {cards.map((card,i)=>{
              const isSpot = spotlightIdx===i;
              const isRev  = revealed.includes(i);
              const cg     = RARITY_GLOW[card.rarity];
              return (
                <div key={i} style={{position:"relative",transition:"transform .3s",transform:isSpot?"scale(1.12)":"scale(1)"}}>
                  {/* Waiting slot */}
                  {!isRev&&!isSpot&&<div style={{width:162,height:248,borderRadius:14,background:"linear-gradient(135deg,#0f172a,#1e0a3c)",border:"1px solid #ffffff0a",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{fontSize:32,opacity:.3}}>?</div>
                  </div>}
                  {/* Spotlight glowing back */}
                  {isSpot&&<div style={{width:162,height:248,borderRadius:14,background:`linear-gradient(135deg,${cg}22,${cg}08)`,border:`2px solid ${cg}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 40px ${cg}66, inset 0 0 30px ${cg}22`,animation:"pulse .4s infinite"}}>
                    <div style={{fontSize:40,animation:"float .8s ease-in-out infinite"}}>✨</div>
                  </div>}
                  {/* Revealed card */}
                  {isRev&&<div style={{animation:"flipIn .45s cubic-bezier(.34,1.56,.64,1) both",position:"relative"}}>
                    {card.rarity==="Legendary"&&<div style={{position:"absolute",inset:-6,borderRadius:18,background:cg,opacity:.25,animation:"legendaryShimmer 1.5s ease-in-out infinite",pointerEvents:"none",zIndex:0}}/>}
                    <div style={{position:"relative",zIndex:1}}><Card card={card}/></div>
                    <div style={{textAlign:"center",marginTop:4}}>
                      <span style={{background:RC[card.rarity]?.bg,border:`1px solid ${cg}66`,borderRadius:6,padding:"2px 8px",fontSize:9,color:cg,fontWeight:700}}>{card.rarity}</span>
                    </div>
                  </div>}
                </div>
              );
            })}
          </div>

          {allDone&&<div style={{display:"flex",flexDirection:"column",gap:10,maxWidth:320,margin:"0 auto"}}>
            <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:12,marginBottom:4}}>
              {cards.map((c,i)=>{const cg=RARITY_GLOW[c.rarity];return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:i<cards.length-1?"1px solid #ffffff08":"none"}}>
                <span style={{color:"white",fontSize:12,fontWeight:600}}>{c.name}</span>
                <span style={{color:cg,fontSize:10,fontWeight:700}}>{c.rarity}</span>
              </div>;})}
            </div>
            <button onClick={()=>{if(claimed)return;setClaimed(true);SFX.play("coin");onEarn(cards);onClose();}} disabled={claimed} style={{background:claimed?"#1e293b":"linear-gradient(135deg,#059669,#10b981)",color:"white",border:"none",borderRadius:12,padding:"16px",fontSize:16,fontWeight:800,cursor:claimed?"not-allowed":"pointer",boxShadow:claimed?"none":"0 0 20px #10b98144"}}>✅ Add to Collection</button>
            <button onClick={onClose} style={{background:"#1e293b",color:"#64748b",border:"1px solid #334155",borderRadius:12,padding:"12px",cursor:"pointer",fontSize:13}}>Discard Cards</button>
          </div>}
        </>}
      </div>
    </Modal>
  );
}

// ── Battle ────────────────────────────────────────────────────────────────────
function BattleScreen({ playerCard, cardLevels, onClose, onWin }) {
  const [enemyCard]=useState(()=>ALL_CARDS[Math.floor(Math.random()*ALL_CARDS.length)]);
  const lv=1;
  const maxHp=playerCard.hp+(lv-1)*15;
  const [playerHp,setPlayerHp]=useState(maxHp);
  const [enemyHp,setEnemyHp]=useState(enemyCard.hp);
  const [energy,setEnergy]=useState(1);      // starts at 1, max 5, +1 per turn
  const [log,setLog]=useState([{text:"⚔️ Battle begins! You have 1 ⚡",type:"system"}]);
  const [phase,setPhase]=useState("player");
  const [animating,setAnimating]=useState(false);
  const [dmgPop,setDmgPop]=useState(null);
  const [defending,setDefending]=useState(false);
  const logRef=useRef(null);
  useEffect(()=>{ if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight; },[log]);
  const addLog=(text,type="normal")=>setLog(l=>[...l,{text,type}]);
  const effP=playerCard.power+(lv-1)*8, effD=playerCard.defense+(lv-1)*5;
  const MAX_ENERGY=5;
  const ENERGY_COST={attack:1,special:3,defend:0};

  const showDmg=(who,dmg,isSpecial)=>{ setDmgPop({who,dmg,isSpecial}); setTimeout(()=>setDmgPop(null),900); };

  const enemyTurn=(pHp,curEnergy,isDefending)=>{
    setAnimating(true);
    setTimeout(()=>{
      const roll=Math.random(); let rawDmg,msg,type;
      if(roll<.25){rawDmg=Math.round(enemyCard.power*enemyCard.specialMult+Math.random()*10);msg="💥 "+enemyCard.special+"!";type="special";SFX.play("specialHit");}
      else if(roll<.6){rawDmg=Math.round(enemyCard.power*.85+Math.random()*8);msg="⚔️ "+enemyCard.name+" attacks";type="attack";SFX.play("hit");}
      else{rawDmg=Math.round(enemyCard.power*.5+Math.random()*6);msg="🌀 Glancing blow";type="attack";SFX.play("hit");}
      const dmg=isDefending?Math.max(0,rawDmg-effD):Math.max(1,rawDmg-Math.round(effD*.3));
      const fullMsg=isDefending
        ?(msg+": "+rawDmg+" atk − "+Math.min(rawDmg,effD)+" blocked = "+dmg+" dmg")
        :(msg+": "+dmg+" dmg");
      const newHp=Math.max(0,pHp-dmg);
      setPlayerHp(newHp); showDmg("player",dmg,type==="special");
      addLog(fullMsg,type);
      setDefending(false);
      if(newHp<=0){addLog("💀 Defeated...","system");SFX.play("lose");setPhase("lost");setAnimating(false);}
      else{
        const newEnergy=Math.min(MAX_ENERGY,curEnergy+1);
        setEnergy(newEnergy);
        addLog("⚡ Your turn — "+newEnergy+" energy","system");
        setPhase("player");
        setAnimating(false);
      }
    },900);
  };

  const action=(type)=>{
    if(animating||phase!=="player")return;
    const cost=ENERGY_COST[type];
    if(energy<cost){addLog("⚡ Need "+cost+" energy (have "+energy+")","system");SFX.play("click");return;}
    setAnimating(true);
    const newEnergy=type==="defend"?Math.min(MAX_ENERGY,energy+1):energy-cost;
    setEnergy(newEnergy);
    if(type==="defend"){
      setDefending(true);
      addLog("🛡 Defending! "+effD+" DEF blocks next attack · +1⚡ ("+newEnergy+" total)","defend");
      SFX.play("click");
      setPhase("enemy");
      setAnimating(false);
      setTimeout(()=>enemyTurn(playerHp,newEnergy,true),400);
      return;
    }
    let dmg,msg,logType;
    if(type==="attack"){dmg=Math.max(1,Math.round(effP*.9-enemyCard.defense*.3+Math.random()*10));msg="⚔️ Attack: "+dmg+" dmg · "+newEnergy+"⚡ left";logType="attack";SFX.play("hit");}
    else{dmg=Math.max(1,Math.round(effP*playerCard.specialMult-enemyCard.defense*.25+Math.random()*12));msg="✨ "+playerCard.special+": "+dmg+" dmg!";logType="special";SFX.play("specialHit");}
    const newEHp=Math.max(0,enemyHp-dmg);
    setEnemyHp(newEHp); showDmg("enemy",dmg,logType==="special");
    addLog(msg,logType);
    setTimeout(()=>{
      if(newEHp<=0){addLog("🏆 Victory!","system");SFX.play("win");setPhase("won");setAnimating(false);}
      else{setPhase("enemy");setAnimating(false);setTimeout(()=>enemyTurn(playerHp,newEnergy,false),400);}
    },500);
  };

  const logC={system:"#a855f7",attack:"#f97316",special:"#f59e0b",defend:"#3b82f6",normal:"#94a3b8"};

  return (
    <Modal onClose={onClose} title="⚔️ Battle Arena">
      <div style={{maxWidth:520,margin:"0 auto"}}>
        <div style={{background:"linear-gradient(135deg,#0a0014,#0a1428)",border:"1px solid #1e293b",borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-around",alignItems:"flex-end",gap:8}}>
            <div style={{textAlign:"center",flex:1}}>
              <div style={{color:"#22c55e",fontSize:10,fontWeight:700,marginBottom:6}}>YOU {lv>1?`LV${lv}`:""}</div>
              <div style={{position:"relative",display:"inline-block"}}>

  );
}

const MUSIC={
  _ctx:null,_nodes:[],_tab:null,_muted:false,_vol:0.13,_master:null,_timer:null,_currentTab:null,
  ctx(){if(!this._ctx){this._ctx=new(window.AudioContext||window.webkitAudioContext)();this._master=this._ctx.createGain();this._master.gain.value=this._vol;this._master.connect(this._ctx.destination);}return this._ctx;},
  stop(){this._nodes.forEach(n=>{try{n.stop();}catch(e){}});this._nodes=[];},
  fadeOut(cb,ms=650){if(!this._master){cb?.();return;}const t=this._ctx.currentTime;this._master.gain.setValueAtTime(this._master.gain.value,t);this._master.gain.linearRampToValueAtTime(0.001,t+ms/1000);clearTimeout(this._timer);this._timer=setTimeout(()=>{this.stop();cb?.();},ms);},
  fadeIn(ms=700){if(!this._master||this._muted)return;const t=this._ctx.currentTime;this._master.gain.setValueAtTime(0.001,t);this._master.gain.linearRampToValueAtTime(this._vol,t+ms/1000);},
  _o(freq,type="sine",vol=0.06){const ctx=this.ctx(),o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(this._master);o.start();this._nodes.push(o);return{osc:o,gain:g};},
  _lfo(target,rate,depth){const ctx=this.ctx(),l=ctx.createOscillator(),lg=ctx.createGain();l.frequency.value=rate;lg.gain.value=depth;l.connect(lg);lg.connect(target);l.start();this._nodes.push(l);},
  // Home: vast, drifting deep-space ambience — low sub drone + high crystal overtones
  _home(){
    const ctx=this.ctx();
    // Deep sub bass pulse
    const{gain:b}=this._o(27.5,"sine",0.055);this._lfo(b.gain,0.08,0.03);
    // Mid warmth chord — Cm-ish
    [[65.4,0.03],[77.8,0.022],[98,0.018],[130.8,0.015]].forEach(([f,v])=>{const{gain:g,osc:o}=this._o(f,"triangle",v);this._lfo(g.gain,0.04+Math.random()*0.03,0.01);this._lfo(o.detune,0.06,6);});
    // Crystal high shimmer
    [[523.3,0.008],[659.3,0.006],[783.9,0.005],[1046.5,0.004]].forEach(([f,v])=>{const{gain:g}=this._o(f,"sine",v);this._lfo(g.gain,0.12+Math.random()*0.1,0.005);});
    // Slow breathing pad
    const{gain:p}=this._o(130.8,"sine",0.025);this._lfo(p.gain,0.05,0.02);this._lfo(p.gain,0.18,0.008);
  },
  // Collection/Binder: mystical library hum — warm, studious, slightly magical
  _binder(){
    [[41.2,0.04],[55,0.032],[82.4,0.022],[110,0.014]].forEach(([f,v])=>{const{gain:g,osc:o}=this._o(f,"sine",v);this._lfo(g.gain,0.06+Math.random()*0.04,0.014);this._lfo(o.detune,0.09,5);});
    [[220,0.012],[277.2,0.01],[329.6,0.009],[415.3,0.007]].forEach(([f,v])=>{const{gain:g}=this._o(f,"triangle",v);this._lfo(g.gain,0.15,0.009);});
    // Gentle high resonance
    const{gain:r}=this._o(880,"sine",0.004);this._lfo(r.gain,0.2,0.003);
    const{gain:b}=this._o(27.5,"sine",0.042);this._lfo(b.gain,0.1,0.025);
  },
  // Shop: upbeat bright sparkle — major key, cheerful, merchant energy
  _shop(){
    // Bright major chord — C major feel
    [[261.6,0.018],[329.6,0.016],[392,0.014],[523.3,0.012],[659.3,0.009]].forEach(([f,v],i)=>{const{gain:g,osc:o}=this._o(f,"triangle",v);this._lfo(g.gain,0.2+i*0.05,0.012);this._lfo(o.detune,0.1+i*0.04,3);});
    // Twinkling highs
    [[1046.5,0.005],[1318.5,0.004],[1568,0.003]].forEach(([f,v])=>{const{gain:g}=this._o(f,"sine",v);this._lfo(g.gain,0.4+Math.random()*0.3,0.004);});
    // Punchy bass
    const{gain:b}=this._o(65.4,"triangle",0.038);this._lfo(b.gain,0.12,0.022);
  },
  // Battle: tense, driving, pulsing danger — minor key, rhythmic
  _battle(){
    // Heavy low pulse — rhythmic
    const ctx=this.ctx();
    const{gain:b1}=this._o(41.2,"sawtooth",0.022);this._lfo(b1.gain,0.8,0.018);
    const{gain:b2}=this._o(55,"sawtooth",0.016);this._lfo(b2.gain,1.6,0.012);
    // Tense mid growl
    [[110,0.014],[138.6,0.011],[164.8,0.009]].forEach(([f,v])=>{const{gain:g}=this._o(f,"square",v);this._lfo(g.gain,0.4,0.008);});
    // Dissonant accent — tritone tension
    const{gain:t}=this._o(184.0,"sawtooth",0.007);this._lfo(t.gain,2.0,0.005);
    // Rumble sub
    const{gain:s}=this._o(27.5,"sine",0.038);this._lfo(s.gain,0.5,0.028);
    // Eerie whistle above
    const{gain:w}=this._o(440,"sine",0.005);this._lfo(w.gain,0.9,0.004);this._lfo(w.gain,0.1,0.007);
  },
  // Quests: adventurous, hopeful, forward-moving — pentatonic melody feel
  _quests(){
    // Walking bass
    const{gain:b}=this._o(49,"triangle",0.042);this._lfo(b.gain,0.07,0.026);
    // Pentatonic chord layers
    [[196,0.018],[246.9,0.015],[293.7,0.013],[369.9,0.011],[440,0.009]].forEach(([f,v],i)=>{const{gain:g,osc:o}=this._o(f,"triangle",v);this._lfo(g.gain,0.12+i*0.03,0.012);this._lfo(o.detune,0.08,4);});
    // Bright flute-like overtone
    [[784,0.006],[988,0.005],[1175,0.004]].forEach(([f,v])=>{const{gain:g}=this._o(f,"sine",v);this._lfo(g.gain,0.25,0.005);});
  },
  // Auction: urgent, ticking, competitive pressure
  _auction(){
    // Ticking-like pulse — fast LFO on mid tones
    [[146.8,0.016],[185,0.013],[220,0.011]].forEach(([f,v])=>{const{gain:g}=this._o(f,"triangle",v);this._lfo(g.gain,3.0,0.013);});
    // Tension chord
    [[73.4,0.028],[110,0.02],[164.8,0.014]].forEach(([f,v])=>{const{gain:g,osc:o}=this._o(f,"sine",v);this._lfo(g.gain,0.1,0.016);this._lfo(o.detune,0.05,3);});
    // Suspense high shimmer
    const{gain:h}=this._o(880,"sine",0.005);this._lfo(h.gain,4.0,0.004);
    const{gain:s}=this._o(36.7,"sine",0.045);this._lfo(s.gain,0.15,0.035);
  },
  setTab(tab){this._currentTab=tab;if(this._muted||this._tab===tab)return;this._tab=tab;const T={home:()=>this._home(),collection:()=>this._binder(),shop:()=>this._shop(),battle:()=>this._battle(),quests:()=>this._quests(),auction:()=>this._auction(),profile:()=>this._binder(),fusion:()=>this._shop()};this.fadeOut(()=>{if(this._muted)return;T[tab]?.();this.fadeIn();},550);},
  toggle(){this._muted=!this._muted;if(this._muted){this.fadeOut(null,400);}else{this._tab=null;if(this._currentTab)this.setTab(this._currentTab);}return this._muted;},
};

// ── Card Fusion Modal ─────────────────────────────────────────────────────────
function FusionModal({collection,cardLevels,onFuse,onClose}){
  const [selected,setSelected]=useState(null);

  const fusable=ALL_CARDS.filter(c=>countById[c.id]>=3&&!collection.find(x=>x.id===c.id&&x.foil));
  const doFuse=()=>{
    if(!selected||fusing)return;
    setFusing(true);SFX.play("packCrinkle");
    setTimeout(()=>{SFX.play("fusion");setResult({...selected,foil:true});setFusing(false);},1800);
  };
  return(
    <Modal onClose={onClose} title="✨ Card Fusion Lab">
      <div style={{maxWidth:500,margin:"0 auto"}}>

          <div style={{background:"linear-gradient(135deg,#1c1008,#2d1a00)",border:"1px solid #f59e0b44",borderRadius:14,padding:16,marginBottom:18}}>
            <div style={{color:"#f59e0b",fontWeight:700,fontSize:14,marginBottom:6}}>⚗️ How Fusion Works</div>
            <div style={{color:"#94a3b8",fontSize:13,lineHeight:1.6}}>Combine <span style={{color:"#f59e0b",fontWeight:700}}>3 copies</span> of any card to forge a <span style={{color:"#f59e0b",fontWeight:700}}>✨ Foil</span> version with an animated golden border and <span style={{color:"#22c55e",fontWeight:600}}>+20% to all stats</span>.</div>
          </div>
          {fusable.length===0
            ?<div style={{textAlign:"center",padding:40,color:"#475569"}}><div style={{fontSize:48,marginBottom:12}}>🔬</div><div style={{fontSize:14}}>You need 3 copies of the same card to fuse.</div><div style={{color:"#334155",fontSize:12,marginTop:8}}>Open more packs and come back!</div></div>
            :<><div style={{color:"#94a3b8",fontSize:12,marginBottom:12}}>Ready to fuse ({fusable.length}):</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:20}}>
              {fusable.map(c=>(
                <div key={c.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  <Card card={c} mini selected={selected?.id===c.id} onClick={setSelected} count={countById[c.id]} level={1}/>
                  <div style={{color:RC[c.rarity].color,fontSize:9,fontWeight:700}}>×{countById[c.id]} copies</div>

              <div style={{color:"white",fontWeight:700,marginBottom:4}}>Fusing: {selected.name}</div>
              <div style={{color:"#64748b",fontSize:12,marginBottom:4}}>3 copies → 1 Foil card</div>
              <div style={{color:"#22c55e",fontSize:12}}>+{Math.round(selected.power*.2)} PWR · +{Math.round(selected.hp*.2)} HP · +{Math.round(selected.defense*.2)} DEF</div>
            </div>}
            <button disabled={!selected||fusing} onClick={doFuse} style={{background:selected&&!fusing?"linear-gradient(135deg,#f59e0b,#fbbf24)":"#1e293b",color:selected&&!fusing?"#000":"#475569",border:"none",borderRadius:12,padding:"15px",width:"100%",fontWeight:800,fontSize:16,cursor:selected&&!fusing?"pointer":"not-allowed"}}>
              {fusing?"⚡ Fusing...":"✨ Fuse into Foil!"}

// ── 3v3 Team Battle ───────────────────────────────────────────────────────────
function TeamBattleModal({collection,cardLevels,onClose,onTeamWin}){
  const [phase,setPhase]=useState("pick");
  const [team,setTeam]=useState([]);
  const [enemyTeam]=useState(()=>[...ALL_CARDS].sort(()=>Math.random()-.5).slice(0,3));
  const [activeIdx,setActiveIdx]=useState(0);
  const [enemyIdx,setEnemyIdx]=useState(0);
  const [hps,setHps]=useState({});
  const [enemyHps,setEnemyHps]=useState({});
  const [log,setLog]=useState([{text:"⚔️ 3v3 Team Battle — pick your team!",type:"system"}]);
  const [animating,setAnimating]=useState(false);
  const [dmgPop,setDmgPop]=useState(null);
  const [subbing,setSubbing]=useState(false);
  const [energy,setEnergy]=useState(1);
  const MAX_ENERGY=5;
  const ENERGY_COST={attack:1,special:3,defend:0,sub:0};
  const logRef=useRef(null);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[log]);
  const unique=[...new Map(collection.map(c=>[c.id+(c.foil?"f":""),c])).values()];
  const addLog=(text,type="normal")=>setLog(l=>[...l,{text,type}]);
  const showDmg=(who,dmg,sp)=>{setDmgPop({who,dmg,sp});setTimeout(()=>setDmgPop(null),900);};
  const hpKey=c=>c.id+(c.foil?"f":"");
  const getHp=c=>hps[hpKey(c)]??0;
  const getEHp=i=>enemyHps[i]??0;

  const startBattle=t=>{
    const ih={};t.forEach(c=>{const lv=1;ih[hpKey(c)]=c.hp+(lv-1)*15+(c.foil?Math.round(c.hp*.2):0);});
    const ie={};enemyTeam.forEach((c,i)=>{ie[i]=c.hp;});
    setHps(ih);setEnemyHps(ie);setPhase("battle");addLog("Fight!");
  };

  const togglePick=c=>{
    SFX.play("click");const k=hpKey(c);
    if(team.find(x=>hpKey(x)===k))setTeam(t=>t.filter(x=>hpKey(x)!==k));
    else if(team.length<3)setTeam(t=>[...t,c]);
  };

  const doSub=idx=>{
    if(idx===activeIdx||getHp(team[idx])<=0)return;
    SFX.play("sub");setActiveIdx(idx);setSubbing(false);
    addLog(`🔄 Subbed in ${team[idx].name}!`,"defend");
  };

  const enemyTurn=(curHps,curA)=>{
    setAnimating(true);
    setTimeout(()=>{
      const ec=enemyTeam[enemyIdx],pc=team[curA],lv=1;
      const pDef=pc.defense+(lv-1)*5+(pc.foil?Math.round(pc.defense*.2):0);
      const roll=Math.random();let dmg,msg,type;
      if(roll<.25){dmg=Math.max(1,Math.round(ec.power*ec.specialMult-pDef*.4+Math.random()*10));msg=`💥 ${ec.special}! ${dmg} dmg!`;type="special";SFX.play("specialHit");}
      else{dmg=Math.max(1,Math.round(ec.power*.85-pDef*.3+Math.random()*8));msg=`⚔️ ${ec.name}: ${dmg} dmg`;type="attack";SFX.play("hit");}
      const newH=Math.max(0,(curHps[hpKey(pc)]??0)-dmg);
      const newHps={...curHps,[hpKey(pc)]:newH};
      setHps(newHps);showDmg("player",dmg,type==="special");addLog(msg,type);
      if(newH<=0){
        addLog(`💀 ${pc.name} is down!`,"system");
        const next=team.findIndex((c,i)=>i!==curA&&(newHps[hpKey(c)]??0)>0);
        if(next===-1){addLog("💀 Team defeated.","system");SFX.play("lose");setPhase("lost");}
        else{setActiveIdx(next);addLog(`🔄 ${team[next].name} steps in!`,"defend");}
      }
      setAnimating(false);
    },900);
  };

  const action=type=>{
    if(animating||phase!=="battle")return;
    const cost=ENERGY_COST[type]??0;
    if(energy<cost){addLog(`⚡ Need ${cost} energy (have ${energy})`,"system");SFX.play("click");return;}
    const newEnergy=type==="defend"?Math.min(MAX_ENERGY,energy+1):energy-cost;
    setEnergy(newEnergy);
    setAnimating(true);setSubbing(false);
    const pc=team[activeIdx],lv=1;
    const effP=pc.power+(lv-1)*8+(pc.foil?Math.round(pc.power*.2):0);
    const ec=enemyTeam[enemyIdx];
    let dmg,msg,logType;
    if(type==="attack"){dmg=Math.max(1,Math.round(effP*.9-ec.defense*.3+Math.random()*10));msg=`⚔️ ${pc.name}: ${dmg} dmg`;logType="attack";SFX.play("hit");}
    else if(type==="special"){dmg=Math.max(1,Math.round(effP*pc.specialMult-ec.defense*.25+Math.random()*12));msg=`✨ ${pc.special}: ${dmg}!`;logType="special";SFX.play("specialHit");}
    else{dmg=Math.max(1,Math.round(effP*.25));msg=`🛡 Counter: ${dmg}`;logType="defend";SFX.play("click");}
    const newEH=Math.max(0,getEHp(enemyIdx)-dmg);
    setEnemyHps(prev=>({...prev,[enemyIdx]:newEH}));showDmg("enemy",dmg,logType==="special");addLog(msg,logType);
    setTimeout(()=>{
      if(newEH<=0){
        addLog(`✅ ${ec.name} defeated!`,"system");
        const nextE=enemyIdx+1;
        if(nextE>=3){SFX.play("teamWin");addLog("🏆 Enemy team wiped! Victory!","system");setPhase("won");setAnimating(false);}
        else{setEnemyIdx(nextE);addLog(`⚠️ ${enemyTeam[nextE].name} enters!`,"system");setAnimating(false);}
      }else{
        setEnergy(e=>Math.min(MAX_ENERGY,e+1));
        setAnimating(false);
        enemyTurn(hps,activeIdx);
      }
    },500);
  };

  const logC={system:"#a855f7",attack:"#f97316",special:"#f59e0b",defend:"#3b82f6",normal:"#94a3b8"};
  const pc=team[activeIdx],ec=enemyTeam[enemyIdx];
  const lv=1;
  const effP=pc?(pc.power+(lv-1)*8+(pc.foil?Math.round(pc.power*.2):0)):0;

  if(phase==="pick") return(
    <Modal onClose={onClose} title="⚔️ 3v3 Team Battle">
      <div style={{maxWidth:600,margin:"0 auto"}}>
        <div style={{background:"#1e293b",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{color:"#94a3b8",fontSize:13,lineHeight:1.6}}>Pick <span style={{color:"white",fontWeight:700}}>3 cards</span> for your team. Sub cards in/out mid-battle while they have HP.</div>
        </div>
        <div style={{color:"white",fontWeight:700,marginBottom:10}}>Your Team ({team.length}/3):</div>
        {team.length===0?<div style={{color:"#475569",fontSize:12,padding:12,background:"#1e293b",borderRadius:10,marginBottom:14,textAlign:"center"}}>Tap cards below to select</div>
        :<div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          {team.map((c,i)=><div key={i} style={{position:"relative"}}>
            <Card card={c} mini level={1}/>
            <button onClick={()=>setTeam(t=>t.filter((_,j)=>j!==i))} style={{position:"absolute",top:3,left:3,background:"#ef4444",color:"white",border:"none",borderRadius:999,width:18,height:18,fontSize:11,cursor:"pointer",fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          </div>)}
        </div>}
        <button disabled={team.length<3} onClick={()=>startBattle(team)} style={{background:team.length===3?"linear-gradient(135deg,#991b1b,#dc2626)":"#1e293b",color:team.length===3?"white":"#475569",border:"none",borderRadius:12,padding:"14px",width:"100%",fontWeight:700,fontSize:16,cursor:team.length===3?"pointer":"not-allowed",marginBottom:16}}>
          ⚔️ Start Battle! {team.length<3?`(pick ${3-team.length} more)`:""}
        </button>
        <div style={{color:"#94a3b8",fontSize:12,marginBottom:10}}>Your cards:</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {unique.map((c,i)=><Card key={i} card={c} mini selected={!!team.find(x=>hpKey(x)===hpKey(c))} onClick={togglePick} level={1}/>)}
        </div>
      </div>
    </Modal>
  );

  return(
    <Modal onClose={onClose} title="⚔️ 3v3 Team Battle">
      <div style={{maxWidth:560,margin:"0 auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div style={{background:"#052e16",border:"1px solid #14532d",borderRadius:10,padding:10}}>
            <div style={{color:"#22c55e",fontSize:10,fontWeight:700,marginBottom:6}}>YOUR TEAM</div>
            {team.map((c,i)=>{const h=getHp(c),maxH=c.hp+((1)-1)*15+(c.foil?Math.round(c.hp*.2):0),alive=h>0;return <div key={i} style={{marginBottom:5,opacity:alive?1:.4}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{color:i===activeIdx?"#22c55e":"#94a3b8",fontSize:10,fontWeight:i===activeIdx?700:400}}>{i===activeIdx?"▶ ":""}{c.name}</span><span style={{color:alive?"#22c55e":"#ef4444",fontSize:9}}>{alive?`${h}HP`:"KO"}</span></div>
              <div style={{background:"#1e293b",borderRadius:999,height:3}}><div style={{width:`${Math.max(0,h/maxH*100)}%`,height:"100%",background:alive?(h/maxH>.5?"#22c55e":"#f59e0b"):"#ef4444",borderRadius:999,transition:"width .4s"}}/></div>
            </div>;})}
          </div>
          <div style={{background:"#1a0000",border:"1px solid #7f1d1d",borderRadius:10,padding:10}}>
            <div style={{color:"#ef4444",fontSize:10,fontWeight:700,marginBottom:6}}>ENEMY TEAM</div>
            {enemyTeam.map((c,i)=>{const h=getEHp(i),alive=h>0;return <div key={i} style={{marginBottom:5,opacity:alive?1:.4}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{color:i===enemyIdx?"#ef4444":"#94a3b8",fontSize:10,fontWeight:i===enemyIdx?700:400}}>{i===enemyIdx?"▶ ":""}{c.name}</span><span style={{color:alive?"#ef4444":"#475569",fontSize:9}}>{alive?`${h}HP`:"KO"}</span></div>
              <div style={{background:"#1e293b",borderRadius:999,height:3}}><div style={{width:`${Math.max(0,h/c.hp*100)}%`,height:"100%",background:alive?(h/c.hp>.5?"#ef4444":"#f59e0b"):"#475569",borderRadius:999,transition:"width .4s"}}/></div>
            </div>;})}
          </div>
        </div>
        <div style={{background:"linear-gradient(135deg,#0a0014,#0a1428)",border:"1px solid #1e293b",borderRadius:14,padding:14,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-around",alignItems:"flex-end",gap:8}}>
            <div style={{textAlign:"center",flex:1}}>
              <div style={{color:"#22c55e",fontSize:10,fontWeight:700,marginBottom:5}}>ACTIVE — YOU</div>
              <div style={{position:"relative",display:"inline-block"}}>
                {pc&&<Card card={pc} mini showHp currentHp={getHp(pc)} level={lv}/>}
                {dmgPop?.who==="player"&&<div style={{position:"absolute",top:"25%",left:"50%",transform:"translateX(-50%)",color:dmgPop.sp?"#f59e0b":"#ef4444",fontWeight:900,fontSize:20,textShadow:`0 0 10px ${dmgPop.sp?"#f59e0b":"#ef4444"}`,zIndex:10,whiteSpace:"nowrap"}}>-{dmgPop.dmg}</div>}
              </div>
            </div>
            <div style={{fontSize:20,paddingBottom:32,color:"#4b5563"}}>VS</div>
            <div style={{textAlign:"center",flex:1}}>
              <div style={{color:"#ef4444",fontSize:10,fontWeight:700,marginBottom:5}}>ENEMY</div>
              <div style={{position:"relative",display:"inline-block"}}>
                {ec&&<Card card={ec} mini showHp currentHp={getEHp(enemyIdx)}/>}
                {dmgPop?.who==="enemy"&&<div style={{position:"absolute",top:"25%",left:"50%",transform:"translateX(-50%)",color:dmgPop.sp?"#f59e0b":"#f97316",fontWeight:900,fontSize:20,textShadow:`0 0 10px ${dmgPop.sp?"#f59e0b":"#f97316"}`,zIndex:10,whiteSpace:"nowrap"}}>-{dmgPop.dmg}</div>}
              </div>
            </div>
          </div>
        </div>
        <div ref={logRef} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,padding:10,height:100,overflowY:"auto",marginBottom:12,WebkitOverflowScrolling:"touch"}}>
          {log.map((l,i)=><div key={i} style={{color:logC[l.type]||"#94a3b8",fontSize:11,marginBottom:2,lineHeight:1.5,fontWeight:i===log.length-1?"600":"400"}}>{l.text}</div>)}
        </div>
        {phase==="battle"&&!animating&&<>
          {/* Energy bar */}
          <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:9,padding:"6px 10px",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"#f59e0b",fontSize:11,fontWeight:700,flexShrink:0}}>⚡ Energy</span>
            <div style={{display:"flex",gap:3,flex:1}}>
              {[...Array(MAX_ENERGY)].map((_,i)=>(
                <div key={i} style={{flex:1,height:10,borderRadius:3,background:i<energy?"linear-gradient(135deg,#f59e0b,#fbbf24)":"#1e293b",border:`1px solid ${i<energy?"#f59e0b33":"#334155"}`,transition:"background .2s"}}/>
              ))}
            </div>
            <span style={{color:"#f59e0b",fontWeight:800,fontSize:12,flexShrink:0}}>{energy}/{MAX_ENERGY}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:8}}>
            {[
              {t:"attack", i:"⚔️",l:"Attack",  cost:1, s:`~${Math.round(effP*.9)}-${Math.round(effP*.9+10)}`,c:"linear-gradient(135deg,#991b1b,#dc2626)"},
              {t:"special",i:"✨",l:pc?.special||"Special",cost:3,s:`~${Math.round(effP*(pc?.specialMult||1.5))}`,c:"linear-gradient(135deg,#6d28d9,#a855f7)"},
              {t:"defend", i:"🛡",l:"Defend",  cost:0, s:"+1⚡",c:"linear-gradient(135deg,#1d4ed8,#3b82f6)"},
              {t:"sub",    i:"🔄",l:"Sub Out", cost:0, s:"free",c:"linear-gradient(135deg,#065f46,#059669)"},
            ].map(b=>{
              const can=energy>=b.cost;
              return <button key={b.t} onClick={()=>b.t==="sub"?setSubbing(!subbing):action(b.t)}
                style={{background:b.t==="sub"&&subbing?"#059669":can?b.c:"#1e293b",color:can?"white":"#475569",border:`1px solid ${can?"transparent":"#334155"}`,borderRadius:9,padding:"9px 3px",fontWeight:700,fontSize:10,cursor:can||b.t==="sub"?"pointer":"not-allowed",outline:b.t==="sub"&&subbing?"2px solid #10b981":"none",position:"relative"}}>
                <div style={{fontSize:15,marginBottom:1}}>{b.i}</div>
                <div style={{fontSize:9,lineHeight:1.2}}>{b.l}</div>
                <div style={{color:can?"rgba(255,255,255,.5)":"#334155",fontSize:8,marginTop:1}}>{b.s}</div>
                {b.cost>0&&<div style={{position:"absolute",top:3,right:3,background:can?"#ffffff22":"#334155",borderRadius:3,padding:"1px 3px",fontSize:7,fontWeight:800,color:can?"#fff":"#475569"}}>{b.cost}⚡</div>}
              </button>;
            })}
          </div>
          {subbing&&<div style={{background:"#1e293b",borderRadius:10,padding:10,marginBottom:8}}>
            <div style={{color:"#22c55e",fontSize:11,marginBottom:8,fontWeight:600}}>🔄 Sub in:</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {team.map((c,i)=>{const h=getHp(c),alive=h>0&&i!==activeIdx;return <div key={i} style={{opacity:alive?1:.4,position:"relative"}}>
                <Card card={c} mini selected={i===activeIdx} onClick={alive?()=>doSub(i):undefined} level={1}/>
                {!alive&&i!==activeIdx&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"#00000088",borderRadius:14,color:"#ef4444",fontWeight:700,fontSize:12}}>KO</div>}
              </div>;})}
            </div>
          </div>}
        </>}
        {phase==="battle"&&animating&&<div style={{textAlign:"center",background:"#1a0000",border:"1px solid #7f1d1d",borderRadius:10,padding:12,color:"#ef4444",fontWeight:700,fontSize:13}}>⚡ Enemy attacking...</div>}
        {phase==="won"&&<div style={{textAlign:"center",background:"#001a0d",border:"1px solid #14532d",borderRadius:12,padding:18}}>
          <div style={{fontSize:44,marginBottom:6}}>🏆</div>
          <div style={{color:"#22c55e",fontWeight:800,fontSize:18,marginBottom:3}}>Team Victory!</div>
          <div style={{color:"#64748b",fontSize:12,marginBottom:14}}>+300 💎 team battle bonus!</div>
          <button onClick={()=>{onTeamWin?.();onClose();}} style={{background:"linear-gradient(135deg,#059669,#10b981)",color:"white",border:"none",borderRadius:10,padding:"12px 28px",fontWeight:700,fontSize:14,cursor:"pointer"}}>Claim Reward 🏆</button>
        </div>}
        {phase==="lost"&&<div style={{textAlign:"center",background:"#1a0000",border:"1px solid #7f1d1d",borderRadius:12,padding:18}}>
          <div style={{fontSize:44,marginBottom:6}}>💀</div>
          <div style={{color:"#ef4444",fontWeight:800,fontSize:18,marginBottom:14}}>Team Defeated!</div>
          <button onClick={onClose} style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:10,padding:"12px 28px",fontWeight:700,cursor:"pointer"}}>Retreat</button>
        </div>}
      </div>
    </Modal>
  );
}

// ── Binder Tab ────────────────────────────────────────────────────────────────
function BinderTab({unique,collection,cardLevels,setDetail,convertDupes,setDeckBuilder,setFusionModal,newCardIds=new Set()}){
  const [search,setSearch]=useState("");
  const [rarityFilter,setRarityFilter]=useState("All");
  const [typeFilter,setTypeFilter]=useState("All");
  const [sortBy,setSortBy]=useState("rarity");
  const countById={};collection.forEach(c=>{countById[c.id]=(countById[c.id]||0)+1;});
  const totalUnique=ALL_CARDS.length;
  const pct=Math.round(unique.length/totalUnique*100);

  const rarities=["All","Legendary","Epic","Rare","Uncommon","Common","Foil"];
  const types=["All","Alien","Robot","Knight","Mage","Dragon","Beast"];
  const rarityOrder={Legendary:0,Epic:1,Rare:2,Uncommon:3,Common:4};

  const filtered=unique.filter(c=>{
    const q=search.toLowerCase();
    const matchSearch=!q||c.name.toLowerCase().includes(q)||c.type.toLowerCase().includes(q)||c.special.toLowerCase().includes(q)||c.description.toLowerCase().includes(q);
    const matchRarity=rarityFilter==="All"||(rarityFilter==="Foil"?c.foil:c.rarity===rarityFilter&&!c.foil);
    const matchType=typeFilter==="All"||c.type===typeFilter;
    return matchSearch&&matchRarity&&matchType;
  }).sort((a,b)=>{
    if(sortBy==="rarity") return (rarityOrder[a.rarity]??5)-(rarityOrder[b.rarity]??5);
    if(sortBy==="power") return b.power-a.power;
    if(sortBy==="name") return a.name.localeCompare(b.name);
    if(sortBy==="level") return (1)-(1);
    return 0;
  });

  return(
    <div>
      {/* Header stats */}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
          <div style={{fontSize:18,fontWeight:800}}>My Binder</div>
          <div style={{color:"#64748b",fontSize:12}}>{unique.length}<span style={{color:"#334155"}}>/{totalUnique} cards</span></div>
        </div>
        {/* Progress bar */}
        <div style={{background:"#1e293b",borderRadius:999,height:6,marginBottom:4}}>
          <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#7c3aed,#a855f7)",borderRadius:999,transition:"width .5s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"#a855f7",fontSize:11,fontWeight:600}}>{pct}% complete</span>
          <span style={{color:"#334155",fontSize:10}}>{totalUnique-unique.length} more to find</span>
        </div>
      </div>

      {/* Quick actions */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={()=>{SFX.play("click");convertDupes();}} style={{background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",color:"white",border:"none",borderRadius:8,padding:"8px 12px",fontSize:11,fontWeight:600,cursor:"pointer",flex:1}}>♻️ Dupes→💎</button>
        <button onClick={()=>{SFX.play("click");setDeckBuilder(true);}} style={{background:"linear-gradient(135deg,#6d28d9,#a855f7)",color:"white",border:"none",borderRadius:8,padding:"8px 12px",fontSize:11,fontWeight:600,cursor:"pointer",flex:1}}>🃏 Decks</button>
        <button onClick={()=>{SFX.play("click");setFusionModal(true);}} style={{background:"linear-gradient(135deg,#b45309,#f59e0b)",color:"#000",border:"none",borderRadius:8,padding:"8px 12px",fontSize:11,fontWeight:700,cursor:"pointer",flex:1}}>✨ Fuse</button>
      </div>

      {/* Search */}
      <div style={{position:"relative",marginBottom:10}}>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#475569",fontSize:14}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search cards, types, specials..."
          style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 10px 10px 32px",color:"white",fontSize:13,boxSizing:"border-box"}}/>
        {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:16}}>×</button>}
      </div>

      {/* Rarity filter pills */}
      <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
        {rarities.map(r=>{
          const rc=r==="All"?{color:"#94a3b8"}:r==="Foil"?{color:"#f59e0b"}:RC[r]||{color:"#94a3b8"};
          const active=rarityFilter===r;
          return <button key={r} onClick={()=>{SFX.play("click");setRarityFilter(r);}} style={{background:active?rc.color+"22":"#1e293b",color:active?rc.color:"#64748b",border:`1px solid ${active?rc.color:"#334155"}`,borderRadius:20,padding:"4px 10px",fontSize:10,fontWeight:active?700:400,cursor:"pointer",transition:"all .15s"}}>{r}</button>;
        })}
      </div>

      {/* Type filter + sort */}
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",flex:1}}>
          {types.map(t=>{
            const icons={All:"🌌",Alien:"👽",Robot:"🤖",Knight:"⚔️",Mage:"🧙",Dragon:"🐉",Beast:"🐾"};
            const active=typeFilter===t;
            return <button key={t} onClick={()=>{SFX.play("click");setTypeFilter(t);}} style={{background:active?"#4c1d95":"#1e293b",color:active?"white":"#64748b",border:`1px solid ${active?"#7c3aed":"#334155"}`,borderRadius:20,padding:"4px 9px",fontSize:10,fontWeight:active?700:400,cursor:"pointer"}}>{icons[t]} {t}</button>;
          })}
        </div>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#94a3b8",fontSize:10,padding:"5px 8px",cursor:"pointer"}}>
          <option value="rarity">By Rarity</option>
          <option value="power">By Power</option>
          
          <option value="name">A-Z</option>
        </select>
      </div>

      {/* Results count */}
      <div style={{color:"#475569",fontSize:11,marginBottom:10}}>{filtered.length} card{filtered.length!==1?"s":""} shown</div>

      {/* Card grid */}
      {filtered.length===0
        ?<div style={{textAlign:"center",padding:40,color:"#334155"}}>
          <div style={{fontSize:40,marginBottom:10}}>🔍</div>
          <div>No cards match your search</div>
        </div>
        :<div style={{display:"flex",flexWrap:"wrap",gap:12}}>
          {filtered.map((c,i)=>{
            const isNew=newCardIds.has(c.id);
            return (
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,position:"relative"}}>
                {isNew&&<div style={{position:"absolute",top:-4,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white",fontSize:7,fontWeight:800,borderRadius:4,padding:"2px 6px",letterSpacing:1,zIndex:10,whiteSpace:"nowrap",boxShadow:"0 0 8px #22c55e88",animation:"pulse 1.5s ease-in-out infinite"}}>✨ NEW</div>}
                <Card card={c} mini onClick={setDetail} count={countById[c.id]>1?countById[c.id]:undefined} level={1}/>

              </div>
            );
          })}
        </div>
      }

      {/* Series 2 Teaser */}
      <div style={{marginTop:28,background:"linear-gradient(135deg,#0a0014,#0f0828)",border:"1px solid #7c3aed44",borderRadius:16,padding:20,textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 10px,#ffffff02 10px,#ffffff02 20px)",pointerEvents:"none"}}/>
        <div style={{fontSize:36,marginBottom:8,animation:"float 3s ease-in-out infinite"}}>🌌</div>
        <div style={{color:"#a855f7",fontSize:9,fontWeight:800,letterSpacing:4,marginBottom:6}}>COMING SOON</div>
        <div style={{fontSize:18,fontWeight:900,color:"white",marginBottom:6}}>SERIES 2</div>
        <div style={{color:"#94a3b8",fontSize:12,marginBottom:14,lineHeight:1.6}}>New card types · New abilities · New rarities</div>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:14}}>
          {[0,1,2,3,4].map(i=>(
            <div key={i} style={{width:40,height:56,borderRadius:8,background:"linear-gradient(135deg,#1a0030,#0a0014)",border:"1px solid #7c3aed44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#7c3aed",fontWeight:900}}>?</div>
          ))}
        </div>
        <div style={{background:"linear-gradient(135deg,#2e1065,#1e0a3c)",border:"1px solid #7c3aed44",borderRadius:8,padding:"8px 16px",display:"inline-block"}}>
          <span style={{color:"#c084fc",fontSize:11,fontWeight:700}}>🚀 Arriving in the next update — stay tuned!</span>
        </div>
      </div>
    </div>
  );
}

function SellModal({ card, onClose, onSell }) {
  const rc=RC[card.rarity];
  const suggested={Legendary:1200,Epic:400,Rare:150,Uncommon:60,Common:20}[card.rarity];
  const [price,setPrice]=useState(suggested);
  return (
    <Modal onClose={onClose} title={`List ${card.name}`}>
      <div style={{maxWidth:340,margin:"0 auto",textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><Card card={card}/></div>
        <div style={{background:"#1e293b",borderRadius:12,padding:16,marginBottom:20}}>
          <div style={{color:"#94a3b8",fontSize:13,marginBottom:12}}>Set your asking price:</div>
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:12}}>
            {[.5,.75,1,1.5,2].map(m=>(

    </Modal>
  );
}

// ── 5v5 Deck Battle ───────────────────────────────────────────────────────────
function DeckBattleModal({collection, cardLevels, coins, onClose, onWin, onLose}) {
  const [phase,setPhase]=useState("pick"); // pick|battle|won|lost
  const [deck,setDeck]=useState([]);
  const [enemyDeck]=useState(()=>{
    const shuffled=[...ALL_CARDS].sort(()=>Math.random()-.5);
    // Pick balanced enemy deck across rarities
    const legs=shuffled.filter(c=>c.rarity==="Legendary").slice(0,1);
    const epics=shuffled.filter(c=>c.rarity==="Epic").slice(0,1);
    const rares=shuffled.filter(c=>c.rarity==="Rare").slice(0,2);
    const uncommons=shuffled.filter(c=>c.rarity==="Uncommon").slice(0,1);
    return [...legs,...epics,...rares,...uncommons].slice(0,5);
  });
  const [pIdx,setPIdx]=useState(0); // player active index
  const [eIdx,setEIdx]=useState(0); // enemy active index
  const [hps,setHps]=useState({});
  const [eHps,setEHps]=useState({});
  const [log,setLog]=useState([]);
  const [animating,setAnimating]=useState(false);
  const [dmgPop,setDmgPop]=useState(null);
  const [statusEffects,setStatusEffects]=useState({});
  const [energy,setEnergy]=useState(1);
  const MAX_ENERGY=5;
  const ENERGY_COST={attack:1,special:3,defend:0};
  const logRef=useRef(null);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[log]);

  const unique=[...new Map(collection.map(c=>[c.id+(c.foil?"f":""),c])).values()];
  const addLog=(text,type="normal")=>setLog(l=>[...l.slice(-30),{text,type}]);
  const showDmg=(who,dmg,sp)=>{setDmgPop({who,dmg,sp});setTimeout(()=>setDmgPop(null),800);};
  const hpKey=c=>c.id+(c.foil?"f":"");

  const getMaxHp=(c,lv)=>c.hp+(lv-1)*15+(c.foil?Math.round(c.hp*.2):0);
  const getEffP=(c,lv,statusKey)=>{
    const base=c.power+(lv-1)*8+(c.foil?Math.round(c.power*.2):0);
    const ab=getAbility(c);
    const st=statusEffects[statusKey]||{};
    let mult=1;
    if(ab?.type==="passive"&&ab.name==="Berserker"){
      const hp=hps[statusKey]??getMaxHp(c,lv);
      if(hp<getMaxHp(c,lv)*.5) mult*=ab.value;
    }
    if(st.powerMod) mult*=st.powerMod;
    return Math.round(base*mult);
  };
  const getEffD=(c,lv)=>c.defense+(lv-1)*5+(c.foil?Math.round(c.defense*.2):0);

  const startBattle=(d)=>{
    const ih={};
    d.forEach(c=>{const lv=1;ih[hpKey(c)]=getMaxHp(c,lv);});
    const ie={};enemyDeck.forEach((c,i)=>{ie[i]=c.hp;});
    setHps(ih);setEHps(ie);setPhase("battle");
    setLog([{text:"⚔️ 5v5 Deck Battle begins!",type:"system"},{text:`Your ${d[0].name} vs Enemy ${enemyDeck[0].name}`,type:"system"}]);
    // Apply entry abilities
    const ab=getAbility(d[0]);
    if(ab?.type==="entry"){
      if(ab.name==="Rally Cry"){ih[hpKey(d[0])]=Math.min(getMaxHp(d[0],1),ih[hpKey(d[0])]+ab.value);addLog(`📣 ${d[0].name}: Rally Cry! +${ab.value} HP`,"ability");}
      if(ab.name==="Intimidate"){setStatusEffects(prev=>({...prev,"e0":{...prev["e0"],powerMod:ab.value}}));addLog(`👁️ ${d[0].name}: Intimidate! Enemy -20% power`,"ability");}
      setHps({...ih});
    }
  };

  const applyDoT=(curHps,curEHps,curSt,pi,ei,deckRef)=>{
    let newHps={...curHps},newEHps={...curEHps};
    // Player card DoT on enemy
    const pKey=hpKey(deckRef[pi]);
    const pAb=getAbility(deckRef[pi]);
    if((pAb?.type==="dot")&&newEHps[ei]>0){
      const dmg=pAb.value;newEHps[ei]=Math.max(0,newEHps[ei]-dmg);
      addLog(`${pAb.icon} ${pAb.name}: ${dmg} dmg to enemy`,"ability");
    }
    // Regen
    if(pAb?.type==="hot"){
      const maxH=getMaxHp(deckRef[pi],1);
      const heal=pAb.value;newHps[pKey]=Math.min(maxH,(newHps[pKey]||0)+heal);
      addLog(`💚 Regen: +${heal} HP`,"ability");
    }
    return{newHps,newEHps};
  };

  const logC={system:"#a855f7",attack:"#f97316",special:"#f59e0b",defend:"#3b82f6",ability:"#22c55e",normal:"#94a3b8"};

  const nextPlayerCard=(pi,curHps,d)=>{
    for(let i=pi+1;i<d.length;i++){
      if((curHps[hpKey(d[i])]??0)>0) return i;
    }
    return -1;
  };
  const nextEnemyCard=(ei,curEHps)=>{
    for(let i=ei+1;i<enemyDeck.length;i++){
      if((curEHps[i]??0)>0) return i;
    }
    return -1;
  };

  const enemyTurn=(curHps,curPIdx,d)=>{
    setAnimating(true);
    setTimeout(()=>{
      const ec=enemyDeck[eIdx],pc=d[curPIdx];
      const pKey=hpKey(pc);
      const lv=1;
      const pDef=getEffD(pc,lv);
      const ab=getAbility(pc);
      let dmg=Math.max(1,Math.round(ec.power*.9-pDef*.3+Math.random()*10));
      // Shield ability - first hit
      if(ab?.name==="Shield"&&!(statusEffects[pKey]?.shieldUsed)){
        dmg=Math.round(dmg*(1-ab.value));
        setStatusEffects(prev=>({...prev,[pKey]:{...prev[pKey],shieldUsed:true}}));
        addLog(`🛡️ Shield absorbs! Only ${dmg} dmg`,"ability");
      }
      // Thorns reflect
      if(ab?.name==="Thorns"){
        const reflect=Math.round(dmg*ab.value);
        addLog(`🌵 Thorns: reflects ${reflect} back!`,"ability");
      }
      const newH=Math.max(0,(curHps[pKey]??0)-dmg);
      const newHps={...curHps,[pKey]:newH};
      setHps(newHps);showDmg("player",dmg,false);
      addLog(`⚔️ ${ec.name} hits ${pc.name}: ${dmg} dmg`,"attack");SFX.play("hit");
      // Apply DoT
      const {newHps:h2,newEHps:e2}=applyDoT(newHps,eHps,statusEffects,curPIdx,eIdx,d);
      setHps(h2);setEHps(e2);
      setTimeout(()=>{
        if(newH<=0){
          addLog(`💀 ${pc.name} defeated!`,"system");SFX.play("lose");
          const next=nextPlayerCard(curPIdx,h2,d);
          if(next===-1){addLog("💀 Your deck is wiped! Defeat.","system");setPhase("lost");}
          else{
            setPIdx(next);
            addLog(`▶ ${d[next].name} enters!`,"system");SFX.play("cardFlip");
            const nab=getAbility(d[next]);
            if(nab?.type==="entry"){
              if(nab.name==="Rally Cry"){setHps(prev=>({...prev,[hpKey(d[next])]:Math.min(getMaxHp(d[next],1),(prev[hpKey(d[next])]||0)+nab.value)}));addLog(`📣 Rally Cry! +${nab.value} HP`,"ability");}
              if(nab.name==="Intimidate"){setStatusEffects(prev=>({...prev,[`e${eIdx}`]:{...prev[`e${eIdx}`],powerMod:nab.value}}));addLog(`👁️ Intimidate! Enemy -20% power`,"ability");}
            }
          }
        }
        // Grant +1 energy at start of player's new turn
        setEnergy(e=>Math.min(MAX_ENERGY,e+1));
        setAnimating(false);
      },500);
    },900);
  };

  const action=(type)=>{
    if(animating||phase!=="battle")return;
    const cost=ENERGY_COST[type];
    if(energy<cost){addLog(`⚡ Need ${cost} energy (have ${energy})`,"system");SFX.play("click");return;}
    setAnimating(true);
    const newEnergy=type==="defend"?Math.min(MAX_ENERGY,energy+1):energy-cost;
    setEnergy(newEnergy);
    const pc=deck[pIdx],lv=1;
    const pKey=hpKey(pc);
    const effP=getEffP(pc,lv,pKey);
    const ec=enemyDeck[eIdx];
    let dmg,logType;
    if(type==="attack"){dmg=Math.max(1,Math.round(effP*.9-ec.defense*.3+Math.random()*10));logType="attack";SFX.play("hit");}
    else if(type==="special"){dmg=Math.max(1,Math.round(effP*pc.specialMult-ec.defense*.2+Math.random()*14));logType="special";SFX.play("specialHit");}
    else{dmg=Math.max(1,Math.round(effP*.3));logType="defend";SFX.play("click");}
    // Pierce ability
    const ab=getAbility(pc);
    if(ab?.name==="Pierce") dmg=Math.round(dmg*(1+ab.value));
    const newEH=Math.max(0,(eHps[eIdx]??0)-dmg);
    setEHps(prev=>({...prev,[eIdx]:newEH}));
    showDmg("enemy",dmg,logType==="special");
    addLog(`${logType==="special"?"✨":"⚔️"} ${pc.name}${type==="special"?` — ${pc.special}`:""}: ${dmg} dmg`,logType);
    // DoT
    const {newHps:h2,newEHps:e2}=applyDoT(hps,{...eHps,[eIdx]:newEH},statusEffects,pIdx,eIdx,deck);
    setHps(h2);setEHps({...e2,[eIdx]:newEH});
    setTimeout(()=>{
      if(newEH<=0){
        addLog(`✅ ${ec.name} defeated!`,"system");SFX.play("coin");
        const next=nextEnemyCard(eIdx,{...eHps,[eIdx]:0});
        if(next===-1){SFX.play("teamWin");addLog("🏆 All enemies defeated! Victory!","system");setPhase("won");setAnimating(false);}
        else{
          setEIdx(next);addLog(`⚠️ Enemy ${enemyDeck[next].name} enters!`,"system");
          const eab=getAbility(enemyDeck[next]);
          if(eab?.type==="entry"&&eab.name==="Intimidate"){
            setStatusEffects(prev=>({...prev,[pKey]:{...prev[pKey],powerMod:eab.value}}));
            addLog(`👁️ ${enemyDeck[next].name}: Intimidate! Your power -20%`,"ability");
          }
          setAnimating(false);
        }
      }else{enemyTurn(h2,pIdx,deck);}
    },500);
  };

  const pc=deck[pIdx],ec=enemyDeck[eIdx];
  const plv=1;
  const effP=pc?getEffP(pc,plv,pc?hpKey(pc):""):0;
  const pcAb=pc?getAbility(pc):null;

  if(phase==="pick") return(
    <Modal onClose={onClose} title="⚔️ 5v5 Deck Battle">
      <div style={{maxWidth:600,margin:"0 auto"}}>
        <div style={{background:"#1e293b",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{color:"#94a3b8",fontSize:13,lineHeight:1.6}}>
            Build a deck of <span style={{color:"white",fontWeight:700}}>5 cards</span>. Cards fight in order — when one falls, the next steps in. Defeat all 5 enemy cards to win. <span style={{color:"#f59e0b",fontWeight:600}}>+500 💎</span>
          </div>
        </div>
        <div style={{color:"white",fontWeight:700,marginBottom:10}}>Your Deck ({deck.length}/5):</div>
        {deck.length===0
          ?<div style={{color:"#475569",fontSize:12,padding:12,background:"#1e293b",borderRadius:10,marginBottom:14,textAlign:"center"}}>Tap cards below to build your deck</div>
          :<div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
            {deck.map((c,i)=>{
              const ab=getAbility(c);
              return <div key={i} style={{position:"relative",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <Card card={c} mini level={1}/>
                {ab&&<div style={{background:"#1e293b",borderRadius:5,padding:"2px 6px",fontSize:8,color:"#94a3b8",display:"flex",alignItems:"center",gap:3}}><span>{ab.icon}</span><span>{ab.name}</span></div>}
                <div style={{color:"#475569",fontSize:8}}>#{i+1}</div>
                <button onClick={()=>setDeck(d=>d.filter((_,j)=>j!==i))} style={{position:"absolute",top:3,left:3,background:"#ef4444",color:"white",border:"none",borderRadius:999,width:16,height:16,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>×</button>
              </div>;
            })}
          </div>
        }
        <button disabled={deck.length<5} onClick={()=>startBattle(deck)} style={{background:deck.length===5?"linear-gradient(135deg,#991b1b,#dc2626)":"#1e293b",color:deck.length===5?"white":"#475569",border:"none",borderRadius:12,padding:"14px",width:"100%",fontWeight:700,fontSize:15,cursor:deck.length===5?"pointer":"not-allowed",marginBottom:16}}>
          ⚔️ Start Battle! {deck.length<5?`(${5-deck.length} more)`:""}
        </button>
        <div style={{color:"#94a3b8",fontSize:12,marginBottom:10}}>Your cards — tap to add:</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {unique.map((c,i)=>{
            const ab=getAbility(c);
            const inDeck=deck.find(x=>hpKey(x)===hpKey(c));
            return <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <Card card={c} mini selected={!!inDeck} onClick={inDeck?undefined:c=>setDeck(d=>d.length<5?[...d,c]:d)} level={1}/>

// ── StarField Background ──────────────────────────────────────────────────────
function StarField({tab}) {
  const stars = React.useMemo(()=>[...Array(140)].map((_,i)=>({
    x: ((i*1664525+1013904223)&0x7fffffff)/0x7fffffff*100,
    y: ((i*22695477+1)&0x7fffffff)/0x7fffffff*100,
    r: ((i*2654435761+1013904223)&0xff)/255*2.2+0.3,
    dur: 2+((i*1013904223)&0x7fffffff)/0x7fffffff*7,
    del: ((i*22695477)&0x7fffffff)/0x7fffffff*6,
    layer: i%3, // 0=near,1=mid,2=far
  })),[]);
  const shoots = React.useMemo(()=>[...Array(4)].map((_,i)=>({
    x: 10+i*22, y: 5+i*8,
    dur: 2.5+i*1.2,
    del: 3+i*4.5,
  })),[]);
  return (
    <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
      <style>{`
        @keyframes starTwinkle{0%,100%{opacity:0.15;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
        @keyframes starTwinkleFar{0%,100%{opacity:0.05;transform:scale(1)}50%{opacity:0.4;transform:scale(1.2)}}
        @keyframes shootingStar{0%{transform:translateX(0) translateY(0) rotate(-35deg);opacity:0} 5%{opacity:1} 100%{transform:translateX(600px) translateY(300px) rotate(-35deg);opacity:0}}
      `}</style>
      {/* Far layer — dim */}
      {stars.filter(s=>s.layer===2).map((s,i)=>(
        <div key={"f"+i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.r*0.8,height:s.r*0.8,borderRadius:"50%",background:"#a0c4ff",opacity:0,animation:"starTwinkleFar "+s.dur+"s "+s.del+"s ease-in-out infinite"}}/>
      ))}
      {/* Mid layer */}
      {stars.filter(s=>s.layer===1).map((s,i)=>(
        <div key={"m"+i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.r*1.2,height:s.r*1.2,borderRadius:"50%",background:"white",opacity:0,animation:"starTwinkle "+s.dur+"s "+s.del+"s ease-in-out infinite"}}/>
      ))}
      {/* Near layer — bright, larger */}
      {stars.filter(s=>s.layer===0).map((s,i)=>(
        <div key={"n"+i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.r*2,height:s.r*2,borderRadius:"50%",background:"white",boxShadow:"0 0 4px 1px rgba(200,220,255,0.6)",opacity:0,animation:"starTwinkle "+(s.dur*0.7)+"s "+s.del+"s ease-in-out infinite"}}/>
      ))}
      {/* Shooting stars */}
      {shoots.map((s,i)=>(
        <div key={"ss"+i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:90,height:1.5,borderRadius:2,background:"linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent)",opacity:0,animation:"shootingStar "+s.dur+"s "+s.del+"s linear infinite"}}/>
      ))}
    </div>
  );
}

    if(!email||!password){setError("Please enter email and password.");return;}
    if(password.length<6){setError("Password must be at least 6 characters.");return;}
    setLoading(true); setError("");
    try{
      const d=mode==="signup"?await sb.signUp(email,password):await sb.signIn(email,password);
