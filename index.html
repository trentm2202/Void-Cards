function StarField({tab}) {
  const stars = React.useMemo(()=>[...Array(140)].map((_,i)=>({
    x: ((i*1664525+1013904223)&0x7fffffff)/0x7fffffff*100,
    y: ((i*22695477+1)&0x7fffffff)/0x7fffffff*100,
    r: ((i*2654435761+1013904223)&0xff)/255*2.2+0.3,
    dur: 2+((i*1013904223)&0x7fffffff)/0x7fffffff*7,
    del: ((i*22695477)&0x7fffffff)/0x7fffffff*6,
    layer: i%3, // 0=near,1=mid,2=far
  })),[]);
  const shoots = React.useMemo(()=>[...Array(4)].map((_,i)=>({
    x: 10+i*22, y: 5+i*8,
    dur: 2.5+i*1.2,
    del: 3+i*4.5,
  })),[]);
  return (
    <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
      <style>{`
        @keyframes starTwinkle{0%,100%{opacity:0.15;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
        @keyframes starTwinkleFar{0%,100%{opacity:0.05;transform:scale(1)}50%{opacity:0.4;transform:scale(1.2)}}
        @keyframes shootingStar{0%{transform:translateX(0) translateY(0) rotate(-35deg);opacity:0} 5%{opacity:1} 100%{transform:translateX(600px) translateY(300px) rotate(-35deg);opacity:0}}
      `}</style>
      {/* Far layer — dim */}
      {stars.filter(s=>s.layer===2).map((s,i)=>(
        <div key={"f"+i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.r*0.8,height:s.r*0.8,borderRadius:"50%",background:"#a0c4ff",opacity:0,animation:"starTwinkleFar "+s.dur+"s "+s.del+"s ease-in-out infinite"}}/>
      ))}
      {/* Mid layer */}
      {stars.filter(s=>s.layer===1).map((s,i)=>(
        <div key={"m"+i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.r*1.2,height:s.r*1.2,borderRadius:"50%",background:"white",opacity:0,animation:"starTwinkle "+s.dur+"s "+s.del+"s ease-in-out infinite"}}/>
      ))}
      {/* Near layer — bright, larger */}
      {stars.filter(s=>s.layer===0).map((s,i)=>(
        <div key={"n"+i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.r*2,height:s.r*2,borderRadius:"50%",background:"white",boxShadow:"0 0 4px 1px rgba(200,220,255,0.6)",opacity:0,animation:"starTwinkle "+(s.dur*0.7)+"s "+s.del+"s ease-in-out infinite"}}/>
      ))}
      {/* Shooting stars */}
      {shoots.map((s,i)=>(
        <div key={"ss"+i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:90,height:1.5,borderRadius:2,background:"linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent)",opacity:0,animation:"shootingStar "+s.dur+"s "+s.del+"s linear infinite"}}/>
      ))}
    </div>
  );
}

function LegendaryFlash() {

      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at center,#f59e0b22,transparent 60%)",animation:"legFlash 0.8s ease-out forwards"}}/>

function DeleteAccountButton({onDeleted}){
  const [step,setStep]=useState("idle"); // idle | confirm | deleting | done
  const [error,setError]=useState("");
  if(step==="idle") return(
    <button onClick={()=>setStep("confirm")} style={{width:"100%",background:"transparent",color:"#ef444466",border:"1px solid #ef444422",borderRadius:10,padding:"11px",fontWeight:700,fontSize:12,cursor:"pointer",marginTop:6}}>
      🗑️ Delete My Account
    </button>
  );
  if(step==="confirm") return(
    <div style={{background:"#1a0000",border:"1px solid #ef444455",borderRadius:12,padding:16,marginTop:6}}>
      <div style={{color:"#ef4444",fontWeight:800,fontSize:13,marginBottom:8}}>⚠️ Delete Account?</div>
      <div style={{color:"#94a3b8",fontSize:12,marginBottom:14,lineHeight:1.5}}>This permanently deletes all your cards, gems, and progress. This cannot be undone.</div>

function ResetPasswordScreen({token, refreshToken, onDone}){
  const [password,setPassword]=useState("");
  const [confirm,setConfirm]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [success,setSuccess]=useState(false);

  const submit=async()=>{
    // Validate first — before touching any tokens
    if(password.length<6){setError("Password must be at least 6 characters.");return;}
    if(password!==confirm){setError("Passwords don't match.");return;}
    setLoading(true);setError("");
    try{
      // Exchange refresh token for fresh session right before updating password
      let sessionToken=token;
      if(refreshToken){
        const tr=await fetch(sb._url+"/auth/v1/token?grant_type=refresh_token",{
          method:"POST",
          headers:{"Content-Type":"application/json","apikey":sb._key},
          body:JSON.stringify({refresh_token:refreshToken})
        });
        const td=await tr.json();
        if(td.access_token) sessionToken=td.access_token;
      }
      const r=await fetch(sb._url+"/auth/v1/user",{
        method:"PUT",
        headers:{"Content-Type":"application/json","apikey":sb._key,"Authorization":"Bearer "+sessionToken},
        body:JSON.stringify({password})
      });
      const d=await r.json();
      if(d.id||d.email){setSuccess(true);setTimeout(onDone,2000);}
      else{setError(d.message||d.error_description||"Something went wrong. Please request a new reset link.");}
    }catch(e){setError("Connection error.");}
    setLoading(false);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"linear-gradient(180deg,#020617,#0f0a1e)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000,padding:20}}>
      <div style={{width:"100%",maxWidth:340}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:10}}>🔐</div>
          <div style={{color:"#a855f7",fontSize:9,letterSpacing:5,fontWeight:800,marginBottom:4}}>GALACTIC</div>
          <div style={{fontSize:26,fontWeight:900,background:"linear-gradient(135deg,#e2e8f0,#a855f7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>VOID CARDS</div>
          <div style={{color:"#475569",fontSize:12,marginTop:6}}>Set your new password</div>
        </div>
        <div style={{background:"linear-gradient(135deg,#0f0a1e,#1e0a3c)",border:"1px solid #4c1d9555",borderRadius:16,padding:24}}>
          {success
            ?<div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:40,marginBottom:12}}>✅</div>
              <div style={{color:"#22c55e",fontWeight:800,fontSize:16,marginBottom:6}}>Password Updated!</div>
              <div style={{color:"#64748b",fontSize:12}}>Redirecting to sign in...</div>
            </div>
            :<>
              <div style={{marginBottom:12}}>
                <div style={{color:"#64748b",fontSize:11,fontWeight:600,marginBottom:5}}>NEW PASSWORD</div>
                <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="Min 6 characters"
                  style={{width:"100%",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:"11px 14px",color:"white",fontSize:13,boxSizing:"border-box"}}
                  onKeyDown={e=>e.key==="Enter"&&submit()}/>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{color:"#64748b",fontSize:11,fontWeight:600,marginBottom:5}}>CONFIRM PASSWORD</div>
                <input value={confirm} onChange={e=>setConfirm(e.target.value)} type="password" placeholder="Repeat your password"
                  style={{width:"100%",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:"11px 14px",color:"white",fontSize:13,boxSizing:"border-box"}}
                  onKeyDown={e=>e.key==="Enter"&&submit()}/>
              </div>
              {error&&<div style={{background:"#1a0000",border:"1px solid #ef444455",borderRadius:8,padding:"10px 12px",color:"#ef4444",fontSize:12,marginBottom:14}}>{error}</div>}
              <button onClick={submit} disabled={loading} style={{width:"100%",background:loading?"#1e293b":"linear-gradient(135deg,var(--t1),var(--t2))",color:"white",border:"none",borderRadius:10,padding:"13px",fontWeight:800,fontSize:14,cursor:loading?"not-allowed":"pointer"}}>
                {loading?"Updating...":"Update Password 🚀"}
              </button>
            </>
          }
        </div>
      </div>
    </div>
  );
}

function useWindowWidth(){
  const [w,setW]=useState(typeof window!=="undefined"?window.innerWidth:375);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener("resize",h);
    return ()=>window.removeEventListener("resize",h);
  },[]);
  return w;
}

        const newSecs=a.secsLeft-1;
        // Rival auto-bid: based on rivalSpeed (lower = more aggressive)
        let newPrice=a.price, newBids=a.bids, rivalBid=null;
        let wasLeading=a.playerBid&&a.lastBidder==="You";
        let stillLeading=wasLeading;
        if(newSecs>0 && !a.isPlayer && Math.random()*a.rivalSpeed<1){
          const rival=RIVALS[Math.floor(Math.random()*RIVALS.length)];
          const bump=a.minBid+Math.floor(Math.random()*a.minBid);
          newPrice=a.price+bump;
          newBids=a.bids+1;
          rivalBid={rival,amount:newPrice,cardName:a.card.name,isPlayer:false};
          // If player was leading, they just got outbid
          if(wasLeading){ stillLeading=false; }
        }
        if(rivalBid){
          setAuctionLog(l=>[{...rivalBid,ts:Date.now()},...l].slice(0,12));
          if(wasLeading&&!stillLeading){
            notify(`😤 Outbid on ${a.card.name}! Current: 💎${newPrice}`,"err");
          }
        }
        // Auction ends

            return {...a,secsLeft:0,settled:true};
          }

  const onAuth=(save, newUsername=null)=>{
    // Always clear localStorage first so different accounts don't bleed into each other
    Object.keys(localStorage).filter(k=>k.startsWith("vc_")).forEach(k=>localStorage.removeItem(k));
    if(save){
      // Load cloud save into state AND into localStorage
      const apply=(key,setter,val)=>{ if(val!=null){setter(val);S.set(key,val);} };
      apply("username",setUsername,save.username);
      if(newUsername){setUsername(newUsername);S.set("username",newUsername);}
      apply("coins",setCoins,save.coins);
      apply("collection",setCollection,save.collection);
      apply("playerXp",setPlayerXp,save.playerXp);
      apply("playerLevel",setPlayerLevel,save.playerLevel);
      apply("wins",setWins,save.wins);
      apply("losses",setLosses,save.losses);
      apply("totalPacks",setTotalPacks,save.totalPacks);
      apply("totalSold",setTotalSold,save.totalSold);
      apply("streak",setStreak,save.streak);
      apply("decks",setDecks,save.decks);
      apply("quests",setQuests,save.quests);
      apply("questProgress",setQuestProg,save.questProg);
      apply("achievements",setUnlockedAch,save.unlockedAch);
      apply("teamWins",setTeamWins,save.teamWins);
      apply("pullHistory",setPullHistory,save.pullHistory);
      apply("packsSinceLeg",setPacksSinceLeg,save.packsSinceLeg);
      apply("claimedMilestones",setClaimedMilestones,save.claimedMilestones);
      apply("dailyFreePack",setDailyFreePack,save.dailyFreePack);
      apply("newPlayer",setNewPlayer,save.newPlayer);
      apply("lastLogin",setLastLogin,save.lastLogin);
      apply("dailyGems",setDailyGems,save.dailyGems);
    } else {
      // Brand new account — reset all state to defaults
      if(newUsername){setUsername(newUsername);S.set("username",newUsername);}
      setCoins(500); setCollection([]); setPlayerXp(0); setPlayerLevel(1);
      setWins(0); setLosses(0); setTotalPacks(0); setTotalSold(0);
      setStreak(0); setDecks([]); setQuests(null); setQuestProg({});
      setUnlockedAch([]); setTeamWins(0); setPullHistory([]);
      setPacksSinceLeg(0); setClaimedMilestones([]); setDailyFreePack("");
      setNewPlayer(true);
    }
    // Daily reset — runs AFTER cloud restore so always wins over stale saved data
    const _today=new Date().toDateString();
    const _dateNum=parseInt(new Date().toISOString().slice(0,10).replace(/-/g,""));
    const _storedLogin=S.get("lastLogin","");
    const _storedQuestDate=parseInt(S.get("questDate",0));
    if(_storedLogin!==_today){
      const _yesterday=new Date(Date.now()-86400000).toDateString();
      const _ns=_storedLogin===_yesterday?(S.get("streak",0)+1):1;
      setStreak(_ns);setLastLogin(_today);setDailyGems("");
      S.set("dailyGems","");S.set("lastLogin",_today);S.set("streak",_ns);
      setDailyWins({date:_today,count:0});S.set("dailyWins",{date:_today,count:0});
    }
    if(_storedQuestDate!==_dateNum){
      const _pool=DAILY_QUESTS_POOL.filter(q=>{
        if(["wins","streak"].includes(q.type)) return q.target<=5;
        return true;
      });
      const _seeded=[..._pool].map((q,i)=>({q,sort:((_dateNum*(i+1)*1664525+1013904223)&0x7fffffff)})).sort((a,b)=>a.sort-b.sort).map(x=>x.q).slice(0,5);
      setQuests(_seeded);setQuestProg({});
      S.set("quests",_seeded);S.set("questProgress",{});S.set("questDate",_dateNum);
    }
    // Save token + uid to localStorage so clicker.html can identify the user for Supabase sync
    if(sb._token) { localStorage.setItem("vc_token", sb._token); localStorage.setItem("vc_uid", sb._uid); }
    setAuthed(true);
  };

  // Check if this is a password reset link
  const resetData=(()=>{
    const hash=new URLSearchParams(window.location.hash.substring(1));

    const token=hash.get("access_token")||query.get("access_token");
    const refresh=hash.get("refresh_token")||query.get("refresh_token");
    const type=hash.get("type")||query.get("type");
    return (type==="recovery"&&token)?{token,refresh}:null;
  })();

  if(resetData) return <ResetPasswordScreen token={resetData.token} refreshToken={resetData.refresh} onDone={()=>{window.location.hash="";window.location.reload();}}/>;

        @keyframes foilBorder{0%{--a:0deg}100%{--a:360deg}}
        @keyframes shake{0%,100%{transform:rotate(-3deg) scale(1.05)}50%{transform:rotate(3deg) scale(1.05)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes fadeOut{from{opacity:.4}to{opacity:0}}

        @keyframes epicGlow{0%,100%{box-shadow:0 0 8px var(--t2b)} 50%{box-shadow:0 0 22px #a855f766}}
        @keyframes cardBreathe{0%,100%{transform:scale(1)} 50%{transform:scale(1.012)}}
        @keyframes foilRainbow{0%{filter:hue-rotate(0deg)} 100%{filter:hue-rotate(360deg)}}
        @keyframes starDrift{0%{transform:translateY(0)} 100%{transform:translateY(-100vh)}}
        @keyframes nebulaPulse{0%,100%{opacity:.07} 50%{opacity:.13}}
        @keyframes tabFadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
        @keyframes toastSlide{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes particlePop{0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

        ::-webkit-scrollbar{width:4px;height:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#4c1d9566;border-radius:4px}

          <div style={{background:"linear-gradient(135deg,#1e0a3c,#2d1060)",border:"1px solid var(--t1b)",borderRadius:10,padding:"8px 12px",display:"flex",alignItems:"center",gap:6}}>

            <span style={{color:"#c084fc",fontWeight:900,fontSize:15}}>{coins.toLocaleString()}</span>

      {/* Main column */}
      <div style={{display:"flex",flexDirection:"column",flex:1,minWidth:0}}>

      {/* Mobile tabs — hidden on desktop */}

        {TABS.map(t=>{
          const active=tab===t.id;
          const tabColors={home:"#a855f7",collection:"#a855f7",shop:"#f59e0b",battle:"#ef4444",fusion:"#f59e0b",quests:"#22c55e",auction:"#06b6d4",profile:"#64748b"};
          const tc=tabColors[t.id]||"#a855f7";
          const showBadge=t.id==="collection"&&newCardIds.size>0&&tab!=="collection";
          return <button key={t.id} onClick={()=>{SFX.play("click");setTab(t.id);}} style={{
            background:"transparent",border:"1px solid #ffffff0a",
            color:active?tc:"#475569",
            borderRadius:10,padding:"7px 13px",fontSize:11,fontWeight:active?700:500,

            {t.i} {t.l}
            {showBadge&&<span style={{background:"#22c55e",color:"white",fontSize:8,fontWeight:800,borderRadius:999,padding:"1px 5px",marginLeft:2,animation:"pulse 1.5s infinite"}}>{newCardIds.size}</span>}
          </button>;
        })}
      </div>}
      {!isDesktop&&<div style={{height:1,background:"linear-gradient(90deg,transparent,#ffffff0a,transparent)",margin:"0 16px 2px"}}/>}

      <div style={{padding:isDesktop?"20px 40px 40px":"0 16px 100px"}}>


        {/* BINDER */}
        {tab==="home"&&<div style={{animation:"tabFadeIn .25s ease-out"}}>
          {/* Hero greeting */}
          <div style={{background:"linear-gradient(135deg,#0f0a1e,#1e0a3c)",border:"1px solid #4c1d9533",borderRadius:16,padding:20,marginBottom:14,position:"relative",overflow:"hidden"}}>

              return <div key={m.count} style={{marginBottom:10,opacity:claimed?0.6:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{color:claimed?"#22c55e":"white",fontSize:12,fontWeight:600}}>{claimed?"✅ ":""}{m.label} ({m.count} cards)</span>
                  <span style={{color:"#a855f7",fontSize:11,fontWeight:700}}>+{m.reward} 💎</span>
                </div>
                <div style={{background:"#1e293b",borderRadius:999,height:5}}>
                  <div style={{width:`${pct}%`,height:"100%",background:claimed?"#22c55e":"linear-gradient(90deg,#7c3aed,#a855f7)",borderRadius:999,transition:"width .4s"}}/>
                </div>
                <div style={{color:"#334155",fontSize:9,marginTop:2}}>{Math.min(unique.length,m.count)}/{m.count}</div>
              </div>;
            })}
          </div>

          {/* Pull History */}
          <div style={{background:"linear-gradient(135deg,#0f172a,#001a22)",border:"1px solid #06b6d433",borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{color:"#06b6d4",fontWeight:700,marginBottom:10}}>📜 Pull History</div>
            {pullHistory.length===0
              ?<div style={{color:"#334155",fontSize:12,textAlign:"center",padding:16}}>No pulls yet — open a pack!</div>
              :<div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:280,overflowY:"auto"}}>
                {pullHistory.map((p,i)=>{
                  const rc=RC[p.rarity]||{color:"#94a3b8"};
                  return <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 8px",background:"#ffffff05",borderRadius:8,border:`1px solid ${rc.color}22`}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:rc.color,flexShrink:0,boxShadow:`0 0 6px ${rc.color}`}}/>
                    <div style={{flex:1}}>
                      <span style={{color:"white",fontSize:11,fontWeight:600}}>{p.name}</span>
                      <span style={{color:"#334155",fontSize:10}}> · {p.packName}</span>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{color:rc.color,fontSize:9,fontWeight:700}}>{p.rarity}</div>
                      <div style={{color:"#334155",fontSize:8}}>{p.date}</div>
                    </div>
                  </div>;
                })}
              </div>
            }
          </div>
        </div>}
      </div>

      {/* Modals */}
      {detail&&<Modal onClose={()=>setDetail(null)} title={detail.name}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:16,minHeight:430,alignItems:"flex-start",paddingTop:20}}>
          <div style={{transform:"scale(1.7)",transformOrigin:"top center"}}>
            <Card card={detail} level={1}/>
          </div>
        </div>
        <div style={{maxWidth:320,margin:"0 auto",background:"#1e293b",borderRadius:12,padding:16}}>
          <div style={{color:"#94a3b8",fontSize:12,marginBottom:14,lineHeight:1.7,textAlign:"center",fontStyle:"italic"}}>"{detail.description}"</div>
          <div style={{display:"flex",justifyContent:"space-around",marginBottom:12}}>
            <div style={{textAlign:"center"}}><div style={{color:"#f97316",fontWeight:800,fontSize:20}}>{detail.power+(( 1)-1)*8}</div><div style={{color:"#64748b",fontSize:10}}>POWER</div></div>
            <div style={{textAlign:"center"}}><div style={{color:"#22c55e",fontWeight:800,fontSize:20}}>{detail.hp+((1)-1)*15}</div><div style={{color:"#64748b",fontSize:10}}>HP</div></div>
            <div style={{textAlign:"center"}}><div style={{color:"#3b82f6",fontWeight:800,fontSize:20}}>{detail.defense+((1)-1)*5}</div><div style={{color:"#64748b",fontSize:10}}>DEF</div></div>
          </div>
          <div style={{textAlign:"center",background:"#0f172a",borderRadius:8,padding:"8px 10px",marginBottom:6}}>
            <span style={{color:RC[detail.rarity].color,fontWeight:700,fontSize:12}}>✨ {detail.special}</span>
            <span style={{color:"#64748b",fontSize:10}}> · {Math.round(detail.power*detail.specialMult)}–{Math.round(detail.power*detail.specialMult+12)} dmg</span>
          </div>
          <CardAbilityBadge card={detail}/>
          <div style={{textAlign:"center",color:"#475569",fontSize:10}}>{detail.series} · {detail.type}</div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:14,maxWidth:320,margin:"14px auto 0"}}>
          <button onClick={()=>{SFX.play("click");setDetail(null);setBattleCard(detail);setTab("battle");}} style={{flex:1,background:"linear-gradient(135deg,#991b1b,#dc2626)",color:"white",border:"none",borderRadius:9,padding:"11px",fontWeight:700,fontSize:13,cursor:"pointer"}}>⚔️ Battle</button>
          <button onClick={()=>{SFX.play("click");setSellCard(detail);setDetail(null);}} style={{flex:1,background:"linear-gradient(135deg,#059669,#10b981)",color:"white",border:"none",borderRadius:9,padding:"11px",fontWeight:700,fontSize:13,cursor:"pointer"}}>💰 Sell</button>
        </div>
      </Modal>}

      {/* Old BattleScreen removed — using GalaxyBattleModal */}
      {openingPack&&<PackModal pack={openingPack} onClose={()=>setOpeningPack(null)} onEarn={onCardsEarned} onLegendary={()=>{setLegFlash(true);setTimeout(()=>setLegFlash(false),1000);}}/>}
      {showSettings&&<Modal onClose={()=>setShowSettings(false)} title="⚙️ Settings">
        <div style={{maxWidth:420,margin:"0 auto"}}>
          {/* Sound */}
          <div style={{background:"linear-gradient(135deg,#0f172a,#1e0a3c)",border:"1px solid #2e1065",borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{color:"#a855f7",fontWeight:700,marginBottom:12}}>🔊 Audio</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <span style={{color:"#94a3b8",fontSize:13}}>Music & SFX</span>
              <button onClick={()=>{const m=SFX.toggle();MUSIC.toggle();setMuted(m);}} style={{background:muted?"#1e293b":"linear-gradient(135deg,var(--t1),var(--t2))",color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>{muted?"Off":"On"}</button>
            </div>
          </div>

          {/* Stats */}
          <div style={{background:"linear-gradient(135deg,#0f172a,#1e0a3c)",border:"1px solid #2e1065",borderRadius:14,padding:16,marginBottom:12}}>
            <div style={{color:"#a855f7",fontWeight:700,marginBottom:12}}>📊 Game Stats</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{l:"Cards Owned",v:unique.length},{l:"Packs Opened",v:totalPacks},{l:"Total Wins",v:wins},{l:"Login Streak",v:`${streak}d`}].map((s,i)=>(
                <div key={i} style={{background:"#0f172a",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{color:"white",fontWeight:700,fontSize:14}}>{s.v}</div>
                  <div style={{color:"#475569",fontSize:10}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Username */}
          <div style={{background:"linear-gradient(135deg,#0f172a,#1e0a3c)",border:"1px solid #4c1d9544",borderRadius:14,padding:14,marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:28}}>👤</div>
            <div style={{flex:1}}>
              {editingUsername
                ?<div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input autoFocus value={usernameDraft} onChange={e=>setUsernameDraft(e.target.value)} maxLength={20} placeholder="Enter username..." style={{flex:1,background:"#1e293b",border:"1px solid #7c3aed",borderRadius:8,padding:"6px 10px",color:"white",fontSize:14,fontWeight:700}}/>
                  <button onClick={()=>{const v=usernameDraft.trim().slice(0,20);setUsername(v);S.set("username",v);setEditingUsername(false);SFX.play("coin");}} style={{background:"linear-gradient(135deg,var(--t1),var(--t2))",color:"white",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:700,fontSize:12,cursor:"pointer"}}>Save</button>
                  <button onClick={()=>setEditingUsername(false)} style={{background:"#1e293b",color:"#64748b",border:"1px solid #334155",borderRadius:8,padding:"6px 10px",fontWeight:700,fontSize:12,cursor:"pointer"}}>✕</button>
                </div>
                :<div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{color:"white",fontWeight:800,fontSize:16}}>{username||<span style={{color:"#475569",fontStyle:"italic",fontSize:13}}>No username set</span>}</span>
                  <button onClick={()=>{setUsernameDraft(username);setEditingUsername(true);SFX.play("click");}} style={{background:"#1e293b",color:"#a855f7",border:"1px solid #4c1d95",borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>✏️ Edit</button>
                </div>
              }
              <div style={{color:"#334155",fontSize:10,marginTop:3}}>Max 20 characters · shown in Auction House</div>
            </div>
          </div>
          {/* Version */}
          <div style={{textAlign:"center",color:"#1e293b",fontSize:10,marginTop:8}}>
            Void Cards · Series 1 · v1.0
          </div>
          {authed&&<button onClick={async()=>{await sb.signOut();Object.keys(localStorage).filter(k=>k.startsWith("vc_")).forEach(k=>localStorage.removeItem(k));setAuthed(false);setShowSettings(false);}} style={{width:"100%",background:"#0f172a",color:"#475569",border:"1px solid #1e293b",borderRadius:10,padding:"11px",fontWeight:700,fontSize:13,cursor:"pointer",marginTop:10}}>
            🚪 Sign Out
          </button>}
          {authed&&<DeleteAccountButton onDeleted={()=>{Object.keys(localStorage).filter(k=>k.startsWith("vc_")).forEach(k=>localStorage.removeItem(k));setAuthed(false);setShowSettings(false);}}/>}
        </div>
      </Modal>}
      {showDupesModal&&<DupesModal
        collection={collection}
        onClose={()=>setShowDupesModal(false)}
        onSellOne={(card)=>{
          // Sell exactly 1 extra copy
          const gv={Legendary:500,Epic:150,Rare:50,Uncommon:15,Common:5};
          const val=gv[card.rarity]||5;
          setCollection(prev=>{const idx=prev.findIndex(c=>c.id===card.id&&!c.foil);if(idx===-1)return prev;const n=[...prev];n.splice(idx,1);return n;});
          setCoins(c=>c+val);
          setTotalSold(t=>t+1);
          updateQuest("sells",1);
          notify(`Sold 1× ${card.name} → +💎${val}`);
          checkAch({collection,wins,coins:coins+val,streak,cardLevels,decks,totalSold:totalSold+1});
        }}
        onSellAll={convertDupes}
      />}
      {sellCard&&<SellModal card={sellCard} onClose={()=>setSellCard(null)} onSell={doSell}/>}
      {deckBuilder&&<DeckBuilderModal collection={unique} cardLevels={cardLevels} onSave={d=>{SFX.play("achievement");setDecks(p=>[...p,d]);setDeckBuilder(false);notify(`Deck "${d.name}" saved!`);checkAch({collection,wins,coins,streak,cardLevels,decks:[...decks,d],totalSold});}} onClose={()=>setDeckBuilder(false)}/>}
      {dailyShop&&<DailyShopModal collection={collection} coins={coins} packsSinceLeg={packsSinceLeg}
        lastAdWatch={lastAdWatch}
        onWatchAd={()=>{
          setLastAdWatch(Date.now());
          setCoins(c=>c+150);
          SFX.play("coin");
          notify("📺 Thanks for watching! +💎 150","ach");
          updateQuest("spend",0);
        }}
        onBuyPack={p=>{buyPack(p);setDailyShop(false);}}
        onBuy={(card,price)=>{setCoins(c=>c-price);setCollection(prev=>[...prev,card]);SFX.play("coin");notify(`${card.name} added to collection!`,"ach");updateQuest("spend",price);checkAch({collection:[...collection,card],wins,coins:coins-price,streak,cardLevels,decks,totalSold});setDailyShop(false);}}
        onClose={()=>setDailyShop(false)}/>}
{/* DeckBattleModal removed */}
      {galaxyBattle&&<GalaxyBattleModal
        collection={collection}
        savedDecks={decks}
        node={galaxyBattle}
        stamina={stamina}
        onSpendStamina={(cost)=>setStamina(s=>Math.max(0,s-cost))}
        onClose={()=>setGalaxyBattle(null)}
        onWin={(gems,card)=>{
          const nw=wins+1;
          setWins(nw);
          setCoins(c=>c+gems);
          givePlayerXp(100+galaxyBattle.gems);
          setCompletedNodes(prev=>[...new Set([...prev,galaxyBattle.id])]);
          if(card) setCollection(prev=>[...prev,card]);
          SFX.play("achievement");
          notify(`🏆 ${galaxyBattle.name} defeated! +💎${gems}${card?` + ${card.name}`:""}`, "ach");
          updateQuest("wins",1);
          updateQuest("battle",1);
          checkAch({collection,wins:nw,coins:coins+gems,streak,cardLevels,decks,totalSold,teamWins});
          setBattleStreak(b=>b+1);
        }}
        onLose={()=>{
          setLosses(l=>l+1);
          givePlayerXp(40);
          setBattleStreak(0);
          notify("💀 Defeated! +40 XP — try a different deck","err");
        }}
      />}
      {fusionModal&&<FusionModal collection={collection} cardLevels={cardLevels} onFuse={(foilCard,orig)=>{
        let removed=0;
        const newColl=collection.filter(c=>{ if(c.id===orig.id&&!c.foil&&removed<3){removed++;return false;} return true; });
        setCollection([...newColl,foilCard]);
        SFX.play("achievement");
        notify(`✨ ${foilCard.name} Foil forged!`,"ach");
        updateQuest("fuse",1);
        checkAch({collection:[...newColl,foilCard],wins,coins,streak,cardLevels,decks,totalSold});
      }} onClose={()=>setFusionModal(false)}/>}
{/* TeamBattleModal removed */}
      {/* Battle Result Overlay */}
      {battleResult&&<div style={{position:"fixed",inset:0,zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",background:"#000000cc",backdropFilter:"blur(8px)"}}>
        <div style={{background:battleResult.won?"linear-gradient(135deg,#052e16,#14532d)":"linear-gradient(135deg,#1a0000,#7f1d1d)",border:"2px solid "+(battleResult.won?"#22c55e":"#ef4444"),borderRadius:20,padding:32,textAlign:"center",maxWidth:300,width:"90%",boxShadow:"0 0 60px "+(battleResult.won?"#22c55e44":"#ef444444"),animation:"fadeIn .4s ease-out"}}>
          <div style={{fontSize:56,marginBottom:8}}>{battleResult.won?"🏆":"💀"}</div>
          <div style={{color:battleResult.won?"#22c55e":"#ef4444",fontWeight:900,fontSize:24,marginBottom:4}}>{battleResult.won?"Victory!":"Defeated"}</div>
          <div style={{color:"#94a3b8",fontSize:13,marginBottom:20}}>{battleResult.won?"Well fought, Commander":"You fought bravely"}</div>
          <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:24}}>
            <div style={{background:"#ffffff08",borderRadius:10,padding:"10px 16px",textAlign:"center"}}>
              <div style={{color:"#60a5fa",fontWeight:900,fontSize:18}}>+{battleResult.xp}</div>
              <div style={{color:"#475569",fontSize:10}}>XP</div>
            </div>
            {battleResult.coins>0&&<div style={{background:"#ffffff08",borderRadius:10,padding:"10px 16px",textAlign:"center"}}>
              <div style={{color:"#c084fc",fontWeight:900,fontSize:18}}>+{battleResult.coins}</div>
              <div style={{color:"#475569",fontSize:10}}>💎 Gems</div>
            </div>}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setBattleResult(null);setBattleCard(null);}} style={{flex:1,background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:10,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>← Back</button>
            <button onClick={()=>{const _rc=battleResult.cardName;setBattleResult(null);const _c=ALL_CARDS.find(x=>x.name===_rc);if(_c)setBattleCard(_c);}} style={{flex:1,background:battleResult.won?"linear-gradient(135deg,#15803d,#22c55e)":"linear-gradient(135deg,#991b1b,#ef4444)",color:"white",border:"none",borderRadius:10,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>⚔️ Again</button>
          </div>
        </div>
      </div>}

      {/* Onboarding Overlay — only shows on first visit, step by step */}
      {onboardingStep===-1&&collection.length===0&&<div style={{position:"fixed",inset:0,zIndex:5000,display:"flex",alignItems:"center",justifyContent:"center",background:"#000000ee",backdropFilter:"blur(10px)"}}>
        <div style={{background:"linear-gradient(135deg,#0f0a1e,#1e0a3c)",border:"1px solid var(--t1b)",borderRadius:20,padding:32,maxWidth:320,width:"90%",textAlign:"center",animation:"fadeIn .5s ease-out"}}>
          <div style={{fontSize:52,marginBottom:12}}>🌌</div>
          <div style={{color:"#a855f7",fontSize:9,letterSpacing:4,fontWeight:800,marginBottom:8}}>WELCOME COMMANDER</div>
          <div style={{color:"white",fontWeight:900,fontSize:20,marginBottom:10}}>Your first mission</div>
          <div style={{color:"#64748b",fontSize:13,lineHeight:1.7,marginBottom:24}}>
            Open your free Starter Pack to begin your collection. Then head to Battle to test your cards. Complete Quests to earn gems and grow stronger.
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {[{i:"🎁",t:"Open your free daily pack",s:"Home screen · claim it now"},
              {i:"⚔️",t:"Battle with your cards",s:"Battle tab · pick a card to fight"},
              {i:"🎯",t:"Complete daily quests",s:"Quests tab · earn bonus gems"}
            ].map((step,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:"#ffffff06",borderRadius:10,padding:"10px 14px",textAlign:"left"}}>
                <span style={{fontSize:20,flexShrink:0}}>{step.i}</span>
                <div>
                  <div style={{color:"white",fontWeight:700,fontSize:12}}>{step.t}</div>
                  <div style={{color:"#475569",fontSize:10}}>{step.s}</div>
                </div>
              </div>
            ))}
          </div>
          <button onClick={()=>{setOnboardingStep(0);S.set("onboardingDone",true);SFX.play("click");}} style={{width:"100%",background:"linear-gradient(135deg,var(--t1),var(--t2))",color:"white",border:"none",borderRadius:12,padding:"14px",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 0 20px #a855f744"}}>
            Let's Go! 🚀
          </button>
        </div>
      </div>}

      </div>{/* end zIndex content wrapper */}
      </div>{/* end main column */}
      </div>{/* end body flex */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
</html>
