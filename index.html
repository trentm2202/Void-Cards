              ?<div style={{textAlign:"center",padding:40,color:"#334155"}}>
                <div style={{fontSize:48,marginBottom:10}}>⭐</div>
                <div>Go to Missing tab and star cards you want!</div>
              </div>
              :<div style={{display:"flex",flexWrap:"wrap",gap:10,padding:"8px 4px"}}>
                {wishCards.map((c,i)=>{
                  const owned=ownedIds.has(c.id);
                  return(
                    <div key={i} style={{position:"relative",flexShrink:0}}>
                      <div style={{filter:owned?"none":"grayscale(0.6) brightness(0.6)",pointerEvents:"none"}}>
                        <Card card={c} mini level={1}/>
                      </div>
                      {owned&&<div style={{position:"absolute",top:2,left:2,background:"#22c55e",color:"white",borderRadius:4,fontSize:7,fontWeight:800,padding:"1px 4px"}}>✓ Owned</div>}
                      <button onClick={()=>toggleWishlist(c.id)}
                        style={{position:"absolute",top:2,right:2,background:"#f59e0b",border:"none",borderRadius:999,width:18,height:18,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>
                        ★
                      </button>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        );
      })()}

      {/* Decks section */}
      {binderSection==="decks"&&<div>
        <button onClick={()=>{SFX.play("click");setDeckBuilder(true);}}
          style={{width:"100%",background:"linear-gradient(135deg,var(--t1),var(--t2))",color:"white",border:"none",borderRadius:12,padding:"12px",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:14}}>
          + Build New Deck
        </button>
        {decks.length===0
          ?<div style={{textAlign:"center",color:"#334155",padding:"40px 0"}}>
            <div style={{fontSize:48,marginBottom:12}}>📋</div>
            <div>No saved decks yet — build one above!</div>
          </div>
          :<div style={{display:"flex",flexDirection:"column",gap:10}}>
            {decks.map((d,i)=>{
              const COST={Common:1,Uncommon:1,Rare:2,Epic:3,Legendary:4};
              const avg=(d.cards.reduce((s,c)=>s+(COST[c.rarity]||1),0)/d.cards.length).toFixed(1);
              const rarityCount={};d.cards.forEach(c=>{rarityCount[c.rarity]=(rarityCount[c.rarity]||0)+1;});
              return <div key={i} style={{background:"linear-gradient(135deg,#0f172a,#1e0a3c)",border:"1px solid #4c1d9544",borderRadius:12,padding:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div>
                    <div style={{color:"white",fontWeight:800,fontSize:14}}>{d.name}</div>
                    <div style={{color:"#475569",fontSize:11,marginTop:2}}>
                      {d.cards.length} cards · avg cost {avg} · {Object.entries(rarityCount).map(([r,n])=>`${n} ${r}`).join(", ")}
                    </div>
                  </div>
                  <button onClick={()=>onDeleteDeck&&onDeleteDeck(i)}
                    style={{background:"#1a0000",color:"#ef4444",border:"1px solid #7f1d1d",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    🗑 Delete
                  </button>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {d.cards.map((c,j)=><Card key={j} card={c} mini level={1}/>)}
                </div>
              </div>;
            })}
          </div>
        }
      </div>}

      {binderSection==="cards"&&<div>
      {/* Quick actions */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={()=>{SFX.play("click");setShowDupesModal?.(true);}} style={{background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",color:"white",border:"none",borderRadius:8,padding:"8px 12px",fontSize:11,fontWeight:600,cursor:"pointer",flex:1}}>♻️ Manage Dupes</button>
        <button onClick={()=>{SFX.play("click");setDeckBuilder(true);}} style={{background:"linear-gradient(135deg,var(--t3),var(--t2))",color:"white",border:"none",borderRadius:8,padding:"8px 12px",fontSize:11,fontWeight:600,cursor:"pointer",flex:1}}>🃏 Decks</button>
        <button onClick={()=>{SFX.play("click");setFusionModal(true);}} style={{background:"linear-gradient(135deg,#b45309,#f59e0b)",color:"#000",border:"none",borderRadius:8,padding:"8px 12px",fontSize:11,fontWeight:700,cursor:"pointer",flex:1}}>✨ Fuse</button>
        <button onClick={()=>{SFX.play("click");setShowDupesOnly?.(!showDupesOnly);}} style={{background:showDupesOnly?"linear-gradient(135deg,#0e7490,#06b6d4)":"#1e293b",color:showDupesOnly?"white":"#64748b",border:`1px solid ${showDupesOnly?"#06b6d4":"#334155"}`,borderRadius:8,padding:"8px 10px",fontSize:11,fontWeight:600,cursor:"pointer",position:"relative"}}>
          🎴 Dupes{dupeCount>0&&<span style={{position:"absolute",top:-5,right:-5,background:"#ef4444",color:"white",fontSize:8,fontWeight:800,borderRadius:999,width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center"}}>{dupeCount}</span>}
        </button>
      </div>

      {/* Search */}
      <div style={{position:"relative",marginBottom:10}}>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#475569",fontSize:14}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search cards, types, specials..."
          style={{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 10px 10px 32px",color:"white",fontSize:13,boxSizing:"border-box"}}/>
        {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:16}}>×</button>}
      </div>

      {/* Rarity filter pills */}
      <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
        {rarities.map(r=>{
          const rc=r==="All"?{color:"#94a3b8"}:r==="Foil"?{color:"#f59e0b"}:RC[r]||{color:"#94a3b8"};
          const active=rarityFilter===r;
          return <button key={r} onClick={()=>{SFX.play("click");setRarityFilter(r);}} style={{background:active?rc.color+"22":"#1e293b",color:active?rc.color:"#64748b",border:`1px solid ${active?rc.color:"#334155"}`,borderRadius:20,padding:"4px 10px",fontSize:10,fontWeight:active?700:400,cursor:"pointer",transition:"all .15s"}}>{r}</button>;
        })}
      </div>

      {/* Type filter + sort */}
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",flex:1}}>
          {types.map(t=>{
            const icons={All:"🌌",Alien:"👽",Robot:"🤖",Knight:"⚔️",Mage:"🧙",Dragon:"🐉",Beast:"🐾"};
            const active=typeFilter===t;
            return <button key={t} onClick={()=>{SFX.play("click");setTypeFilter(t);}} style={{background:active?"#4c1d95":"#1e293b",color:active?"white":"#64748b",border:`1px solid ${active?"#7c3aed":"#334155"}`,borderRadius:20,padding:"4px 9px",fontSize:10,fontWeight:active?700:400,cursor:"pointer"}}>{icons[t]} {t}</button>;
          })}
        </div>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#94a3b8",fontSize:10,padding:"5px 8px",cursor:"pointer"}}>
          <option value="rarity">By Rarity</option>
          <option value="power">By Power</option>
          
          <option value="name">A-Z</option>
        </select>
      </div>

      {/* Results count */}
      <div style={{color:"#475569",fontSize:11,marginBottom:10}}>{filtered.length} card{filtered.length!==1?"s":""} shown</div>

      {/* Card grid */}
      {filtered.length===0
        ?<div style={{textAlign:"center",padding:40,color:"#334155"}}>
          <div style={{fontSize:40,marginBottom:10}}>🔍</div>
          <div>No cards match your search</div>
        </div>
        :<div style={{display:"flex",flexWrap:"wrap",gap:12,padding:"8px 4px"}}>
          {filtered.map((c,i)=>{
            const isNew=newCardIds.has(c.id);
            return (
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,position:"relative",flexShrink:0}}>
                {isNew&&<div style={{position:"absolute",top:-4,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white",fontSize:7,fontWeight:800,borderRadius:4,padding:"2px 6px",letterSpacing:1,zIndex:10,whiteSpace:"nowrap",boxShadow:"0 0 8px #22c55e88",animation:"pulse 1.5s ease-in-out infinite"}}>✨ NEW</div>}
                <Card card={c} mini onClick={(card)=>{setDetail(card);if(newCardIds.has(card.id)){const s=new Set(newCardIds);s.delete(card.id);setNewCardIds(s);}}} count={countById[c.id]>1?countById[c.id]:undefined} level={1}/>

              </div>
            );
          })}
        </div>
      }

      {/* Series 2 Teaser */}
      <div style={{marginTop:28,background:"linear-gradient(135deg,#0a0014,#0f0828)",border:"1px solid #7c3aed44",borderRadius:16,padding:20,textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 10px,#ffffff02 10px,#ffffff02 20px)",pointerEvents:"none"}}/>
        <div style={{fontSize:36,marginBottom:8,animation:"float 3s ease-in-out infinite"}}>🌌</div>
        <div style={{color:"#a855f7",fontSize:9,fontWeight:800,letterSpacing:4,marginBottom:6}}>COMING SOON</div>
        <div style={{fontSize:18,fontWeight:900,color:"white",marginBottom:6}}>SERIES 2</div>
        <div style={{color:"#94a3b8",fontSize:12,marginBottom:14,lineHeight:1.6}}>New card types · New abilities · New rarities</div>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:14}}>
          {[0,1,2,3,4].map(i=>(
            <div key={i} style={{width:40,height:56,borderRadius:8,background:"linear-gradient(135deg,#1a0030,#0a0014)",border:"1px solid #7c3aed44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#7c3aed",fontWeight:900}}>?</div>
          ))}
        </div>
        <div style={{background:"linear-gradient(135deg,#2e1065,#1e0a3c)",border:"1px solid #7c3aed44",borderRadius:8,padding:"8px 16px",display:"inline-block"}}>
          <span style={{color:"#c084fc",fontSize:11,fontWeight:700}}>🚀 Arriving in the next update — stay tuned!</span>
        </div>
      </div>
      </div>}
    </div>
  );
}

function SellModal({ card, onClose, onSell }) {
  const rc=RC[card.rarity];
  const suggested={Legendary:1200,Epic:400,Rare:150,Uncommon:60,Common:20}[card.rarity];
  const [price,setPrice]=useState(suggested);
  const [customPrice,setCustomPrice]=useState(String(suggested));
  const [duration,setDuration]=useState(2);
  const DURATIONS=[2,4,6,12,24];
  const handleCustom=(v)=>{
    setCustomPrice(v);
    const n=parseInt(v);
    if(!isNaN(n)&&n>0) setPrice(n);
  };
  return (
    <Modal onClose={onClose} title={`List ${card.name}`}>
      <div style={{maxWidth:340,margin:"0 auto",textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><Card card={card}/></div>
        <div style={{background:"#1e293b",borderRadius:12,padding:16,marginBottom:14}}>

          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:10}}>

// ── Deck Builder ──────────────────────────────────────────────────────────────
function DeckBuilderModal({ collection, cardLevels, onSave, onClose, editDeck=null }) {
  const [selected,setSelected]=useState(editDeck?editDeck.cards.slice(0,12):[]);
  const [deckName,setDeckName]=useState(editDeck?editDeck.name:"My Deck");
  const [filter,setFilter]=useState("All");
  const MIN=4; const MAX=12; const MAX_COPIES=2; const MAX_FOIL=3;
  const unique=[...new Map(collection.map(c=>[c.id+(c.foil?"f":""),c])).values()];
  const RARITIES=["All","Common","Uncommon","Rare","Epic","Legendary"];
  const filtered=filter==="All"?unique:unique.filter(c=>c.rarity===filter);

  const toggle=(card)=>{
    SFX.play("click");
    const copyCount=selected.filter(c=>c.id===card.id&&!!c.foil===!!card.foil).length;
    const foilCount=selected.filter(c=>c.foil).length;
    const inDeck=selected.find(c=>c.id===card.id&&!!c.foil===!!card.foil);
    if(inDeck){
      // Remove one copy
      const idx=selected.findIndex(c=>c.id===card.id&&!!c.foil===!!card.foil);
      setSelected(s=>s.filter((_,i)=>i!==idx));
    } else {
      if(selected.length>=MAX){return;}
      if(copyCount>=MAX_COPIES){addDeckMsg(`Max ${MAX_COPIES} copies of the same card per deck.`);return;}
      if(card.foil&&foilCount>=MAX_FOIL){addDeckMsg(`Max ${MAX_FOIL} foil cards per deck.`);return;}
      setSelected(s=>[...s,card]);
    }
  };

  const [deckMsg,setDeckMsg]=useState("");
  const addDeckMsg=(msg)=>{setDeckMsg(msg);setTimeout(()=>setDeckMsg(""),2000);};

  const canSave=selected.length>=MIN&&selected.length<=MAX;
  const saveMsg=selected.length<MIN?`Need at least ${MIN} cards`:selected.length>MAX?`Max ${MAX} cards`:"Ready!";

  // Mana cost breakdown
  const COST={Common:1,Uncommon:1,Rare:2,Epic:3,Legendary:4};
  const totalCost=selected.reduce((s,c)=>s+(COST[c.rarity]||1),0);
  const avgCost=selected.length?(totalCost/selected.length).toFixed(1):0;

  return (
    <Modal onClose={onClose} title="🃏 Deck Builder">
      <div style={{maxWidth:600,margin:"0 auto"}}>
        {/* Deck name */}
        <div style={{background:"#1e293b",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",gap:10,alignItems:"center"}}>
          <span style={{color:"#64748b",fontSize:12}}>Name:</span>
          <input value={deckName} onChange={e=>setDeckName(e.target.value)}
            style={{background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"6px 10px",color:"white",fontSize:13,flex:1}}/>
        </div>

        {/* Selected cards + stats */}
        <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:12,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{color:"white",fontWeight:700,fontSize:13}}>Deck ({selected.length}/{MAX})</span>
            <div style={{display:"flex",gap:8}}>
              <span style={{color:"#475569",fontSize:10}}>Avg cost: <span style={{color:"#a855f7",fontWeight:700}}>{avgCost}</span></span>
              <span style={{color:selected.length>=MIN?"#22c55e":"#94a3b8",fontSize:10,fontWeight:600}}>
                {selected.length}/{MAX} cards
              </span>
            </div>
          </div>
          {/* Progress bar */}
          <div style={{background:"#1e293b",borderRadius:999,height:6,marginBottom:10}}>
            <div style={{width:`${selected.length/MAX*100}%`,height:"100%",background:canSave?"linear-gradient(90deg,#22c55e,#16a34a)":"linear-gradient(90deg,#a855f7,#7c3aed)",borderRadius:999,transition:"width .3s"}}/>
          </div>
          {selected.length===0
            ?<div style={{color:"#334155",fontSize:12,textAlign:"center",padding:"12px 0"}}>Tap cards below to add to deck</div>
            :<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {selected.map((c,i)=>(
                <div key={i} style={{position:"relative"}}>
                  <Card card={c} mini level={1}/>
                  <button onClick={()=>toggle(c)} style={{position:"absolute",top:2,left:2,background:"#ef4444",color:"white",border:"none",borderRadius:999,width:16,height:16,fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,lineHeight:1}}>×</button>
                  <div style={{position:"absolute",bottom:2,right:2,background:"#0f172a88",borderRadius:4,padding:"1px 4px",fontSize:8,color:"#a855f7",fontWeight:700}}>{COST[c.rarity]||1}</div>
                </div>
              ))}
            </div>
          }
        </div>

        {/* Save button + status */}
        <button disabled={!canSave} onClick={()=>{if(!canSave)return;SFX.play("achievement");onSave({name:deckName,cards:selected});}}
          style={{background:canSave?"linear-gradient(135deg,var(--t1),var(--t2))":"#1e293b",color:canSave?"white":"#475569",border:"none",borderRadius:12,padding:"12px",width:"100%",fontWeight:700,fontSize:14,cursor:canSave?"pointer":"not-allowed",marginBottom:4}}>
          💾 {canSave?`Save "${deckName}"`:saveMsg}
        </button>
        {deckMsg&&<div style={{color:"#ef4444",fontSize:11,textAlign:"center",marginBottom:6,fontWeight:700}}>{deckMsg}</div>}
        <div style={{color:"#334155",fontSize:10,textAlign:"center",marginBottom:14}}>
          Min 4 cards · Max 12 cards · Max 2 copies per card · Max 3 foil per deck
        </div>

        {/* Rarity filter */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {RARITIES.map(r=>(
            <button key={r} onClick={()=>setFilter(r)}
              style={{background:filter===r?(RC[r]?.color||"#a855f7"):"#1e293b",color:filter===r?(r==="Common"||r==="Uncommon"?"#000":"white"):"#64748b",border:`1px solid ${filter===r?(RC[r]?.color||"#a855f7"):"#334155"}`,borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              {r} {r!=="All"&&`(${unique.filter(c=>c.rarity===r).length})`}
            </button>
          ))}
        </div>

        {/* Card grid */}
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {filtered.map((c,i)=>{
            const inDeck=!!selected.find(s=>s.id===c.id);
            const full=selected.length>=MAX&&!inDeck;
            return <div key={i} style={{opacity:full?0.35:1,cursor:full?"not-allowed":"pointer"}}>
              <Card card={c} mini selected={inDeck} onClick={()=>!full&&toggle(c)} level={1}/>
            </div>;
          })}
        </div>
      </div>
    </Modal>
  );
}

function DailyShopModal({collection, coins, onBuy, onClose, packsSinceLeg, onBuyPack, lastAdWatch, onWatchAd}) {
  const [shopTab, setShopTab] = useState("packs");

  // Daily seed - refreshes at midnight CST (UTC-6)
  const nowCST = new Date(Date.now() - 6*60*60*1000);
  const todayCST = nowCST.toISOString().slice(0,10);
  const seed = todayCST.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rr = (n,offset=0) => ((seed*(n+offset+1)*1664525+1013904223)&0x7fffffff)/0x7fffffff;

  // 5 daily cards: 1 Legendary chance (~10%), 1 Epic, 1 Rare, 2 Uncommon/Common
  const pickCard = (pool, idx) => pool[Math.floor(rr(pool.length, idx)*pool.length)];
  const usedIds = new Set();
  const pickUniqueCard = (pool, idx) => {
    const available = pool.filter(c=>!usedIds.has(c.id));
    const card = available[Math.floor(rr(available.length, idx)*available.length)];
    if(card) usedIds.add(card.id);
    return card;
  };
  const isLeg = rr(1)<0.10;
  const dailyCards = [
    { card: pickUniqueCard(isLeg ? ALL_CARDS.filter(c=>c.rarity==="Legendary") : ALL_CARDS.filter(c=>c.rarity==="Epic"), 0), price: isLeg ? 1200 : 500 },
    { card: pickUniqueCard(ALL_CARDS.filter(c=>c.rarity==="Epic"), 1), price: 450 },
    { card: pickUniqueCard(ALL_CARDS.filter(c=>c.rarity==="Rare"), 2), price: 200 },
    { card: pickUniqueCard(ALL_CARDS.filter(c=>["Uncommon","Common"].includes(c.rarity)), 3), price: 80 },
    { card: pickUniqueCard(ALL_CARDS.filter(c=>["Uncommon","Common"].includes(c.rarity)), 4), price: 60 },
  ];

  // Countdown to midnight CST
  const msUntilMidnightCST = () => {
    const now = new Date();
    const midnightCST = new Date();
    midnightCST.setUTCHours(6,0,0,0); // midnight CST = 06:00 UTC
    if(midnightCST <= now) midnightCST.setUTCDate(midnightCST.getUTCDate()+1);
    return midnightCST - now;
  };
  const [countdown, setCountdown] = useState(msUntilMidnightCST());
  useEffect(()=>{
    const t = setInterval(()=>setCountdown(msUntilMidnightCST()), 1000);
    return ()=>clearInterval(t);
  },[]);
  const fmtCountdown = ms => {
    const h = Math.floor(ms/3600000);
    const m = Math.floor((ms%3600000)/60000);
    const s = Math.floor((ms%60000)/1000);
    return `${h}h ${m}m ${s}s`;
  };

  // Ad cooldown (30 min)
  const AD_COOLDOWN = 30*60*1000;
  const [adWatching, setAdWatching] = useState(false);
  const [adCountdown, setAdCountdown] = useState(0);
  const canWatchAd = !lastAdWatch || (Date.now()-lastAdWatch) >= AD_COOLDOWN;
  const adCooldownLeft = lastAdWatch ? Math.max(0, AD_COOLDOWN-(Date.now()-lastAdWatch)) : 0;
  const fmtAdCooldown = ms => {
    const m = Math.floor(ms/60000);
    const s = Math.floor((ms%60000)/1000);
    return `${m}:${s.toString().padStart(2,'0')}`;
  };
  const [adDisplay, setAdDisplay] = useState(adCooldownLeft);
  useEffect(()=>{
    if(canWatchAd) return;
    const t = setInterval(()=>setAdDisplay(Math.max(0,AD_COOLDOWN-(Date.now()-lastAdWatch))),1000);
    return ()=>clearInterval(t);
  },[lastAdWatch]);

  const startAd = () => {
    SFX.play("click");
    setAdWatching(true);
    setAdCountdown(5);
    const t = setInterval(()=>{
      setAdCountdown(n=>{
        if(n<=1){ clearInterval(t); setAdWatching(false); onWatchAd(); return 0; }
        return n-1;
      });
    },1000);
  };

  const owned = new Set(collection.map(c=>c.id));

  const tabBtn = (id, label, color) => (
    <button onClick={()=>{SFX.play("click");setShopTab(id);}}
      style={{flex:1,background:shopTab===id?color+"22":"transparent",color:shopTab===id?color:"#475569",
        border:`1px solid ${shopTab===id?color:"#1e293b"}`,borderRadius:8,padding:"8px 4px",
        fontSize:11,fontWeight:shopTab===id?700:400,cursor:"pointer",transition:"all .15s"}}>
      {label}
    </button>
  );

  return (
    <Modal onClose={onClose} title="🏪 Shop">
      <div style={{maxWidth:520,margin:"0 auto"}}>

        {/* Gem balance */}

          <span style={{color:"#64748b",fontSize:12}}>Your balance</span>
          <span style={{color:"#a855f7",fontWeight:900,fontSize:18}}>💎 {coins.toLocaleString()}</span>
        </div>

        {/* Tab bar */}
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {tabBtn("packs","🪐 Packs","#a855f7")}
          {tabBtn("cards","🔄 Rotating Cards","#06b6d4")}
          {tabBtn("purchases","💳 Purchases","#f59e0b")}
        </div>

        {/* PACKS TAB */}
        {shopTab==="packs"&&<>
          <div style={{background:"linear-gradient(135deg,#1c1008,#2d1a00)",border:"1px solid #f59e0b44",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{color:"#f59e0b",fontWeight:700,fontSize:12}}>🌟 Guaranteed Legendary</div>

            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {PACKS.map(p=>(
              <div key={p.id} style={{background:"linear-gradient(135deg,#0f172a,#1e0a3c)",border:"1px solid #2e1065",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>

function StarField({tab}) {
  const stars = React.useMemo(()=>[...Array(140)].map((_,i)=>({
    x: ((i*1664525+1013904223)&0x7fffffff)/0x7fffffff*100,
    y: ((i*22695477+1)&0x7fffffff)/0x7fffffff*100,
    r: ((i*2654435761+1013904223)&0xff)/255*2.2+0.3,
    dur: 2+((i*1013904223)&0x7fffffff)/0x7fffffff*7,
    del: ((i*22695477)&0x7fffffff)/0x7fffffff*6,
    layer: i%3, // 0=near,1=mid,2=far
  })),[]);
  const shoots = React.useMemo(()=>[...Array(4)].map((_,i)=>({
    x: 10+i*22, y: 5+i*8,
    dur: 2.5+i*1.2,
    del: 3+i*4.5,
  })),[]);
  return (
    <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
      <style>{`
        @keyframes starTwinkle{0%,100%{opacity:0.15;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
        @keyframes starTwinkleFar{0%,100%{opacity:0.05;transform:scale(1)}50%{opacity:0.4;transform:scale(1.2)}}
        @keyframes shootingStar{0%{transform:translateX(0) translateY(0) rotate(-35deg);opacity:0} 5%{opacity:1} 100%{transform:translateX(600px) translateY(300px) rotate(-35deg);opacity:0}}
      `}</style>
      {/* Far layer — dim */}
      {stars.filter(s=>s.layer===2).map((s,i)=>(
        <div key={"f"+i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.r*0.8,height:s.r*0.8,borderRadius:"50%",background:"#a0c4ff",opacity:0,animation:"starTwinkleFar "+s.dur+"s "+s.del+"s ease-in-out infinite"}}/>
      ))}
      {/* Mid layer */}
      {stars.filter(s=>s.layer===1).map((s,i)=>(

function ResetPasswordScreen({token, refreshToken, onDone}){
  const [password,setPassword]=useState("");
  const [confirm,setConfirm]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [success,setSuccess]=useState(false);

  const submit=async()=>{
    // Validate first — before touching any tokens
    if(password.length<8){setError("Password must be at least 8 characters.");return;}
    if(password!==confirm){setError("Passwords don't match.");return;}
    setLoading(true);setError("");
    try{
      // Exchange refresh token for fresh session right before updating password
      let sessionToken=token;
      if(refreshToken){
        const tr=await fetch(sb._url+"/auth/v1/token?grant_type=refresh_token",{
          method:"POST",
          headers:{"Content-Type":"application/json","apikey":sb._key},
          body:JSON.stringify({refresh_token:refreshToken})
        });
        const td=await tr.json();
        if(td.access_token) sessionToken=td.access_token;
      }
      const r=await fetch(sb._url+"/auth/v1/user",{
        method:"PUT",
        headers:{"Content-Type":"application/json","apikey":sb._key,"Authorization":"Bearer "+sessionToken},
        body:JSON.stringify({password})
      });
      const d=await r.json();
      if(d.id||d.email){setSuccess(true);setTimeout(onDone,2000);}
      else{setError(d.message||d.error_description||"Something went wrong. Please request a new reset link.");}
    }catch(e){setError("Connection error.");}
    setLoading(false);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"linear-gradient(180deg,#020617,#0f0a1e)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000,padding:20}}>
      <div style={{width:"100%",maxWidth:340}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:10}}>🔐</div>
          <div style={{color:"#a855f7",fontSize:9,letterSpacing:5,fontWeight:800,marginBottom:4}}>GALACTIC</div>
          <div style={{fontSize:26,fontWeight:900,background:"linear-gradient(135deg,#e2e8f0,#a855f7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>VOID CARDS</div>
          <div style={{color:"#475569",fontSize:12,marginTop:6}}>Set your new password</div>
        </div>
        <div style={{background:"linear-gradient(135deg,#0f0a1e,#1e0a3c)",border:"1px solid #4c1d9555",borderRadius:16,padding:24}}>
          {success
            ?<div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:40,marginBottom:12}}>✅</div>
              <div style={{color:"#22c55e",fontWeight:800,fontSize:16,marginBottom:6}}>Password Updated!</div>
              <div style={{color:"#64748b",fontSize:12}}>Redirecting to sign in...</div>
            </div>
            :<>
              <div style={{marginBottom:12}}>
                <div style={{color:"#64748b",fontSize:11,fontWeight:600,marginBottom:5}}>NEW PASSWORD</div>
                <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="Min 8 characters"
                  style={{width:"100%",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:"11px 14px",color:"white",fontSize:13,boxSizing:"border-box"}}
                  onKeyDown={e=>e.key==="Enter"&&submit()}/>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{color:"#64748b",fontSize:11,fontWeight:600,marginBottom:5}}>CONFIRM PASSWORD</div>
                <input value={confirm} onChange={e=>setConfirm(e.target.value)} type="password" placeholder="Repeat your password"
                  style={{width:"100%",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:"11px 14px",color:"white",fontSize:13,boxSizing:"border-box"}}
                  onKeyDown={e=>e.key==="Enter"&&submit()}/>
              </div>
              {error&&<div style={{background:"#1a0000",border:"1px solid #ef444455",borderRadius:8,padding:"10px 12px",color:"#ef4444",fontSize:12,marginBottom:14}}>{error}</div>}
              <button onClick={submit} disabled={loading} style={{width:"100%",background:loading?"#1e293b":"linear-gradient(135deg,var(--t1),var(--t2))",color:"white",border:"none",borderRadius:10,padding:"13px",fontWeight:800,fontSize:14,cursor:loading?"not-allowed":"pointer"}}>
                {loading?"Updating...":"Update Password 🚀"}
              </button>
            </>
          }
        </div>
      </div>
    </div>
  );
}

function useWindowWidth(){
  const [w,setW]=useState(typeof window!=="undefined"?window.innerWidth:375);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener("resize",h);
    return ()=>window.removeEventListener("resize",h);
  },[]);
  return w;
}

// ── Fusion Tab ────────────────────────────────────────────────────────────────
function FusionTab({collection,unique,setDetail,setCollection,notify,updateQuest,checkAch,wins,coins,streak,cardLevels,decks,totalSold}){
  const [showFusable,setShowFusable]=useState(false);
  const [selected,setSelected]=useState(null);
  const countById={};collection.forEach(c=>{countById[c.id]=(countById[c.id]||0)+1;});
  const fusable=ALL_CARDS.filter(c=>countById[c.id]>=3&&!collection.find(x=>x.id===c.id&&x.foil));
  const foils=unique.filter(c=>c.foil);

  const doFuse=(card)=>{
    if(card.rarity==="God"){notify("God cards cannot be fused.","err");return;}
    SFX.play("fusion");
    const foilPow=Math.round(card.power*1.2);
    const foilHp=Math.round(card.hp*1.2);
    const foilDef=Math.round(card.defense*1.2);
    const foilCard={...card,foil:true,power:foilPow,hp:foilHp,defense:foilDef};
    let removed=0;
    const newColl=collection.filter(c=>{if(c.id===card.id&&!c.foil&&removed<3){removed++;return false;}return true;});
    setCollection([...newColl,foilCard]);
    notify(`✨ ${card.name} Foil forged!`,"ach");
    updateQuest("fuse",1);
    checkAch({collection:[...newColl,foilCard],wins,coins,streak,cardLevels,decks,totalSold});
    setSelected(null);
    setShowFusable(false);
  };

  return(
    <div style={{animation:"tabFadeIn .25s ease-out"}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>✨ Fusion Lab</div>
      <div style={{color:"#64748b",fontSize:13,marginBottom:14}}>Combine 3 copies of any card into a Foil with +20% stats</div>

      {/* Foil cards owned */}
      {foils.length>0&&<>
        <div style={{color:"#f59e0b",fontSize:12,fontWeight:700,marginBottom:10}}>⭐ Your Foil Cards ({foils.length})</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:20}}>
          {foils.map((c,i)=><Card key={i} card={c} mini level={1} onClick={setDetail}/>)}
        </div>
      </>}

      {/* Fusable cards button */}
      {fusable.length>0&&!showFusable&&<button onClick={()=>{setShowFusable(true);SFX.play("click");}}
        style={{width:"100%",background:"linear-gradient(135deg,#92400e,#f59e0b)",color:"#000",border:"none",borderRadius:12,padding:"14px",fontWeight:800,fontSize:15,cursor:"pointer",marginBottom:14,boxShadow:"0 0 20px #f59e0b33"}}>
        🔬 View {fusable.length} Card{fusable.length!==1?"s":""} Ready to Fuse
      </button>}

      {fusable.length===0&&!showFusable&&<div style={{textAlign:"center",padding:40,color:"#475569",background:"linear-gradient(135deg,#1c1008,#2d1a00)",borderRadius:14,border:"1px solid #f59e0b22"}}>
        <div style={{fontSize:48,marginBottom:12}}>🔬</div>
        <div style={{fontSize:14,fontWeight:700,marginBottom:6,color:"#f59e0b"}}>No cards ready to fuse</div>
        <div style={{fontSize:12}}>Collect 3 copies of any card to unlock fusion</div>
      </div>}

      {/* Fusable grid */}
      {showFusable&&<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{color:"#f59e0b",fontWeight:700,fontSize:14}}>🔬 Ready to Fuse ({fusable.length})</div>
          <button onClick={()=>{setShowFusable(false);setSelected(null);}} style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer"}}>✕ Close</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {fusable.map(card=>(
            <div key={card.id} onClick={(e)=>{e.stopPropagation();setSelected(selected?.id===card.id?null:card);SFX.play("click");}}
              style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,WebkitTapHighlightColor:"transparent"}}>
              <div style={{position:"relative",pointerEvents:"none"}}>
                <Card card={card} mini level={1} selected={selected?.id===card.id}/>
                <div style={{position:"absolute",bottom:-4,left:"50%",transform:"translateX(-50%)",background:RC[card.rarity]?.color||"#94a3b8",color:"#000",fontSize:8,fontWeight:800,borderRadius:4,padding:"1px 5px",whiteSpace:"nowrap"}}>×{countById[card.id]}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Stat preview + fuse button */}
        {selected&&(()=>{
          const rc2=RC[selected.rarity]||{color:"#94a3b8"};
          const foilPow=Math.round(selected.power*1.2);
          const foilHp=Math.round(selected.hp*1.2);
          const foilDef=Math.round(selected.defense*1.2);
          return(
            <div style={{background:"linear-gradient(135deg,#1c1008,#2d1a00)",border:"1px solid #f59e0b66",borderRadius:14,padding:16,marginBottom:14}}>
              <div style={{color:"#f59e0b",fontWeight:700,fontSize:14,marginBottom:10}}>✨ {selected.name} → Foil</div>
              <div style={{display:"flex",gap:16,marginBottom:14}}>
                <div style={{flex:1}}>
                  <div style={{color:"#475569",fontSize:10,marginBottom:4}}>BEFORE</div>
                  <div style={{color:"#f97316",fontSize:13,fontWeight:700}}>PWR {selected.power}</div>
                  <div style={{color:"#22c55e",fontSize:13,fontWeight:700}}>HP {selected.hp}</div>
                  <div style={{color:"#3b82f6",fontSize:13,fontWeight:700}}>DEF {selected.defense}</div>
                </div>
                <div style={{color:"#f59e0b",fontSize:20,alignSelf:"center"}}>→</div>
                <div style={{flex:1}}>
                  <div style={{color:"#f59e0b",fontSize:10,marginBottom:4}}>AFTER FOIL</div>
                  <div style={{color:"#f97316",fontSize:13,fontWeight:700}}>PWR {foilPow} <span style={{color:"#22c55e",fontSize:10}}>+{foilPow-selected.power}</span></div>
                  <div style={{color:"#22c55e",fontSize:13,fontWeight:700}}>HP {foilHp} <span style={{color:"#22c55e",fontSize:10}}>+{foilHp-selected.hp}</span></div>
                  <div style={{color:"#3b82f6",fontSize:13,fontWeight:700}}>DEF {foilDef} <span style={{color:"#22c55e",fontSize:10}}>+{foilDef-selected.defense}</span></div>
                </div>
              </div>
              <div style={{color:"#64748b",fontSize:11,marginBottom:12}}>Uses 3× {selected.name} · Cannot be undone</div>
              <button onClick={()=>doFuse(selected)}
                style={{width:"100%",background:"linear-gradient(135deg,#f59e0b,#fbbf24)",color:"#000",border:"none",borderRadius:10,padding:"14px",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 0 20px #f59e0b44"}}>
                ✨ Forge Foil Card!
              </button>
            </div>
          );
        })()}
      </>}
    </div>
  );
}

  const [nodeClears,setNodeClears]=useState(()=>S.get("nodeClears",{})); // {nodeId: clearCount}
  const [stamina,setStamina]=useState(()=>{
    const saved=S.get("stamina",5);
    const lastRefill=S.get("lastStaminaRefill",Date.now());
    const playerLvl=S.get("playerLevel",1);
    const maxStam=Math.min(5+Math.floor(playerLvl/7),10);
    const elapsed=Date.now()-lastRefill;
    const offlineRefills=Math.floor(elapsed/(30*60*1000));
    return offlineRefills>0?Math.min(maxStam,saved+offlineRefills):saved;

  const [lastStaminaRefill,setLastStaminaRefill]=useState(()=>{
    const lastRefill=S.get("lastStaminaRefill",Date.now());
    const elapsed=Date.now()-lastRefill;
    const offlineRefills=Math.floor(elapsed/(30*60*1000));
    return offlineRefills>0?lastRefill+(offlineRefills*30*60*1000):lastRefill;
  });
  const [dailyShop,setDailyShop]   =useState(false);
  const [legFlash,setLegFlash]     =useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [sfxVol,setSfxVol]         =useState(()=>S.get("sfxVol",0.5));
  const [teamWins,setTeamWins]       =useState(()=>S.get("teamWins",0));
  const [pullHistory,setPullHistory] =useState(()=>S.get("pullHistory",[]));
  const [packsSinceLeg,setPacksSinceLeg]=useState(()=>S.get("packsSinceLeg",0));
  const [claimedMilestones,setClaimedMilestones]=useState(()=>S.get("claimedMilestones",[]));
  const [campaignMilestones,setCampaignMilestones]=useState(()=>S.get("campaignMilestones",[])); // [25,50,75,100] claimed
  const [campaignAdsUsedToday,setCampaignAdsUsedToday]=useState(()=>S.get("campaignAdsUsedToday",0));
  const [campaignAdsLastReset,setCampaignAdsLastReset]=useState(()=>S.get("campaignAdsLastReset",""));
  const [godCardUnlocked,setGodCardUnlocked]=useState(()=>S.get("godCardUnlocked",false));
  const [binderView,setBinderView] = useState("rarity");
  const [showDupesOnly,setShowDupesOnly] = useState(false);
  const [showDupesModal,setShowDupesModal] = useState(false);
  const [dailyFreePack,setDailyFreePack]=useState(()=>S.get("dailyFreePack",""));
  const [storedPacks,setStoredPacks]=useState(()=>S.get("storedPacks",[])); // [{id, name, icon, count, oddsKey, guaranteed, guaranteedRarity, price}]
  const [lastAdWatch,setLastAdWatch]=useState(()=>S.get("lastAdWatch",null));
  const [claimerTick,setClaimerTick]=useState(0); // force re-render after shard claim
  const cardLevels={}; // card leveling removed — kept as empty obj for prop compatibility
  const [onboardingStep,setOnboardingStep]=useState(()=>S.get("onboardingDone",false)?0:-1);
  // ── Showcase & Wishlist (Profile v2) ──────────────────────────────────────────
  const [showcaseCards,setShowcaseCards]=useState(()=>S.get("showcaseCards",[])); // [{id,uid,foil}] max 3
  const [wishlist,setWishlist]=useState(()=>S.get("wishlist",[])); // [cardId, ...]
  const [profileView,setProfileView]=useState("owner"); // "owner"|"public"
  const [showcaseConfirm,setShowcaseConfirm]=useState(null); // {card,action:"fuse"|"sell"|"trade"}
  const [showShowcaseSelector,setShowShowcaseSelector]=useState(false);
  const [battleResult,setBattleResult]=useState(null); // {won, xp, coins, cardName}

  useEffect(()=>S.set("coins",coins),[coins]);
  useEffect(()=>S.set("collection",collection),[collection]);
  useEffect(()=>S.set("playerXp",playerXp),[playerXp]);
  useEffect(()=>S.set("playerLevel",playerLevel),[playerLevel]);
  useEffect(()=>{
    const theme=THEMES.find(t=>t.id===selectedTheme)||THEMES[0];
    applyTheme(theme);
    S.set("selectedTheme",selectedTheme);
  },[selectedTheme]);
  useEffect(()=>S.set("avatar",avatar),[avatar]);
  useEffect(()=>S.set("wins",wins),[wins]);
  useEffect(()=>S.set("losses",losses),[losses]);
  useEffect(()=>S.set("totalPacks",totalPacks),[totalPacks]);
  useEffect(()=>S.set("totalSold",totalSold),[totalSold]);
  useEffect(()=>S.set("teamWins",teamWins),[teamWins]);
  useEffect(()=>S.set("pullHistory",pullHistory),[pullHistory]);
  useEffect(()=>S.set("packsSinceLeg",packsSinceLeg),[packsSinceLeg]);
  useEffect(()=>S.set("claimedMilestones",claimedMilestones),[claimedMilestones]);
  useEffect(()=>S.set("campaignMilestones",campaignMilestones),[campaignMilestones]);
  useEffect(()=>S.set("campaignAdsUsedToday",campaignAdsUsedToday),[campaignAdsUsedToday]);
  useEffect(()=>S.set("campaignAdsLastReset",campaignAdsLastReset),[campaignAdsLastReset]);
  useEffect(()=>S.set("godCardUnlocked",godCardUnlocked),[godCardUnlocked]);
  useEffect(()=>S.set("dailyFreePack",dailyFreePack),[dailyFreePack]);
  useEffect(()=>S.set("claimedStreakDays",claimedStreakDays),[claimedStreakDays]);
  useEffect(()=>S.set("storedPacks",storedPacks),[storedPacks]);
  useEffect(()=>S.set("newCardIds",[...newCardIds]),[newCardIds]);
  useEffect(()=>S.set("sfxVol",sfxVol),[sfxVol]);
  useEffect(()=>S.set("showcaseCards",showcaseCards),[showcaseCards]);
  useEffect(()=>S.set("wishlist",wishlist),[wishlist]);

  // ── Stamina regen (1 per 30 min, max = min(5+floor(level/7), 10)) ──────────
  const lastRefillRef = useRef(lastStaminaRefill);
  const mapScrollRef = useRef(null);
  useEffect(()=>{ lastRefillRef.current = lastStaminaRefill; },[lastStaminaRefill]);
  useEffect(()=>{
    const maxStam=Math.min(5+Math.floor(playerLevel/7),10);
    const t=setInterval(()=>{
      const now=Date.now();
      const elapsed=now-lastRefillRef.current;
      const refills=Math.floor(elapsed/(30*60*1000));
      if(refills>0){
        const newRefillTime=lastRefillRef.current+(refills*30*60*1000);
        lastRefillRef.current=newRefillTime;
        setLastStaminaRefill(newRefillTime);
        setStamina(s=>Math.min(maxStam,s+refills));
      }
    },15000);
    return ()=>clearInterval(t);
  },[playerLevel]);

  // ── Auction house live tick ──────────────────────────────────────────────────
  useEffect(()=>{
    if(tab!=="auction")return;
    const t=setInterval(()=>{
      setAuctions(prev=>prev.map(a=>{
        if(a.secsLeft<=0)return a;
        const newSecs=a.secsLeft-1;
        // Rival auto-bid: based on rivalSpeed (lower = more aggressive)
        let newPrice=a.price, newBids=a.bids, rivalBid=null;
        let wasLeading=a.playerBid&&a.lastBidder==="You";
        let stillLeading=wasLeading;
        if(newSecs>0 && !a.isPlayer && Math.random()*a.rivalSpeed<1){
          const rival=RIVALS[Math.floor(Math.random()*RIVALS.length)];
          const bump=a.minBid+Math.floor(Math.random()*a.minBid);
          newPrice=a.price+bump;
          newBids=a.bids+1;
          rivalBid={rival,amount:newPrice,cardName:a.card.name,isPlayer:false};
          // If player was leading, they just got outbid
          if(wasLeading){ stillLeading=false; }
        }
        if(rivalBid){
          setAuctionLog(l=>[{...rivalBid,ts:Date.now()},...l].slice(0,12));
          if(wasLeading&&!stillLeading){
            notify(`😤 Outbid on ${a.card.name}! Current: 💎${newPrice}`,"err");
          }
        }
        // Auction ends
        if(newSecs<=0){
          if(a.playerBid&&stillLeading&&!a.settled){
            // Player WON — now deduct the reserved gems
            const bidAmt=a.playerBidAmount||a.price;
            setCoins(c=>c-bidAmt);
            setWonAuction(a.card);

            return {...a,secsLeft:0,price:newPrice,bids:newBids,settled:true,playerBid:false,playerBidAmount:0};

  const xpTotalForLevel=(lv)=>{ let t=0; for(let i=1;i<Math.min(lv,200);i++) t+=xpForLevel(i); return t; };
  const givePlayerXp=(amount)=>{

      {galaxyBattle&&<GalaxyBattleModal

        onSpendStamina={(cost)=>setStamina(s=>Math.max(0,s-cost))}
        onClose={()=>setGalaxyBattle(null)}
        onWin={(gems,card)=>{
          const nodeId=galaxyBattle.id;
          // Backend sequential guard: node must be accessible
          const nodeIdx=GALAXY_NODES.findIndex(n=>n.id===nodeId);
          const isAccessible=nodeIdx===0||completedNodes.includes(GALAXY_NODES[nodeIdx-1]?.id);
          if(!isAccessible){notify("Node not yet accessible.","err");return;}

          const nw=wins+1;
          setWins(nw);
          const firstClear=!completedNodes.includes(nodeId);
          const prevClears=nodeClears[nodeId]||0;
          // Cap at 3 clears — no further reward after 3
          if(prevClears>=3&&!firstClear){
            givePlayerXp(20);
            notify(`⚔️ ${galaxyBattle.name} — max clears reached. +20 XP only.`,"ok");
            setBattleStreak(b=>b+1);
            return;
          }
          const newClears=prevClears+1;
          setNodeClears(prev=>({...prev,[nodeId]:newClears}));
          setCompletedNodes(prev=>[...new Set([...prev,nodeId])]);

          // Reward logic: 1st=100%, 2nd=50%, 3rd=50%, 4+=0% (guarded above)
          let gemReward=0;
          let bonusMsg="";
          if(firstClear){
            gemReward=gems;
            bonusMsg=`+💎${gems}`;
          } else if(newClears===2||newClears===3){
            gemReward=Math.floor(gems*0.5);
            bonusMsg=`+💎${gemReward} (${newClears===2?"2nd":"3rd"} clear)`;
          }
          if(gemReward>0) setCoins(c=>c+gemReward);
          givePlayerXp(firstClear?100+galaxyBattle.gems:40);

          // Card reward — first clear only
          if(card&&firstClear) setCollection(prev=>[...prev,card]);

          // Boss first-clear pack rewards
          let packMsg="";
          if(galaxyBattle.boss&&firstClear){
            // Award a pack based on which boss (planet 1-4 = Nebula, planet 5 = Void)
            const packName=galaxyBattle.planet===5?"Void Pack":"Nebula Pack";
            notify(`👑 Boss defeated! You earned a ${packName}!`,"ach");
            packMsg=` + ${packName}`;
            // Grant gems equivalent of pack value (actual pack opening is via store)
            const packGems=galaxyBattle.planet===5?600:250;
            setCoins(c=>c+packGems);
            bonusMsg+=` + 💎${packGems} (boss pack)`;
          }

          SFX.play("achievement");
          const cardMsg=card&&firstClear?` + ${card.name}`:"";
          notify(`🏆 ${galaxyBattle.name} defeated! ${bonusMsg}${cardMsg}`,"ach");
          updateQuest("wins",1);
          updateQuest("battle",1);
          checkAch({collection,wins:nw,coins:coins+gemReward,streak,cardLevels,decks,totalSold,teamWins});
          setBattleStreak(b=>b+1);

          // Campaign milestone check (global first clears only)
          if(firstClear){
            const newCompleted=new Set([...completedNodes,nodeId]);
            const totalFirstClears=newCompleted.size;
            const CAMPAIGN_MILESTONE_THRESHOLDS=[
              {pct:25,nodes:25,reward:"Rare Pack",gems:500,id:25},
              {pct:50,nodes:50,reward:"Epic Pack",gems:1000,id:50},
              {pct:75,nodes:75,reward:"Legendary Pack",gems:2000,id:75},
              {pct:100,nodes:100,reward:"Final Milestone",gems:0,id:100},
            ];
            CAMPAIGN_MILESTONE_THRESHOLDS.forEach(m=>{
              if(totalFirstClears>=m.nodes&&!campaignMilestones.includes(m.id)){
                setCampaignMilestones(prev=>[...prev,m.id]);
                if(m.id<100){
                  setCoins(c=>c+m.gems);
                  notify(`🌟 Campaign Milestone ${m.pct}%! +💎${m.gems} (${m.reward})!`,"ach");
                } else {
                  notify("🌌 100% Campaign complete! Final boss awaits...","ach");
                }
              }
            });

            // God card unlock: 100% completion AND final boss (node 100) first cleared
            if(nodeId===100&&!godCardUnlocked){
              setGodCardUnlocked(true);
              notify("🌟 GOD CARD UNLOCKED! The Void Reaper's power is yours!","ach");
            }
          }
        }}
        onLose={()=>{
          setLosses(l=>l+1);

{/* TeamBattleModal removed */}
      {/* Battle Result Overlay */}
      {battleResult&&<div style={{position:"fixed",inset:0,zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",background:"#000000cc",backdropFilter:"blur(8px)"}}>
        <div style={{background:battleResult.won?"linear-gradient(135deg,#052e16,#14532d)":"linear-gradient(135deg,#1a0000,#7f1d1d)",border:"2px solid "+(battleResult.won?"#22c55e":"#ef4444"),borderRadius:20,padding:32,textAlign:"center",maxWidth:300,width:"90%",boxShadow:"0 0 60px "+(battleResult.won?"#22c55e44":"#ef444444"),animation:"fadeIn .4s ease-out"}}>
          <div style={{fontSize:56,marginBottom:8}}>{battleResult.won?"🏆":"💀"}</div>
          <div style={{color:battleResult.won?"#22c55e":"#ef4444",fontWeight:900,fontSize:24,marginBottom:4}}>{battleResult.won?"Victory!":"Defeated"}</div>
          <div style={{color:"#94a3b8",fontSize:13,marginBottom:20}}>{battleResult.won?"Well fought, Commander":"You fought bravely"}</div>
          <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:24}}>
            <div style={{background:"#ffffff08",borderRadius:10,padding:"10px 16px",textAlign:"center"}}>
              <div style={{color:"#60a5fa",fontWeight:900,fontSize:18}}>+{battleResult.xp}</div>
              <div style={{color:"#475569",fontSize:10}}>XP</div>
            </div>
            {battleResult.coins>0&&<div style={{background:"#ffffff08",borderRadius:10,padding:"10px 16px",textAlign:"center"}}>
              <div style={{color:"#c084fc",fontWeight:900,fontSize:18}}>+{battleResult.coins}</div>
              <div style={{color:"#475569",fontSize:10}}>💎 Gems</div>
            </div>}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setBattleResult(null);setBattleCard(null);}} style={{flex:1,background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:10,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>← Back</button>
            <button onClick={()=>{const _rc=battleResult.cardName;setBattleResult(null);const _c=ALL_CARDS.find(x=>x.name===_rc);if(_c)setBattleCard(_c);}} style={{flex:1,background:battleResult.won?"linear-gradient(135deg,#15803d,#22c55e)":"linear-gradient(135deg,#991b1b,#ef4444)",color:"white",border:"none",borderRadius:10,padding:"12px",fontWeight:700,fontSize:13,cursor:"pointer"}}>⚔️ Again</button>
          </div>
        </div>
      </div>}

      {/* Onboarding Overlay — only shows on first visit, step by step */}
      {onboardingStep===-1&&collection.length===0&&<div style={{position:"fixed",inset:0,zIndex:5000,display:"flex",alignItems:"center",justifyContent:"center",background:"#000000ee",backdropFilter:"blur(10px)"}}>
        <div style={{background:"linear-gradient(135deg,#0f0a1e,#1e0a3c)",border:"1px solid var(--t1b)",borderRadius:20,padding:32,maxWidth:320,width:"90%",textAlign:"center",animation:"fadeIn .5s ease-out"}}>
          <div style={{fontSize:52,marginBottom:12}}>🌌</div>
          <div style={{color:"#a855f7",fontSize:9,letterSpacing:4,fontWeight:800,marginBottom:8}}>WELCOME COMMANDER</div>
          <div style={{color:"white",fontWeight:900,fontSize:20,marginBottom:10}}>Your first mission</div>
          <div style={{color:"#64748b",fontSize:13,lineHeight:1.7,marginBottom:24}}>
            Open your free Starter Pack to begin your collection. Then head to Battle to test your cards. Complete Quests to earn gems and grow stronger.
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {[{i:"🎁",t:"Open your free daily pack",s:"Home screen · claim it now"},
              {i:"⚔️",t:"Battle with your cards",s:"Battle tab · pick a card to fight"},
              {i:"🎯",t:"Complete daily quests",s:"Quests tab · earn bonus gems"}
            ].map((step,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,background:"#ffffff06",borderRadius:10,padding:"10px 14px",textAlign:"left"}}>
                <span style={{fontSize:20,flexShrink:0}}>{step.i}</span>
                <div>
                  <div style={{color:"white",fontWeight:700,fontSize:12}}>{step.t}</div>
                  <div style={{color:"#475569",fontSize:10}}>{step.s}</div>
                </div>
              </div>
            ))}
          </div>
          <button onClick={()=>{setOnboardingStep(0);S.set("onboardingDone",true);SFX.play("click");}} style={{width:"100%",background:"linear-gradient(135deg,var(--t1),var(--t2))",color:"white",border:"none",borderRadius:12,padding:"14px",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 0 20px #a855f744"}}>
            Let's Go! 🚀
          </button>
        </div>
      </div>}

      </div>{/* end zIndex content wrapper */}
      </div>{/* end main column */}
      </div>{/* end body flex */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
</html>
