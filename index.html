  { id:16, name:"Comet Rider",       rarity:"Rare", type:"Alien", series:"Series 1", power:60, defense:55, hp:80,  special:"Comet Crash",    specialMult:1.8, color:"#f59e0b",
    description:"The Comet Rider bonds with celestial bodies and rides them like beasts across the solar system. Loses the comet, loses the power. Hasn't lost one yet. Claims they 'understand each other.'" },
  { id:17, name:"Stasis Drone",      rarity:"Rare", type:"Robot", series:"Series 1", power:55, defense:68, hp:88,  special:"Freeze Ray",     specialMult:1.6, color:"#6366f1",
    description:"The Stasis Drone doesn't believe in destroying enemies. It believes in pausing them indefinitely. Its memory banks are full of frozen opponents. It considers this the most humane approach. They remain paused." },
  { id:18, name:"Pulsar Monk",       rarity:"Rare", type:"Alien", series:"Series 1", power:58, defense:62, hp:82,  special:"Pulse Wave",     specialMult:1.7, color:"#f472b6",
    description:"After 40 years meditating inside a magnetar, the Pulsar Monk emerged able to convert electromagnetic fields into pure focused force. It still meditates. The difference is now the meditation kills things." },
  { id:19, name:"Arc Warden",        rarity:"Rare", type:"Robot", series:"Series 1", power:62, defense:60, hp:84,  special:"Arc Storm",      specialMult:1.7, color:"#fbbf24",
    description:"Struck by lightning 847 times during stress testing, the Arc Warden stopped trying to avoid it and learned to aim it. Its engineers have stopped updating its safety protocols. They seem pointless now." },
  { id:20, name:"Shadow Leech",      rarity:"Rare", type:"Alien", series:"Series 1", power:64, defense:52, hp:78,  special:"Life Drain",     specialMult:1.8, color:"#7c3aed",
    description:"The Shadow Leech feeds on bio-electric signatures, growing stronger with every opponent it encounters. It was once described as 'small' in an official report. That report is now considered a historical curiosity." },
  { id:21, name:"Turret Prime",      rarity:"Rare", type:"Robot", series:"Series 1", power:52, defense:72, hp:90,  special:"Lock On",        specialMult:1.6, color:"#0ea5e9",
    description:"Once locked onto a target, Turret Prime never releases. Not for weather. Not for obstacles. Not for time. There is a running list of things it has shot through to reach a target. The list has 340 entries." },
  { id:22, name:"Spine Crawler",     rarity:"Rare", type:"Alien", series:"Series 1", power:66, defense:50, hp:76,  special:"Venom Strike",   specialMult:1.8, color:"#22c55e",
    description:"Its venom was synthesized from 14 different corrosive compounds and then refined over millennia of evolution. Metallurgists study the damage it does to armor the way art historians study paintings: with awe and no small amount of dread." },
  { id:23, name:"Mech Phantom",      rarity:"Rare", type:"Robot", series:"Series 1", power:60, defense:64, hp:86,  special:"Ghost Mode",     specialMult:1.7, color:"#94a3b8",
    description:"The Mech Phantom's stealth systems are so advanced it sometimes disappears from its own sensors. Three confirmed cases of it sneaking up on itself. It has learned to cough before entering rooms where it might already be." },
  { id:24, name:"Nebula Eel",        rarity:"Rare", type:"Alien", series:"Series 1", power:58, defense:58, hp:83,  special:"Electric Shock", specialMult:1.7, color:"#38bdf8",
    description:"A creature of the deep void currents, the Nebula Eel generates electrical fields powerful enough to restart dead stars. It uses this ability mostly for hunting. Occasionally for warmth. The distinction matters to no one near it." },
  // ── UNCOMMON ─────────────────────────────────────────────────────────────────
  { id:25, name:"Moon Crawler",      rarity:"Uncommon", type:"Alien", series:"Series 1", power:48, defense:50, hp:70,  special:"Acid Spit",    specialMult:1.7, color:"#84cc16",
    description:"Perfectly evolved for the dark side of moons, the Moon Crawler has never seen a sunrise. Researchers who studied it in daylight reported it seemed confused and mildly offended." },
  { id:26, name:"Rust Brawler",      rarity:"Uncommon", type:"Robot", series:"Series 1", power:52, defense:45, hp:72,  special:"Iron Fist",    specialMult:1.6, color:"#f97316",
    description:"Technically decommissioned 80 years ago, the Rust Brawler simply refused to acknowledge the paperwork. It still fights. Still wins. The newer models resent this deeply." },
  { id:27, name:"Void Sprite",       rarity:"Uncommon", type:"Alien", series:"Series 1", power:42, defense:40, hp:65,  special:"Blink Strike", specialMult:1.8, color:"#22d3ee",
    description:"The Void Sprite can teleport 40 times per second. Scientists have determined this is intentional and not simply the universe failing to keep track of it. The Sprite hasn't weighed in on the debate." },
  { id:28, name:"Flux Hound",        rarity:"Uncommon", type:"Alien", series:"Series 1", power:45, defense:48, hp:68,  special:"Flux Bite",    specialMult:1.6, color:"#fb923c",
    description:"Bred in the dimensional borderlands, the Flux Hound can smell prey across realities. Once it has your scent, there is no dimension you can hide in. Owners describe it as 'loyal.' Its quarry uses different words." },
  { id:29, name:"Bolt Trooper",      rarity:"Uncommon", type:"Robot", series:"Series 1", power:50, defense:44, hp:70,  special:"Rapid Fire",   specialMult:1.6, color:"#60a5fa",
    description:"Issued by the thousands across the outer rim, most Bolt Troopers are indistinguishable. Unit #7,441 once held a bridge against 200 hostiles for 6 hours alone. Its incident report lists the reason as 'unclear.'" },
  { id:30, name:"Gas Cloud",         rarity:"Uncommon", type:"Alien", series:"Series 1", power:38, defense:55, hp:74,  special:"Toxic Mist",   specialMult:1.5, color:"#a3e635",
    description:"It is technically alive. Scientists are less sure than they'd like to be about what exactly that means in this case. The Gas Cloud has no brain. No nervous system. No discernible will. And yet it keeps winning." },
  { id:31, name:"Shield Bot",        rarity:"Uncommon", type:"Robot", series:"Series 1", power:35, defense:65, hp:80,  special:"Reflect",      specialMult:1.5, color:"#67e8f9",
    description:"The Shield Bot was designed with one directive: protect. It has interpreted this directive broadly. It once blocked a diplomatic insult on behalf of its assigned general. The general was grateful. The insulting ambassador was confused." },
  { id:32, name:"Tide Lurker",       rarity:"Uncommon", type:"Alien", series:"Series 1", power:46, defense:46, hp:67,  special:"Undertow",     specialMult:1.7, color:"#2dd4bf",
    description:"The Tide Lurker navigates gravitational eddies the way fish navigate currents. It strikes from inside gravity wells, where targeting systems malfunction. It has never filed a flight plan. It doesn't need to." },
  { id:33, name:"Gear Head",         rarity:"Uncommon", type:"Robot", series:"Series 1", power:48, defense:50, hp:72,  special:"Overclock",    specialMult:1.6, color:"#e879f9",
    description:"The Gear Head modifies itself constantly, upgrading components mid-battle using whatever is nearby. It has incorporated pieces of 40 defeated opponents into its chassis. It calls this 'paying tribute.'" },
  { id:34, name:"Swarm Queen",       rarity:"Uncommon", type:"Alien", series:"Series 1", power:44, defense:42, hp:66,  special:"Spawn",        specialMult:1.7, color:"#fde047",
    description:"The Swarm Queen herself is unremarkable in combat. Her ten thousand children are not. She never fights alone and considers the very concept of solo combat a philosophical misunderstanding." },
  // ── COMMON ───────────────────────────────────────────────────────────────────
  { id:35, name:"Stellar Pup",       rarity:"Common", type:"Alien", series:"Series 1", power:30, defense:30, hp:55,  special:"Bark Blast",   specialMult:1.5, color:"#f472b6",
    description:"Lost from a cargo ship three years ago, the Stellar Pup has somehow survived the void. It has no natural weapons, no armor, and no apparent survival strategy. It is, however, extremely friendly. This has confused many predators." },
  { id:36, name:"Bolt Unit",         rarity:"Common", type:"Robot", series:"Series 1", power:28, defense:32, hp:52,  special:"Zap",          specialMult:1.5, color:"#94a3b8",
    description:"Unit #441-B of 2 million identical Bolt Units produced in Sector 9. Statistically it should be unremarkable. It has, against all probability, survived 12 battles that destroyed its entire squad. Nobody is tracking this. They should be." },
  { id:37, name:"Space Moss",        rarity:"Common", type:"Alien", series:"Series 1", power:15, defense:42, hp:60,  special:"Spore Cloud",  specialMult:1.4, color:"#84cc16",
    description:"Space Moss has existed since before the first stars. It does not think. It does not plan. It simply persists. Empires have formed and fallen. Space Moss has watched from asteroids and continued doing exactly what it was doing." },
  { id:38, name:"Orbit Chip",        rarity:"Common", type:"Robot", series:"Series 1", power:25, defense:25, hp:48,  special:"Scan",         specialMult:1.4, color:"#64748b",
    description:"Designed for orbital scanning, the Orbit Chip found itself in a combat zone due to a clerical error. It has been scanning ever since. Its battle reports are extremely thorough and deeply confused about why it keeps getting shot at." },
  { id:39, name:"Dust Mite",         rarity:"Common", type:"Alien", series:"Series 1", power:22, defense:28, hp:50,  special:"Swarm",        specialMult:1.4, color:"#a3a3a3",
    description:"Individually, a Dust Mite is harmless. In groups of 10,000 they are a minor inconvenience. In groups of 10 million, they have been known to strip a ship down to components in 40 seconds. This one appears to be alone. Probably fine." },
  { id:40, name:"Nano Bot",          rarity:"Common", type:"Robot", series:"Series 1", power:20, defense:30, hp:48,  special:"Repair",       specialMult:1.3, color:"#7dd3fc",
    description:"Technically the size of a bacterium, this Nano Bot has been scaled up for card game purposes. At actual size, it would still fix your hull breach. It is genuinely proud of this, in whatever way a nanoscale machine can feel pride." },
  { id:41, name:"Cave Crawler",      rarity:"Common", type:"Alien", series:"Series 1", power:28, defense:26, hp:53,  special:"Dig",          specialMult:1.4, color:"#92400e",
    description:"Built for asteroid mining tunnels, the Cave Crawler is most comfortable in the dark. Give it a surface battle and it will immediately try to go underground. This is, surprisingly, an effective tactic." },
  { id:42, name:"Guard Drone",       rarity:"Common", type:"Robot", series:"Series 1", power:24, defense:34, hp:54,  special:"Alert",        specialMult:1.3, color:"#475569",
    description:"Assigned to perimeter patrol of a depot that was decommissioned 30 years ago. Still patrolling. The depot is long gone. The Guard Drone has not received updated orders. It is remarkably diligent about guarding nothing." },
  { id:43, name:"Spore Pod",         rarity:"Common", type:"Alien", series:"Series 1", power:18, defense:38, hp:58,  special:"Release",      specialMult:1.4, color:"#65a30d",
    description:"Totally harmless until something touches it. Then the spores release. Then things get complicated. Xenobiologists classify it as 'passive-aggressive at a molecular level.'" },
  { id:44, name:"Pixel Fly",         rarity:"Common", type:"Alien", series:"Series 1", power:26, defense:24, hp:46,  special:"Sting",        specialMult:1.5, color:"#fb7185",
    description:"Quantum-sized and moving at frequencies too fast for standard targeting systems, the Pixel Fly has caused more sensor malfunctions than any weapon in the outer rim. It is also, unfortunately, adorable." },
  { id:45, name:"Scrap Walker",      rarity:"Common", type:"Robot", series:"Series 1", power:22, defense:32, hp:52,  special:"Stomp",        specialMult:1.4, color:"#78716c",
    description:"Assembled entirely from battlefield debris, the Scrap Walker has no official manufacturer, no serial number, and no warranty. It also has no fear of taking damage. It was already broken before the fight started." },
  { id:46, name:"Void Fish",         rarity:"Common", type:"Alien", series:"Series 1", power:24, defense:28, hp:50,  special:"Splash",       specialMult:1.4, color:"#38bdf8",
    description:"Swims through dark matter currents the way fish swim through water. Nobody is sure how it achieves this. The Void Fish has no comment. It does not appear to be aware that anyone finds this unusual." },
  { id:47, name:"Signal Bot",        rarity:"Common", type:"Robot", series:"Series 1", power:20, defense:26, hp:47,  special:"Jam",          specialMult:1.4, color:"#a8a29e",
    description:"Designed to disrupt enemy communications, the Signal Bot emits frequencies that jam targeting, navigation, and occasionally music players. Enemy fleets report a strange phenomenon: they can't coordinate, but the silence is weirdly relaxing." },
  { id:48, name:"Moss Creep",        rarity:"Common", type:"Alien", series:"Series 1", power:16, defense:40, hp:62,  special:"Entangle",     specialMult:1.4, color:"#4ade80",
    description:"Moves at approximately one meter per hour. Has won battles. Nobody is entirely sure how. Xenobiologists study it weekly and file reports that all end with the same sentence: 'Further observation required.'" },
  { id:49, name:"Relay Unit",        rarity:"Common", type:"Robot", series:"Series 1", power:18, defense:28, hp:48,  special:"Boost",        specialMult:1.3, color:"#c084fc",
    description:"The Relay Unit amplifies signals from nearby units, making every ally around it slightly more effective. It has no ego about this. It considers support a calling, not a consolation prize. Most support units agree. Most don't say it out loud." },
  { id:50, name:"Star Slug",         rarity:"Common", type:"Alien", series:"Series 1", power:14, defense:44, hp:64,  special:"Slime Trail",  specialMult:1.3, color:"#86efac",
    description:"Slow, squishy, and completely unbothered by this assessment. The Star Slug has survived every engagement it has ever been in, mostly by being too unremarkable to prioritize and too resilient to finish off. This is, experts agree, a strategy." },

  // ── SERIES 4: ARCANE KNIGHTS ─────────────────────────────────────────────────
  // LEGENDARY Knights
  { id:51, name:"The Eternal King",   rarity:"Legendary", type:"Knight", series:"Series 1", power:96, defense:88, hp:140, special:"Sovereign Blade",  specialMult:2.3, color:"#fbbf24",
    description:"He has ruled for ten thousand years and died seven times. Each death made him stronger. His sword remembers every kingdom it has ever defended. There are a lot of kingdoms in ten thousand years." },
  { id:52, name:"Void Paladin",       rarity:"Legendary", type:"Knight", series:"Series 1", power:88, defense:95, hp:145, special:"Holy Annihilation",specialMult:2.1, color:"#a78bfa",
    description:"He swore an oath to a god that no longer exists. The oath remains. He interprets it broadly. What was once 'protect the innocent' has become something far more absolute, and far more terrifying to witness." },
  // LEGENDARY Mages
  { id:53, name:"Archmagus Solenne",  rarity:"Legendary", type:"Mage",   series:"Series 1", power:99, defense:65, hp:110, special:"World Ender",      specialMult:2.4, color:"#c084fc",
    description:"She wrote the first spell at age four. By twelve she had run out of things to learn. She spent the next sixty years inventing new magic simply to have something to study. She is currently bored again. This is a warning." },
  { id:54, name:"The Lich Regent",    rarity:"Legendary", type:"Mage",   series:"Series 1", power:92, defense:72, hp:118, special:"Soul Harvest",     specialMult:2.2, color:"#34d399",
    description:"He chose immortality before he understood what it cost. He understands now. He has outlived every person he has ever loved, every kingdom he has ever served, and every reason he originally had for wanting to live forever." },
  // LEGENDARY Dragons
  { id:55, name:"Ignareth the Undying",rarity:"Legendary",type:"Dragon", series:"Series 1", power:100,defense:80, hp:150, special:"Inferno Collapse",  specialMult:2.5, color:"#ef4444",
    description:"The oldest living creature in any world. Ignareth watched the first humans discover fire and found it charming. She has since watched them discover gunpowder, splitting the atom, and dimensional travel. She still finds them charming. Mostly." },
  { id:56, name:"Glacius the Eternal", rarity:"Legendary",type:"Dragon", series:"Series 1", power:85, defense:98, hp:155, special:"Absolute Zero",     specialMult:2.1, color:"#7dd3fc",
    description:"Where Ignareth burns, Glacius preserves. Every creature frozen in his breath is perfectly suspended — alive, aware, waiting. He considers this mercy. He has an entire mountain range full of mercy. The mountain range is very quiet." },
  // EPIC Knights
  { id:57, name:"Ironclad Champion",  rarity:"Epic",      type:"Knight", series:"Series 1", power:76, defense:90, hp:118, special:"Fortress Stance",  specialMult:1.8, color:"#94a3b8",
    description:"She has never lost a defensive engagement. Every attack she has ever deflected is recorded on her shield — not as a trophy, but as a reminder. The shield is almost entirely covered. She is running out of room. She considers this a problem." },
  { id:58, name:"Dawnbreaker",        rarity:"Epic",      type:"Knight", series:"Series 1", power:84, defense:70, hp:105, special:"Solar Strike",     specialMult:1.9, color:"#fde047",
    description:"He charges at dawn. Always at dawn. Enemies who know this try to prevent sunrise. This has never worked. He has fought in places without suns and found a way. The light follows him because it has decided he is worth following." },
  { id:59, name:"Knight of Embers",   rarity:"Epic",      type:"Knight", series:"Series 1", power:80, defense:74, hp:108, special:"Ember Surge",      specialMult:1.8, color:"#f97316",
    description:"Her armor was forged in a volcano she then climbed out of. The volcano did not survive the encounter. She considers this the second most impressive thing she has ever done. She declines to explain what the first is." },
  // EPIC Mages
  { id:60, name:"Stormcaller Vex",    rarity:"Epic",      type:"Mage",   series:"Series 1", power:82, defense:60, hp:98,  special:"Chain Lightning",  specialMult:1.9, color:"#60a5fa",
    description:"Every storm within a hundred miles is his fault. Not metaphorically. Literally his fault. He keeps apologizing to farmers. He means it every time. He also cannot stop doing it. He is very conflicted about this." },
  { id:61, name:"Mirror Witch",       rarity:"Epic",      type:"Mage",   series:"Series 1", power:74, defense:76, hp:104, special:"Reflection",       specialMult:1.8, color:"#e879f9",
    description:"She copies the last spell cast against her and returns it doubled. Enemies have learned not to use their strongest move first. She has learned to wait. The waiting is the part she enjoys most." },
  { id:62, name:"Ashenwraith Mage",   rarity:"Epic",      type:"Mage",   series:"Series 1", power:86, defense:55, hp:95,  special:"Ashen Torrent",    specialMult:2.0, color:"#a3a3a3",
    description:"He burned down his own tower conducting an experiment. Then the village. Then the province. He maintains that the results were worth it. Nobody who lived there agrees with him. There are fewer of them than there used to be." },
  // EPIC Dragons
  { id:63, name:"Thornwing",          rarity:"Epic",      type:"Dragon", series:"Series 1", power:80, defense:72, hp:112, special:"Spine Volley",     specialMult:1.8, color:"#84cc16",
    description:"Her scales grow thorns that she sheds as projectiles mid-flight. Whole armies have been defeated by what they initially thought was hail. She finds their confusion satisfying. She also finds most things satisfying. She is a happy dragon." },
  { id:64, name:"Voidwyrm",           rarity:"Epic",      type:"Dragon", series:"Series 1", power:88, defense:64, hp:102, special:"Reality Tear",     specialMult:1.9, color:"#7c3aed",
    description:"He doesn't breathe fire. He breathes absence. Where his breath lands, things stop existing rather than burning. Scholars debate whether this is worse. The things that stopped existing are unavailable for comment." },
  // RARE Knights
  { id:65, name:"Silver Crusader",    rarity:"Rare",      type:"Knight", series:"Series 1", power:62, defense:64, hp:88,  special:"Sacred Charge",    specialMult:1.7, color:"#e2e8f0",
    description:"She has taken a vow of honesty in combat. She announces every attack before she makes it. She still wins. She considers this proof that skill beats surprise. Her opponents consider it deeply humiliating." },
  { id:66, name:"Runebound Knight",   rarity:"Rare",      type:"Knight", series:"Series 1", power:58, defense:70, hp:92,  special:"Rune Smash",       specialMult:1.7, color:"#818cf8",
    description:"Every rune on his armor was carved by a different mage. None of them got along. The runes argue constantly. He has learned to interpret the arguments as tactical advice. It works surprisingly well." },
  { id:67, name:"Gallowmere Guard",   rarity:"Rare",      type:"Knight", series:"Series 1", power:55, defense:75, hp:96,  special:"Graveward",        specialMult:1.6, color:"#475569",
    description:"He guards a graveyard. This sounds like a quiet posting. The graveyard is not quiet. It has never been quiet. He has been on shift for eleven years. He has requested a transfer forty-two times. The requests keep getting lost." },
  { id:68, name:"Tempest Lancer",     rarity:"Rare",      type:"Knight", series:"Series 1", power:66, defense:58, hp:84,  special:"Thunder Lance",    specialMult:1.8, color:"#38bdf8",
    description:"His lance channels storms. He got this ability from a wizard who thought he was giving it to someone else. He didn't ask questions. He trained for three years. He is now considerably better with it than the intended recipient ever would have been." },
  // RARE Mages
  { id:69, name:"Hex Weaver",         rarity:"Rare",      type:"Mage",   series:"Series 1", power:64, defense:54, hp:80,  special:"Hex Cascade",      specialMult:1.8, color:"#f472b6",
    description:"Her hexes stack. One hex is an inconvenience. Five hexes is a problem. Twelve hexes, which is her preferred number, is a catastrophe. She has never once started with fewer than twelve. She considers restraint a character flaw." },
  { id:70, name:"Tome Scholar",       rarity:"Rare",      type:"Mage",   series:"Series 1", power:56, defense:66, hp:86,  special:"Arcane Burst",     specialMult:1.7, color:"#fbbf24",
    description:"He carries forty-three books into every battle. This is logistically impractical. He does it anyway. Three of the books are decoys. He will not say which three. This is the most tactically sophisticated thing about him." },
  { id:71, name:"Frostbind Sorceress", rarity:"Rare",     type:"Mage",   series:"Series 1", power:60, defense:62, hp:83,  special:"Permafrost",       specialMult:1.7, color:"#bae6fd",
    description:"She freezes enemies from the inside out, targeting the water in their blood. She learned this spell by accident and spent six months trying to unlearn it. Eventually she accepted that some knowledge is permanent and enrolled in a combat program instead." },
  { id:72, name:"Cinder Conjurer",    rarity:"Rare",      type:"Mage",   series:"Series 1", power:62, defense:56, hp:81,  special:"Conjure Flame",    specialMult:1.7, color:"#fb923c",
    description:"He doesn't control fire. He convinces it. This distinction matters to him enormously and to nobody else. The fire does what he asks. He says please. The fire, as far as anyone can tell, appreciates this." },
  // RARE Dragons
  { id:73, name:"Emberclaw",          rarity:"Rare",      type:"Dragon", series:"Series 1", power:65, defense:58, hp:86,  special:"Claw Inferno",     specialMult:1.7, color:"#f97316",
    description:"Young by dragon standards, Emberclaw is still learning to control her fire breath. Entire forests are learning this alongside her. The forests would prefer she practiced somewhere else. She has not asked the forests." },
  { id:74, name:"Stoneback Drake",    rarity:"Rare",      type:"Dragon", series:"Series 1", power:52, defense:80, hp:100, special:"Boulder Slam",     specialMult:1.6, color:"#78716c",
    description:"His scales grew into boulders over centuries of sleeping on a mountain. He is technically his own mountain now. Cartographers keep updating maps to account for him moving. He moves infrequently but dramatically." },
  { id:75, name:"Mistfang",           rarity:"Rare",      type:"Dragon", series:"Series 1", power:60, defense:62, hp:87,  special:"Venom Mist",       specialMult:1.7, color:"#a3e635",
    description:"She exhales a mist that is technically not poison. The distinction is legal, not practical. Seventeen kingdoms have tried to classify it as poison. She has contested each ruling personally. She has won every case. She is an excellent litigant." },
  // UNCOMMON Knights
  { id:76, name:"Apprentice Guard",   rarity:"Uncommon",  type:"Knight", series:"Series 1", power:45, defense:52, hp:72,  special:"Shield Bash",      specialMult:1.6, color:"#cbd5e1",
    description:"Day one of actual combat. He trained for six years. Nothing prepared him for how loud it is. He is doing fine. He is very surprised by this. His instructor is not surprised at all but has chosen not to mention this yet." },
  { id:77, name:"Cursed Templar",     rarity:"Uncommon",  type:"Knight", series:"Series 1", power:50, defense:48, hp:70,  special:"Cursed Strike",    specialMult:1.7, color:"#6b7280",
    description:"The curse makes him stronger every time he loses. He has lost a lot. He is now extremely strong. He is trying to lose less. This is proving counterproductive. He is getting very conflicted about success." },
  { id:78, name:"Forest Warden",      rarity:"Uncommon",  type:"Knight", series:"Series 1", power:46, defense:55, hp:74,  special:"Nature's Guard",   specialMult:1.6, color:"#4ade80",
    description:"She protects a forest that is perfectly capable of protecting itself. She knows this. The forest knows this. They have reached an understanding — she stays, the forest tolerates her, and together they deal with the things neither could handle alone." },
  { id:79, name:"Duskblade",          rarity:"Uncommon",  type:"Knight", series:"Series 1", power:52, defense:44, hp:68,  special:"Shadow Cut",       specialMult:1.7, color:"#1e1b4b",
    description:"He only fights at dusk. This is a stylistic choice that has become a logistical constraint. He has missed several important battles due to scheduling conflicts with sunset. He considers this an acceptable trade-off for aesthetic consistency." },
  // UNCOMMON Mages
  { id:80, name:"Hedge Wizard",       rarity:"Uncommon",  type:"Mage",   series:"Series 1", power:40, defense:48, hp:68,  special:"Wild Magic",       specialMult:1.6, color:"#86efac",
    description:"Self-taught, which explains a lot. His spells work but not always as intended. He once cast a fireball and produced a very large cheese. He ate the cheese. He has been trying to recreate it ever since. The fireball keeps coming out instead." },

// Weighted rarity draw helper
function drawRarity(weights){
  const total=Object.values(weights).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const [rarity,w] of Object.entries(weights)){r-=w;if(r<=0)return rarity;}
  return Object.keys(weights).pop();
}

function CardIllustration({ card, w=140, h=160 }) {
  if(card.image) return <img src={card.image} width={w} height={h} style={{display:"block",objectFit:"cover",borderRadius:5}} alt={card.name}/>;

  const c = card.foil?"#f59e0b":card.color;
  const id = card.id;
  const rr = (n) => ((id*n*1664525+1013904223)&0x7fffffff)/0x7fffffff;
  const isRobot  = card.type==="Robot";
  const isKnight = card.type==="Knight";
  const isMage   = card.type==="Mage";
  const isDragon = card.type==="Dragon";
  const isBeast  = card.type==="Beast";
  const isLeg  = card.rarity==="Legendary" || card.foil;
  const isEpic = card.rarity==="Epic";
  const isRare = card.rarity==="Rare";

  // Each card gets unique body, accessory, head shape determined by id
  const bodyStyle    = id % 5;   // 0-4
  const eyeStyle     = id % 4;   // 0-3
  const accessory    = id % 6;   // 0-5
  const bgVariant    = id % 3;   // 0-2

  // Background
  const bg1 = isLeg?"#120005":isEpic?"#06001a":isRare?"#00061a":"#080810";
  const bgOpacity = isLeg?0.4:isEpic?0.28:0.18;

  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:"block"}}>
      <defs>
        <radialGradient id={`rg${id}`} cx="50%" cy="40%">
          <stop offset="0%" stopColor={c} stopOpacity={bgOpacity}/>
          <stop offset="100%" stopColor={bg1}/>
        </radialGradient>
        <radialGradient id={`gl${id}`} cx="50%" cy="55%">
          <stop offset="0%" stopColor={c} stopOpacity="0.65"/>
          <stop offset="100%" stopColor={c} stopOpacity="0"/>
        </radialGradient>
        <clipPath id={`cp${id}`}><rect width={w} height={h} rx={5}/></clipPath>
        {isLeg && <filter id={`gf${id}`}><feGaussianBlur stdDeviation="3"/></filter>}
      </defs>
      <g clipPath={`url(#cp${id})`}>
        {/* BG */}
        <rect width={w} height={h} fill={`url(#rg${id})`}/>
        {/* BG variant shapes */}
        {bgVariant===0 && <ellipse cx={w*.7} cy={h*.2} rx={w*.4} ry={h*.25} fill={c} opacity=".06"/>}
        {bgVariant===1 && <><line x1={0} y1={h*.3} x2={w} y2={h*.15} stroke={c} strokeWidth={w*.3} opacity=".05"/></>}
        {bgVariant===2 && <circle cx={w*.2} cy={h*.8} r={w*.5} fill={c} opacity=".06"/>}
        {/* Stars */}
        {[...Array(isLeg?28:isEpic?20:14)].map((_,i)=>
          <circle key={i} cx={rr(i*3+1)*w} cy={rr(i*3+2)*h} r={rr(i*3+3)*1.5+0.3} fill="white" opacity={rr(i)*.7+.1}/>
        )}
        {/* Glow */}
        <ellipse cx={w*.5} cy={h*.58} rx={w*.3} ry={h*.28} fill={`url(#gl${id})`} opacity=".55"/>
        {/* Legendary extra bg glow */}
        {isLeg && <ellipse cx={w*.5} cy={h*.4} rx={w*.6} ry={h*.5} fill={c} opacity=".06" filter={`url(#gf${id})`}/>}

        {isRobot ? (
          <g>
            {/* --- ROBOT bodies --- */}
            {bodyStyle===0 && <>
              {/* Stocky */}
              <rect x={w*.22} y={h*.38} width={w*.56} height={h*.42} rx="6" fill={c} opacity=".18"/>
              <rect x={w*.1}  y={h*.42} width={w*.16} height={h*.3}  rx="5" fill={c} opacity=".15"/>
              <rect x={w*.74} y={h*.42} width={w*.16} height={h*.3}  rx="5" fill={c} opacity=".15"/>
              <rect x={w*.32} y={h*.77} width={w*.12} height={h*.2}  rx="3" fill={c} opacity=".15"/>
              <rect x={w*.56} y={h*.77} width={w*.12} height={h*.2}  rx="3" fill={c} opacity=".15"/>
            </>}
            {bodyStyle===1 && <>
              {/* Sleek/tapered */}
              <path d={`M${w*.38} ${h*.38} L${w*.3} ${h*.8} L${w*.7} ${h*.8} L${w*.62} ${h*.38} Z`} fill={c} opacity=".18"/>
              <rect x={w*.05} y={h*.44} width={w*.25} height={h*.08} rx="4" fill={c} opacity=".15"/>
              <rect x={w*.7}  y={h*.44} width={w*.25} height={h*.08} rx="4" fill={c} opacity=".15"/>
            </>}
            {bodyStyle===2 && <>
              {/* Hover/drone */}
              <ellipse cx={w*.5} cy={h*.58} rx={w*.36} ry={h*.13} fill={c} opacity=".2"/>
              <ellipse cx={w*.5} cy={h*.54} rx={w*.27} ry={h*.11} fill={c} opacity=".25"/>
              <line x1={w*.14} y1={h*.56} x2={w*.1}  y2={h*.8}  stroke={c} strokeWidth="3" opacity=".2"/>
              <line x1={w*.86} y1={h*.56} x2={w*.9}  y2={h*.8}  stroke={c} strokeWidth="3" opacity=".2"/>
              <circle cx={w*.1} cy={h*.82} r={w*.04} fill={c} opacity=".4"/>
              <circle cx={w*.9} cy={h*.82} r={w*.04} fill={c} opacity=".4"/>
            </>}
            {bodyStyle===3 && <>

          <g>
            {/* --- ALIEN bodies --- */}
            {bodyStyle===0 && <>

// ── Holographic Frame ─────────────────────────────────────────────────────────
function HoloFrame({ card, w, h, hov }) {
  const c=RC[card.rarity].color, isLeg=card.rarity==="Legendary", isEpic=card.rarity==="Epic", isRare=card.rarity==="Rare";
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{position:"absolute",top:0,left:0,pointerEvents:"none",borderRadius:14}}>
      <defs>
        <linearGradient id={`hf${card.id}`} x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stopColor={c} stopOpacity={hov?.95:.55}/>
          <stop offset="35%"  stopColor="white" stopOpacity={hov?.35:.1}/>

      <rect x="1.5" y="1.5" width={w-3} height={h-3} rx="13" fill="none" stroke={`url(#hf${card.id})`} strokeWidth={isLeg?3:isEpic?2.5:isRare?2:1.5}/>
      {(isLeg||isEpic) && <rect x="4" y="4" width={w-8} height={h-8} rx="11" fill="none" stroke={c} strokeWidth="0.7" opacity={hov?.55:.22}/>}
      {isLeg && <>
        {[[5,5,1,1],[w-5,5,-1,1],[5,h-5,1,-1],[w-5,h-5,-1,-1]].map(([cx,cy,sx,sy],i)=>(
          <g key={i}>
            <line x1={cx} y1={cy} x2={cx+sx*14} y2={cy} stroke={c} strokeWidth="2" opacity={hov?1:.65}/>

        <polygon points={`${w/2},3 ${w/2+4},9  ${w/2},12 ${w/2-4},9`}  fill="white" opacity=".4"/>
        <polygon points={`${w/2},${h-3} ${w/2+7},${h-10} ${w/2},${h-14} ${w/2-7},${h-10}`} fill={c} opacity={hov?1:.8}/>
        <circle cx={4}   cy={h/2} r="3" fill={c} opacity={hov?.9:.6}/>
        <circle cx={w-4} cy={h/2} r="3" fill={c} opacity={hov?.9:.6}/>
      </>}
      {isEpic && <>
        <polygon points={`${w/2},4 ${w/2+5},10 ${w/2},15 ${w/2-5},10`} fill={c} opacity={hov?.9:.55}/>
        <polygon points={`${w/2},${h-4} ${w/2+5},${h-10} ${w/2},${h-15} ${w/2-5},${h-10}`} fill={c} opacity={hov?.9:.55}/>
      </>}
      {isRare && [[6,6],[w-6,6],[6,h-6],[w-6,h-6]].map(([cx,cy],i)=>(
        <circle key={i} cx={cx} cy={cy} r="2.5" fill={c} opacity={hov?.7:.4}/>
      ))}
    </svg>
  );
}

// ── Card Component ────────────────────────────────────────────────────────────
function Card({ card, onClick, mini, selected, showHp, currentHp, count, level }) {
  const [hov,setHov]=useState(false);
  const isFoil=card.foil;
  const rc=isFoil?{color:"#f59e0b",bg:"#1c1008",stars:5}:RC[card.rarity];
  const w=mini?112:162, h=mini?168:248;
  const imgW=mini?100:150, imgH=mini?88:128;
  const isHov=hov||selected;
  const lv=level||1;
  const effP=card.power+(lv-1)*8+(isFoil?Math.round(card.power*.2):0);
  const effD=card.defense+(lv-1)*5+(isFoil?Math.round(card.defense*.2):0);
  const effH=card.hp+(lv-1)*15+(isFoil?Math.round(card.hp*.2):0);
  const isLeg=card.rarity==="Legendary"||isFoil;
  const isEpic=card.rarity==="Epic";
  const hpPct=showHp?Math.max(0,(currentHp??effH)/effH*100):100;
  // Breathing animation for all cards
  const breatheAnim=!mini?"cardBreathe 4s ease-in-out infinite":undefined;

  return (
    <div onClick={()=>{onClick&&onClick(card);if(onClick)SFX.play("click");}}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{width:w,flexShrink:0,cursor:onClick?"pointer":"default",position:"relative",
        transition:"transform .2s,box-shadow .2s",

        borderRadius:14,WebkitTapHighlightColor:"transparent",

      <div style={{width:w,height:h,background:isFoil?`linear-gradient(160deg,#1c0a00,#2d1a00,#1c0a00)`:`linear-gradient(160deg,#0f172a,${rc.bg},#000)`,borderRadius:14,padding:"5px 5px 7px",display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,borderRadius:14,background:`radial-gradient(ellipse at 50% 28%, ${rc.color}${isFoil?"28":"14"},transparent 65%)`,pointerEvents:"none"}}/>
        {/* Legendary golden flare sweep */}
        {isLeg&&!isFoil&&<div style={{position:"absolute",top:0,left:0,right:0,bottom:0,overflow:"hidden",borderRadius:14,pointerEvents:"none",zIndex:2}}>
          <div style={{position:"absolute",top:0,bottom:0,width:"40%",background:"linear-gradient(90deg,transparent,rgba(251,191,36,.22),transparent)",animation:"goldFlare 3.5s ease-in-out infinite",animationDelay:`${(card.id%5)*0.4}s`}}/>
        </div>}
        {/* Foil rainbow shimmer */}
        {isFoil&&<div style={{position:"absolute",inset:0,borderRadius:14,background:"linear-gradient(105deg,transparent 30%,rgba(255,255,255,.12) 50%,transparent 70%)",backgroundSize:"200% 100%",animation:"foilSweep 2s ease-in-out infinite",pointerEvents:"none",zIndex:2}}/>}
        {/* Epic glow pulse */}
        {isEpic&&<div style={{position:"absolute",inset:0,borderRadius:14,boxShadow:`inset 0 0 18px ${rc.color}22`,animation:"epicGlow 2.5s ease-in-out infinite",pointerEvents:"none",zIndex:2}}/>}
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3,position:"relative",zIndex:3}}>
          <span style={{color:rc.color,fontSize:mini?6:7,fontWeight:800,letterSpacing:1}}>{isFoil?"✨ FOIL":card.rarity.toUpperCase()}</span>
          {lv>1
}
          <span style={{color:"#334155",fontSize:mini?6:7,letterSpacing:.5}}>{card.type}</span>
        </div>
        {/* Art */}
        <div style={{borderRadius:7,overflow:"hidden",marginBottom:mini?3:4,flexShrink:0,position:"relative",zIndex:3,width:imgW,height:imgH,lineHeight:0,alignSelf:"center"}}>
          <CardIllustration card={card} w={imgW} h={imgH}/>
          <div style={{position:"absolute",top:0,left:0,right:0,height:"35%",background:"linear-gradient(180deg,rgba(255,255,255,.05),transparent)",pointerEvents:"none"}}/>

        {/* Name */}
        <div style={{color:"white",fontSize:mini?8:10,fontWeight:800,textAlign:"center",marginBottom:mini?1:2,letterSpacing:.3,position:"relative",zIndex:1,lineHeight:1.2}}>{card.name}</div>

        {/* Stars */}
        <div style={{textAlign:"center",marginBottom:mini?2:3,position:"relative",zIndex:1}}>
          {[...Array(rc.stars)].map((_,i)=><span key={i} style={{color:rc.color,fontSize:mini?7:8}}>★</span>)}
          {[...Array(5-rc.stars)].map((_,i)=><span key={i} style={{color:"#1e293b",fontSize:mini?7:8}}>★</span>)}
        </div>
        {/* Stats */}
        <div style={{display:"flex",justifyContent:"space-between",position:"relative",zIndex:1,background:"#ffffff0a",borderRadius:5,padding:"2px 5px"}}>
          <div style={{textAlign:"center"}}><div style={{color:"#f97316",fontWeight:800,fontSize:mini?9:11}}>{effP}</div><div style={{color:"#475569",fontSize:5}}>PWR</div></div>
          <div style={{textAlign:"center"}}><div style={{color:"#22c55e",fontWeight:800,fontSize:mini?9:11}}>{showHp?(currentHp??effH):effH}</div><div style={{color:"#475569",fontSize:5}}>HP</div></div>

        </div>

            <div style={{width:hpPct+"%",height:"100%",background:hpPct>50?"#22c55e":hpPct>25?"#f59e0b":"#ef4444",borderRadius:999,transition:"width .5s"}}/>

        {/* Series badge at bottom */}
        {!mini&&<div style={{textAlign:"center",marginTop:3,position:"relative",zIndex:1}}>

        </div>}

      </div>
      <HoloFrame card={card} w={w} h={h} hov={isHov}/>
    </div>
  );
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({ onClose, title, children }) {
  useEffect(()=>{ const p=document.body.style.overflow; document.body.style.overflow="hidden"; return()=>{ document.body.style.overflow=p; }; },[]);
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000e",zIndex:999,display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 16px",background:"#0f172a",borderBottom:"1px solid #1e293b",flexShrink:0,minHeight:54}}>
        <span style={{color:"#a855f7",fontWeight:700,fontSize:14,flex:1,marginRight:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{title}</span>
        <button onClick={()=>{SFX.play("click");onClose();}} style={{background:"#7c3aed",color:"white",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:800,fontSize:15,cursor:"pointer",minWidth:82,minHeight:44,WebkitTapHighlightColor:"transparent"}}>✕ Close</button>
      </div>
      <div style={{flex:1,overflowY:"scroll",WebkitOverflowScrolling:"touch",padding:"18px 16px 80px"}}>
        {children}
      </div>
    </div>
  );
}

// ── Dramatic Pack Opening ─────────────────────────────────────────────────────
function PackModal({ pack, onClose, onEarn, onLegendary }) {
  const [phase, setPhase] = useState("sealed");
  const [cards, setCards] = useState([]);
  const [revealed, setRevealed] = useState([]);
  const [spotlightIdx, setSpotlightIdx] = useState(-1); // card being dramatically revealed
  const [allDone, setAllDone] = useState(false);
  const [claimed, setClaimed] = useState(false);

  const RARITY_DELAY = {Legendary:1000, Epic:700, Rare:550, Uncommon:400, Common:300};
  const RARITY_GLOW  = {Legendary:"#f59e0b",Epic:"#a855f7",Rare:"#3b82f6",Uncommon:"#22c55e",Common:"#94a3b8"};

  const open = () => {
    SFX.play("packCrinkle");
    // Each slot has a small upgrade chance — any slot can pop off
    // Draw cards using weighted odds, guarantee at least one of guaranteedRarity or higher
    const rarityOrder=["Common","Uncommon","Rare","Epic","Legendary"];
    const odds=PACK_ODDS[pack.oddsKey]||PACK_ODDS.starter;
    const count=pack.count||5;
    const drawn=[];
    for(let i=0;i<count;i++){
      const r=drawRarity(odds);
      const opts=ALL_CARDS.filter(c=>c.rarity===r);
      if(opts.length) drawn.push(opts[Math.floor(Math.random()*opts.length)]);
    }
    // Guarantee at least one card of guaranteedRarity or higher
    const minIdx=rarityOrder.indexOf(pack.guaranteedRarity||"Common");
    const hasMin=drawn.some(c=>rarityOrder.indexOf(c.rarity)>=minIdx);
    if(!hasMin){
      // Replace the first Common with a guaranteed card
      const replaceIdx=drawn.findIndex(c=>rarityOrder.indexOf(c.rarity)<minIdx);
      const guaranteedOpts=ALL_CARDS.filter(c=>rarityOrder.indexOf(c.rarity)>=minIdx);
      if(replaceIdx>=0&&guaranteedOpts.length){
        drawn[replaceIdx]=guaranteedOpts[Math.floor(Math.random()*guaranteedOpts.length)];
      }
    }
    setCards(drawn);
    setPhase("tearing");
    setTimeout(()=>{ setPhase("reveal"); revealOne(drawn, 0); }, 1000);
  };

  const revealOne = (cardList, idx) => {
    if(idx >= cardList.length){ setAllDone(true); return; }
    const card = cardList[idx];
    const delay = RARITY_DELAY[card.rarity]||700;
    setSpotlightIdx(idx);
    // Play rarity-specific sound
    if(card.rarity==="Legendary") SFX.play("legendaryReveal");
    else if(card.rarity==="Epic") SFX.play("epicFlip");
    else if(card.rarity==="Rare") SFX.play("rareFlip");
    else SFX.play("cardFlip");
    setTimeout(()=>{
      const sfx={Legendary:"legendaryReveal",Epic:"epicFlip",Rare:"rareFlip",Uncommon:"cardFlip",Common:"cardFlip"}[card.rarity]||"cardFlip";
      SFX.play(sfx);
      if(card.rarity==="Legendary") onLegendary?.();
      setRevealed(r=>[...r, idx]);
      setSpotlightIdx(-1);
      setTimeout(()=>revealOne(cardList, idx+1), 300);
    }, delay);
  };

  const rc = spotlightIdx>=0 ? RARITY_GLOW[cards[spotlightIdx]?.rarity]||"#a855f7" : "#a855f7";

  return (
    <Modal onClose={onClose} title={`${pack.name} ${pack.icon}`}>
      <div style={{textAlign:"center",maxWidth:700,margin:"0 auto"}}>

        {phase==="sealed"&&<>
          <div style={{fontSize:96,marginBottom:16,animation:"float 2s ease-in-out infinite",filter:"drop-shadow(0 0 28px #a855f766)"}}>{pack.icon}</div>
          <div style={{color:"white",fontSize:22,fontWeight:900,marginBottom:4,letterSpacing:-.5}}>{pack.name}</div>
          <div style={{color:"#64748b",marginBottom:3,fontSize:13}}>{pack.count||5} cards · {pack.guaranteed}</div>
          <div style={{color:"#a855f7",fontWeight:900,fontSize:22,marginBottom:28,textShadow:"0 0 16px #a855f7"}}>💎 {pack.price}</div>
          <button onClick={open} style={{background:"linear-gradient(135deg,#4c1d95,#7c3aed,#a855f7)",color:"white",border:"none",borderRadius:14,padding:"18px 48px",fontSize:19,fontWeight:800,cursor:"pointer",width:"100%",maxWidth:300,boxShadow:"0 8px 32px var(--t1b)",letterSpacing:.5}}>✨ Open Pack!</button>
        </>}

        {phase==="tearing"&&<>

// ── TYPE ADVANTAGE TABLE ─────────────────────────────────────────────────────
const TYPE_ADV = {
  Robot:  {strong:"Alien",   weak:"Beast"},
  Alien:  {strong:"Knight",  weak:"Robot"},
  Knight: {strong:"Mage",    weak:"Alien"},
  Mage:   {strong:"Dragon",  weak:"Knight"},
  Dragon: {strong:"Beast",   weak:"Mage"},
  Beast:  {strong:"Robot",   weak:"Dragon"},
};
function typeMultiplier(atkType, defType){
  if(!TYPE_ADV[atkType]) return 1;
  if(TYPE_ADV[atkType].strong===defType) return 1.5;
  if(TYPE_ADV[atkType].weak===defType)   return 0.7;
  return 1;
}
function typeLabel(atkType, defType){
  const m=typeMultiplier(atkType,defType);
  if(m>1) return {text:"Super Effective!",color:"#22c55e"};
  if(m<1) return {text:"Not Very Effective",color:"#ef4444"};
  return null;
}

// Build enemy deck for a node based on difficulty
function buildEnemyDeck(node){
  const diff=node.diff;
  const rarityPool=diff>=0.9?["Legendary","Epic","Epic","Rare","Rare","Common","Common","Common","Common","Common","Common","Common"]
    :diff>=0.75?["Epic","Rare","Rare","Uncommon","Common","Common","Common","Common","Common","Common","Common","Common"]
    :diff>=0.6?["Rare","Uncommon","Uncommon","Common","Common","Common","Common","Common","Common","Common","Common","Common"]
    :["Uncommon","Common","Common","Common","Common","Common","Common","Common","Common","Common","Common","Common"];
  const deck=[];
  for(let i=0;i<12;i++){
    const r=rarityPool[i];
    const opts=ALL_CARDS.filter(c=>c.rarity===r);
    if(opts.length) deck.push({...opts[Math.floor(Math.random()*opts.length)]});
  }
  return deck;
}

// Scale enemy stats by difficulty
function scaleCard(card, diff){
  const mult=0.6+(diff*0.8);
  return {...card, power:Math.round(card.power*mult), hp:Math.round(card.hp*mult), defense:Math.round(card.defense*mult), _scaled:true};
}

// ── GALAXY BATTLE MODAL ──────────────────────────────────────────────────────
function GalaxyBattleModal({collection, savedDecks, onClose, onWin, onLose, node, stamina, onSpendStamina}){
  const staminaCost=1;
  // Phase: deckpick | battle | won | lost
  const [phase,setPhase]=useState("deckpick");
  const [selectedDeck,setSelectedDeck]=useState(null);
  const [customDeck,setCustomDeck]=useState([]); // manually picked cards

  // Build enemy deck once
  const [enemyDeckFull]=useState(()=>buildEnemyDeck(node).map(c=>scaleCard(c,node.diff)));

  // Battle state
  const [playerHand,setPlayerHand]=useState([]);       // cards in hand not yet played
  const [playerField,setPlayerField]=useState([]);     // up to 4 on field [{card,hp,defense,defending}]
  const [enemyField,setEnemyField]=useState([]);       // up to 4 on field
  const [enemyHand,setEnemyHand]=useState([]);         // enemy remaining deck
  const [playerDeckLeft,setPlayerDeckLeft]=useState([]);// remaining deck to draw from
  const [mana,setMana]=useState(0);                    // current mana
  const [maxMana,setMaxMana]=useState(0);              // this turn's max
  const [turn,setTurn]=useState(1);
  const [playerTurn,setPlayerTurn]=useState(true);
  const [log,setLog]=useState([]);
  const [animating,setAnimating]=useState(false);
  const [dmgPops,setDmgPops]=useState([]);             // [{id,text,color,fieldIdx,isEnemy}]
  const [selectedField,setSelectedField]=useState(null); // index of player field card selected to attack with
  const [phase2,setPhase2]=useState("free");           // free|attacking|targeting
  const [rewardCard,setRewardCard]=useState(null);

  const addLog=(text,type="info")=>setLog(prev=>[{text,type,id:Date.now()+Math.random()},...prev].slice(0,20));
  const addDmg=(text,color,fieldIdx,isEnemy)=>{
    const id=Date.now()+Math.random();
    setDmgPops(p=>[...p,{id,text,color,fieldIdx,isEnemy}]);
    setTimeout(()=>setDmgPops(p=>p.filter(x=>x.id!==id)),1200);
  };

  const MANA_COST={Common:1,Uncommon:1,Rare:2,Epic:3,Legendary:4};

  // Start battle after deck is chosen
  const startBattle=(deck)=>{
    const shuffled=[...deck].sort(()=>Math.random()-.5);
    const startHand=shuffled.slice(0,4);
    const deckLeft=shuffled.slice(4);
    const enemyStart=enemyDeckFull.slice(0,4);
    const enemyLeft=enemyDeckFull.slice(4);
    setPlayerHand(startHand.map(c=>({...c,uid:Math.random()})));
    setPlayerDeckLeft(deckLeft.map(c=>({...c,uid:Math.random()})));
    setPlayerField([]);
    setEnemyField(enemyStart.map(c=>({...c,uid:Math.random(),hp:c.hp,maxHp:c.hp,defending:false})));
    setEnemyHand(enemyLeft.map(c=>({...c,uid:Math.random()})));
    setMana(1); setMaxMana(1); setTurn(1); setPlayerTurn(true);
    setLog([{text:`⚔️ Battle starts! Turn 1 — you have 1 mana. ${node.name}: "${node.dialogue}"`,type:"system",id:1}]);
    setPhase("battle");
  };

  // Play a card from hand onto field
  const playCard=(handCard)=>{
    const cost=MANA_COST[handCard.rarity]||1;
    if(mana<cost){addLog(`Not enough mana! ${handCard.name} costs ${cost} mana.`,"err");return;}
    if(playerField.length>=4){addLog("Field is full! (max 4 cards)","err");return;}
    setMana(m=>m-cost);
    setPlayerHand(h=>h.filter(c=>c.uid!==handCard.uid));
    setPlayerField(f=>[...f,{...handCard,hp:handCard.hp,maxHp:handCard.hp,defending:false,uid:handCard.uid}]);
    addLog(`▶ Played ${handCard.name} (cost: ${cost} mana)`,"player");
    SFX.play("cardFlip");
  };

  // Select a field card to attack with
  const selectAttacker=(idx)=>{
    if(!playerTurn||animating)return;
    if(enemyField.length===0){addLog("No enemy cards to attack!","err");return;}
    setSelectedField(idx);
    setPhase2("targeting");
    addLog(`Select an enemy card to attack with ${playerField[idx].name}...`,"info");
  };

  // Execute attack
  const doAttack=(attackerIdx, targetIdx, isSpecial=false)=>{
    if(animating)return;
    const cost=isSpecial?3:1;
    if(mana<cost){addLog(`Not enough mana! ${isSpecial?"Special":"Attack"} costs ${cost} mana.`,"err");setPhase2("free");setSelectedField(null);return;}
    setAnimating(true);
    setMana(m=>m-cost);
    setPhase2("free");
    setSelectedField(null);

    const atk=playerField[attackerIdx];
    const def=enemyField[targetIdx];
    const mult=typeMultiplier(atk.type,def.type);
    const tl=typeLabel(atk.type,def.type);
    const rawDmg=isSpecial?Math.round(atk.power*(atk.specialMult||1.5)):atk.power;
    let dmg=Math.round(rawDmg*mult);

    // Defense check
    let reflectDmg=0;
    if(def.defending){
      if(def.defense>=dmg){
        reflectDmg=def.defense-dmg;
        dmg=0;
      } else {
        dmg=dmg-def.defense;
      }
    }

    if(tl) addLog(`${tl.text} (×${mult})!`,mult>1?"good":"err");
    if(def.defending&&def.defense>0) addLog(`🛡 ${def.name} defended! (DEF ${def.defense})`,"info");

    // Apply damage to enemy
    setEnemyField(prev=>{
      const next=[...prev];
      const newHp=Math.max(0,next[targetIdx].hp-dmg);
      next[targetIdx]={...next[targetIdx],hp:newHp,defending:false};
      addDmg(dmg>0?`-${dmg}`:"BLOCKED","#ef4444",targetIdx,true);
      if(newHp<=0){
        addLog(`💀 ${def.name} destroyed!`,"good");
        SFX.play("achievement");
        // Remove dead card after short delay
        setTimeout(()=>{
          setEnemyField(f=>{
            const updated=f.filter((_,i)=>i!==targetIdx);
            // Draw new enemy card if available
            setEnemyHand(eh=>{
              if(eh.length>0){
                const [next,...rest]=eh;
                setEnemyField(f2=>[...f2.filter((_,i)=>i!==targetIdx),{...next,hp:next.hp,maxHp:next.hp,defending:false}]);
                return rest;
              }
              return eh;
            });
            return updated;
          });
        },400);
      }
      return next;
    });

    // Reflect damage to attacker if any
    if(reflectDmg>0){
      addLog(`⚡ Reflected ${reflectDmg} damage to ${atk.name}!`,"good");
      setPlayerField(prev=>{
        const next=[...prev];
        next[attackerIdx]={...next[attackerIdx],hp:Math.max(0,next[attackerIdx].hp-reflectDmg)};
        return next;
      });
    }

    if(dmg>0) addLog(`⚔️ ${atk.name} → ${def.name}: ${dmg} dmg${isSpecial?" (special)":""}${tl?` (${tl.text})`:""}`,isSpecial?"good":"player");

    SFX.play(isSpecial?"epicFlip":"click");
    setTimeout(()=>setAnimating(false),350);
  };

  // Defend a card
  const doDefend=(fieldIdx)=>{
    if(!playerTurn||animating)return;
    const card=playerField[fieldIdx];
    if(card.defending){addLog(`${card.name} is already defending.`,"err");return;}
    setPlayerField(prev=>{
      const next=[...prev];
      next[fieldIdx]={...next[fieldIdx],defending:true};
      return next;
    });
    setMana(m=>m+1); // gain 1 mana for defending
    addLog(`🛡 ${card.name} takes a defensive stance. +1 mana!`,"player");
    SFX.play("click");
  };

  // Remove dead player cards
  useEffect(()=>{
    const dead=playerField.filter(c=>c.hp<=0);
    if(dead.length>0){
      dead.forEach(c=>addLog(`💀 ${c.name} was destroyed!`,"err"));
      setPlayerField(f=>f.filter(c=>c.hp>0));
    }
  },[playerField.map(c=>c.hp).join(",")]);

  // Check win/loss
  useEffect(()=>{
    if(phase!=="battle")return;
    const allEnemyDead=enemyField.length===0&&enemyHand.length===0;
    const allPlayerDead=playerField.length===0&&playerHand.length===0&&playerDeckLeft.length===0;
    if(allEnemyDead){
      // Build reward card if any
      if(node.card){
        const pool=ALL_CARDS.filter(c=>c.rarity===node.card);
        if(pool.length) setRewardCard(pool[Math.floor(Math.random()*pool.length)]);
      }
      setPhase("won");
      SFX.play("achievement");
    } else if(allPlayerDead){
      setPhase("lost");
      SFX.play("click");
    }
  },[enemyField.length,enemyHand.length,playerField.length,playerHand.length,playerDeckLeft.length,phase]);

  // Enemy AI turn
  const doEnemyTurn=useCallback(()=>{
    setAnimating(true);
    addLog(`🤖 ${node.name}'s turn...`,"system");

    setTimeout(()=>{
      setEnemyField(ef=>{
        if(ef.length===0){setAnimating(false);return ef;}
        setPlayerField(pf=>{
          if(pf.length===0){setAnimating(false);return pf;}
          let newPf=[...pf];
          let newEf=[...ef];

          // Each enemy card attacks a random player card
          newEf.forEach((ec,ei)=>{
            if(newPf.length===0)return;
            const targetIdx=Math.floor(Math.random()*newPf.length);
            const target=newPf[targetIdx];
            const mult=typeMultiplier(ec.type,target.type);
            let dmg=Math.round(ec.power*mult*(0.8+Math.random()*0.4));
            let reflectDmg=0;
            if(target.defending){
              if(target.defense>=dmg){reflectDmg=target.defense-dmg;dmg=0;}
              else dmg=dmg-target.defense;
            }
            addDmg(dmg>0?`-${dmg}`:"BLOCKED","#ef4444",targetIdx,false);
            if(dmg>0) addLog(`🤖 ${ec.name} attacks ${target.name} for ${dmg}`,dmg>30?"err":"info");
            if(target.defending&&target.defense>0) addLog(`🛡 ${target.name} deflects! DEF ${target.defense}`,"info");
            newPf[targetIdx]={...newPf[targetIdx],hp:Math.max(0,newPf[targetIdx].hp-dmg),defending:false};
            if(reflectDmg>0){
              addLog(`⚡ Reflect! ${reflectDmg} back to ${ec.name}`,"good");
              newEf[ei]={...newEf[ei],hp:Math.max(0,newEf[ei].hp-reflectDmg)};
            }
          });

          // Remove dead player cards
          newPf.filter(c=>c.hp<=0).forEach(c=>addLog(`💀 ${c.name} fell!`,"err"));
          newPf=newPf.filter(c=>c.hp>0);
          // Remove dead enemy cards, draw replacements
          newEf.filter(c=>c.hp<=0).forEach(c=>addLog(`💀 ${c.name} destroyed!`,"good"));
          newEf=newEf.filter(c=>c.hp>0);

          setAnimating(false);
          return newPf;
        });
        return ef;
      });

      // Refill enemy field
      setEnemyField(ef=>{
        setEnemyHand(eh=>{
          const slots=4-ef.length;
          if(slots<=0||eh.length===0) return eh;
          const drawn=eh.slice(0,slots).map(c=>({...c,defending:false}));
          setEnemyField(f=>[...f,...drawn]);
          return eh.slice(slots);
        });
        return ef;
      });

      // Start next player turn
      setTimeout(()=>{
        setTurn(t=>{
          const nt=t+1;
          const newMax=Math.min(10,nt);
          setMaxMana(newMax);
          setMana(newMax);
          // Draw a card
          setPlayerDeckLeft(dl=>{
            if(dl.length>0){
              const [drawn,...rest]=dl;
              setPlayerHand(h=>[...h,drawn]);
              addLog(`📥 Drew ${drawn.name}`,"info");
              return rest;
            }
            return dl;
          });
          addLog(`── Turn ${nt} — ${newMax} mana ──`,"system");
          return nt;
        });
        setPlayerTurn(true);
        setAnimating(false);
      },800);
    },1200);
  },[enemyField,playerField,node]);

  const endTurn=()=>{
    if(!playerTurn||animating)return;
    setPlayerTurn(false);
    setPhase2("free");
    setSelectedField(null);
    doEnemyTurn();
  };

  // ── DECK PICK PHASE ──
  if(phase==="deckpick"){
    // All unique cards player has
    const allUnique=[...new Map(collection.map(c=>{const base=ALL_CARDS.find(x=>x.id===c.id)||{};return [c.id+(c.foil?"f":""),{...base,...c}];})).values()];
    return(
      <Modal onClose={onClose} title={`⚔️ ${node.name} — ${node.title}`}>
        <div style={{maxWidth:480,margin:"0 auto"}}>
          <div style={{background:"linear-gradient(135deg,#1e0a3c,#0f172a)",border:"1px solid #4c1d9544",borderRadius:14,padding:16,marginBottom:16,textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:6}}>⚔️</div>
            <div style={{color:"#a855f7",fontWeight:800,fontSize:16,marginBottom:4}}>{node.name}</div>
            <div style={{color:"#64748b",fontSize:12,marginBottom:8}}>{node.title}</div>
            <div style={{color:"#94a3b8",fontSize:13,fontStyle:"italic"}}>"{node.dialogue}"</div>
          </div>
          <div style={{background:"#0f172a",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
            <div style={{color:"#475569",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>REWARDS</div>
            <div style={{display:"flex",gap:8}}>
              <div style={{background:"#1e293b",borderRadius:8,padding:"6px 12px",color:"#f59e0b",fontWeight:700,fontSize:12}}>💎 {node.gems}</div>
              {node.card&&<div style={{background:"#1e293b",borderRadius:8,padding:"6px 12px",color:RC[node.card]?.color||"#94a3b8",fontWeight:700,fontSize:12}}>{node.boss?"👑":"🃏"} {node.card} card</div>}
              {node.boss&&<div style={{background:"#78350f",borderRadius:8,padding:"6px 12px",color:"#f59e0b",fontWeight:700,fontSize:12}}>⭐ BOSS</div>}
            </div>
          </div>
          <div style={{color:"#f59e0b",fontSize:12,marginBottom:6,fontWeight:600}}>⚡ Costs {staminaCost} stamina</div>
          <div style={{color:"white",fontWeight:700,fontSize:14,marginBottom:10}}>Build your deck (pick 12 cards):</div>
          <div style={{color:"#475569",fontSize:11,marginBottom:12}}>
            Costs: Common/Uncommon=1 mana · Rare=2 · Epic=3 · Legendary=4
          </div>
          {/* Type advantages quick ref */}
          <div style={{background:"#0f172a",borderRadius:8,padding:"8px 12px",marginBottom:14}}>
            <div style={{color:"#475569",fontSize:9,fontWeight:700,letterSpacing:1,marginBottom:6}}>TYPE ADVANTAGES</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {Object.entries(TYPE_ADV).map(([t,v])=>(
                <div key={t} style={{fontSize:9,color:"#64748b"}}>
                  <span style={{color:"#22c55e",fontWeight:700}}>{t}</span> → <span style={{color:"#f59e0b"}}>{v.strong}</span>
                </div>
              ))}
            </div>
          </div>
          {/* Saved decks shortcut */}
          {savedDecks.length>0&&<>
            <div style={{color:"#64748b",fontSize:12,marginBottom:8}}>Quick select a saved deck:</div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
              {savedDecks.map((d,i)=>{
                const cards=d.cards.slice(0,12).map(dc=>collection.find(c=>c.id===dc.id)||dc).filter(Boolean);
                const padded=[...cards,...Array(Math.max(0,12-cards.length)).fill(null)].map((c,j)=>c||allUnique[j%allUnique.length]||allUnique[0]).slice(0,12);
                return <button key={i} onClick={()=>{if(stamina<staminaCost){alert("Not enough stamina!");return;}onSpendStamina(staminaCost);startBattle(padded);}}
                  style={{background:"linear-gradient(135deg,#1e0a3c,#0f172a)",border:"1px solid #4c1d9544",borderRadius:10,padding:"10px 14px",color:"white",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700}}>{d.name} <span style={{color:"#475569",fontSize:11}}>({d.cards.length} cards)</span></span>
                  <span style={{color:"#a855f7",fontSize:12}}>Use →</span>
                </button>;
              })}
            </div>
          </>}
          {/* Manual card picker */}
          <div style={{color:"#64748b",fontSize:12,marginBottom:8}}>Or pick cards manually ({customDeck.length}/12):</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
            {allUnique.map((card,i)=>{
              const picked=customDeck.filter(c=>c.uid===card.uid||c.id===card.id).length;
              const inDeck=customDeck.some(c=>c.id===card.id);
              return <div key={i} style={{position:"relative",cursor:"pointer"}} onClick={()=>{
                if(inDeck){setCustomDeck(d=>{const idx=d.findIndex(c=>c.id===card.id);return d.filter((_,j)=>j!==idx);});}
                else if(customDeck.length<12){setCustomDeck(d=>[...d,{...card,uid:Math.random()}]);}
              }}>
                <Card card={card} mini selected={inDeck}/>
                {inDeck&&<div style={{position:"absolute",top:2,right:2,background:"#a855f7",color:"white",borderRadius:999,width:16,height:16,fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>✓</div>}
              </div>;
            })}
          </div>
          <button onClick={()=>{
            if(customDeck.length<6){alert("Pick at least 6 cards!");return;}
            const deck=customDeck.length<12?[...customDeck,...customDeck].slice(0,12):customDeck;
            if(stamina<staminaCost){alert("Not enough stamina!");return;}
            onSpendStamina(staminaCost);
            startBattle(deck);
          }} disabled={customDeck.length<6}
            style={{width:"100%",background:customDeck.length>=6?"linear-gradient(135deg,var(--t1),var(--t2))":"#1e293b",color:customDeck.length>=6?"white":"#475569",border:"none",borderRadius:12,padding:"14px",fontWeight:800,fontSize:15,cursor:customDeck.length>=6?"pointer":"not-allowed"}}>
            ⚔️ Battle! ({customDeck.length}/12 cards)
          </button>
        </div>
      </Modal>
    );
  }

  // ── BATTLE PHASE ──
  if(phase==="battle"){
    const canEndTurn=playerTurn&&!animating;
    return(
      <Modal onClose={onClose} title={`⚔️ vs ${node.name} — Turn ${turn}`}>
        <div style={{maxWidth:500,margin:"0 auto"}}>
          {/* Mana bar */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,background:"#0f172a",borderRadius:10,padding:"8px 12px"}}>
            <span style={{color:"#a855f7",fontWeight:800,fontSize:13}}>⚡ Mana: {mana}/{maxMana}</span>
            <div style={{flex:1,background:"#1e293b",borderRadius:999,height:8}}>
              <div style={{width:`${maxMana>0?mana/maxMana*100:0}%`,height:"100%",background:"linear-gradient(90deg,#7c3aed,#a855f7)",borderRadius:999,transition:"width .3s"}}/>
            </div>
            <span style={{color:"#475569",fontSize:10}}>Turn {turn}</span>
          </div>

          {/* Enemy field */}
          <div style={{marginBottom:8}}>
            <div style={{color:"#ef4444",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:4}}>⚔️ {node.name.toUpperCase()} FIELD ({enemyField.length}/4) · {enemyHand.length} in reserve</div>
            {enemyField.length===0
              ?<div style={{background:"#1a0000",borderRadius:10,padding:"20px",textAlign:"center",color:"#475569",fontSize:12}}>No cards on field</div>
              :<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {enemyField.map((card,i)=>(
                  <div key={card.uid} style={{position:"relative",cursor:phase2==="targeting"?"pointer":"default",opacity:animating?0.7:1}}
                    onClick={()=>{if(phase2==="targeting"&&selectedField!==null)doAttack(selectedField,i,false);}}>
                    <Card card={card} mini showHp currentHp={card.hp}/>
                    {card.defending&&<div style={{position:"absolute",bottom:24,left:0,right:0,textAlign:"center",fontSize:8,color:"#3b82f6",fontWeight:800}}>🛡DEF</div>}
                    {phase2==="targeting"&&<div style={{position:"absolute",inset:0,border:"2px solid #ef4444",borderRadius:14,animation:"pulse 1s infinite"}}/>}
                    {dmgPops.filter(p=>p.isEnemy&&p.fieldIdx===i).map(p=>(
                      <div key={p.id} style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",color:p.color,fontWeight:900,fontSize:14,animation:"dmgPop .8s ease-out forwards",pointerEvents:"none",whiteSpace:"nowrap",zIndex:10}}>{p.text}</div>
                    ))}
                  </div>
                ))}
              </div>
            }
          </div>

          <div style={{borderTop:"1px solid #1e293b",borderBottom:"1px solid #1e293b",margin:"10px 0",padding:"6px 0",textAlign:"center",color:"#334155",fontSize:10,letterSpacing:2}}>── BATTLEFIELD ──</div>

          {/* Player field */}
          <div style={{marginBottom:10}}>
            <div style={{color:"#22c55e",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:4}}>🟢 YOUR FIELD ({playerField.length}/4)</div>
            {playerField.length===0
              ?<div style={{background:"#052e16",borderRadius:10,padding:"16px",textAlign:"center",color:"#475569",fontSize:12}}>Play cards from your hand below</div>
              :<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {playerField.map((card,i)=>(
                  <div key={card.uid} style={{position:"relative",opacity:animating?0.7:1}}>
                    <Card card={card} mini showHp currentHp={card.hp}/>
                    {card.defending&&<div style={{position:"absolute",bottom:24,left:0,right:0,textAlign:"center",fontSize:8,color:"#3b82f6",fontWeight:800}}>🛡DEF</div>}
                    {selectedField===i&&<div style={{position:"absolute",inset:0,border:"2px solid #a855f7",borderRadius:14}}/>}
                    {dmgPops.filter(p=>!p.isEnemy&&p.fieldIdx===i).map(p=>(
                      <div key={p.id} style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",color:p.color,fontWeight:900,fontSize:14,animation:"dmgPop .8s ease-out forwards",pointerEvents:"none",whiteSpace:"nowrap",zIndex:10}}>{p.text}</div>
                    ))}
                    {playerTurn&&!animating&&<div style={{display:"flex",gap:3,marginTop:3,justifyContent:"center"}}>
                      <button onClick={()=>selectAttacker(i)} style={{background:"#7f1d1d",color:"white",border:"none",borderRadius:5,padding:"3px 6px",fontSize:8,fontWeight:700,cursor:"pointer"}}>⚔️1</button>
                      <button onClick={()=>{setSelectedField(i);setPhase2("special");if(enemyField.length>0)doAttack(i,Math.floor(Math.random()*enemyField.length),true);}} style={{background:"#4c1d95",color:"white",border:"none",borderRadius:5,padding:"3px 6px",fontSize:8,fontWeight:700,cursor:"pointer"}}>✨3</button>
                      <button onClick={()=>doDefend(i)} style={{background:"#1e3a5f",color:"white",border:"none",borderRadius:5,padding:"3px 6px",fontSize:8,fontWeight:700,cursor:"pointer"}}>🛡+1</button>
                    </div>}
                  </div>
                ))}
              </div>
            }
          </div>

          {/* Action buttons */}
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button onClick={endTurn} disabled={!canEndTurn}
              style={{flex:1,background:canEndTurn?"linear-gradient(135deg,#1d4ed8,#3b82f6)":"#1e293b",color:canEndTurn?"white":"#475569",border:"none",borderRadius:10,padding:"10px",fontWeight:700,fontSize:13,cursor:canEndTurn?"pointer":"not-allowed"}}>
              End Turn ▶
            </button>
            {phase2==="targeting"&&<button onClick={()=>{setPhase2("free");setSelectedField(null);}}
              style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:10,padding:"10px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
              Cancel
            </button>}
          </div>

          {/* Hand */}
          <div style={{marginBottom:10}}>
            <div style={{color:"#94a3b8",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:4}}>HAND ({playerHand.length}) · {playerDeckLeft.length} left in deck</div>
            {playerHand.length===0
              ?<div style={{color:"#334155",fontSize:11,textAlign:"center",padding:"10px"}}>No cards in hand</div>
              :<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {playerHand.map((card,i)=>{
                  const cost=MANA_COST[card.rarity]||1;
                  const canPlay=mana>=cost&&playerField.length<4&&playerTurn&&!animating;
                  return <div key={card.uid} style={{position:"relative",opacity:canPlay?1:0.5,cursor:canPlay?"pointer":"not-allowed"}} onClick={()=>canPlay&&playCard(card)}>
                    <Card card={card} mini/>
                    <div style={{position:"absolute",top:2,left:2,background:canPlay?"#a855f7":"#475569",color:"white",borderRadius:999,width:16,height:16,fontSize:9,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{cost}</div>
                  </div>;
                })}
              </div>
            }
          </div>

          {/* Battle log */}
          <div style={{background:"#0f172a",borderRadius:10,padding:"8px 12px",maxHeight:120,overflowY:"auto"}}>
            <div style={{color:"#475569",fontSize:9,fontWeight:700,letterSpacing:2,marginBottom:4}}>BATTLE LOG</div>
            {log.map((l,i)=>(
              <div key={l.id||i} style={{fontSize:10,marginBottom:2,color:l.type==="err"?"#ef4444":l.type==="good"?"#22c55e":l.type==="player"?"#a855f7":l.type==="system"?"#f59e0b":"#64748b",opacity:Math.max(0.4,1-i*0.05)}}>{l.text}</div>
            ))}
          </div>
        </div>
      </Modal>
    );
  }

  // ── WON PHASE ──
  if(phase==="won"){
    return(
      <Modal onClose={()=>{onWin(node.gems,rewardCard);onClose();}} title="🏆 Victory!">
        <div style={{maxWidth:400,margin:"0 auto",textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:12}}>🏆</div>
          <div style={{color:"#22c55e",fontWeight:800,fontSize:20,marginBottom:4}}>Victory!</div>
          <div style={{color:"#94a3b8",fontSize:14,marginBottom:20}}>{node.name} has been defeated!</div>
          <div style={{background:"#052e16",border:"1px solid #14532d",borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{color:"#22c55e",fontWeight:700,marginBottom:8}}>Rewards:</div>
            <div style={{color:"#f59e0b",fontWeight:900,fontSize:22,marginBottom:4}}>+💎 {node.gems}</div>
            {rewardCard&&<div style={{marginTop:8}}>
              <div style={{color:"#94a3b8",fontSize:12,marginBottom:8}}>🃏 Card reward:</div>
              <div style={{display:"flex",justifyContent:"center"}}><Card card={rewardCard} mini/></div>
            </div>}
          </div>
          <button onClick={()=>{onWin(node.gems,rewardCard);onClose();}}
            style={{background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white",border:"none",borderRadius:12,padding:"14px 32px",fontWeight:800,fontSize:16,cursor:"pointer",width:"100%"}}>
            Claim Rewards! ✨
          </button>
        </div>
      </Modal>
    );
  }

  // ── LOST PHASE ──
  return(
    <Modal onClose={()=>{onLose();onClose();}} title="💀 Defeated">
      <div style={{maxWidth:400,margin:"0 auto",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>💀</div>
        <div style={{color:"#ef4444",fontWeight:800,fontSize:20,marginBottom:4}}>Defeated!</div>
        <div style={{color:"#94a3b8",fontSize:14,marginBottom:20}}>{node.name} was too strong this time.</div>
        <div style={{background:"#1a0000",border:"1px solid #7f1d1d",borderRadius:12,padding:14,marginBottom:16,color:"#64748b",fontSize:13}}>
          +40 XP for trying · Stamina not refunded · Try a different deck!
        </div>
        <button onClick={()=>{onLose();onClose();}}

function DupesModal({collection,onClose,onSellOne,onSellAll}){

      const card=collection.find(c=>c.id===parseInt(id));
      if(card) dupes.push({card,count:cnt,extras:cnt-1,value:(cnt-1)*(gv[card.rarity]||5)});
    }
  });
  dupes.sort((a,b)=>{const o={Legendary:0,Epic:1,Rare:2,Uncommon:3,Common:4};return (o[a.card.rarity]??5)-(o[b.card.rarity]??5);});

// ── Daily Shop ────────────────────────────────────────────────────────────────
function DailyShopModal({collection, coins, onBuy, onClose, packsSinceLeg, onBuyPack, lastAdWatch, onWatchAd}) {
  const [shopTab, setShopTab] = useState("packs");

  // Daily seed - refreshes at midnight CST (UTC-6)
  const nowCST = new Date(Date.now() - 6*60*60*1000);
  const todayCST = nowCST.toISOString().slice(0,10);
  const seed = todayCST.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rr = (n,offset=0) => ((seed*(n+offset+1)*1664525+1013904223)&0x7fffffff)/0x7fffffff;

  // 5 daily cards: 1 Legendary chance (~10%), 1 Epic, 1 Rare, 2 Uncommon/Common
  const pickCard = (pool, idx) => pool[Math.floor(rr(pool.length, idx)*pool.length)];
  const usedIds = new Set();
  const pickUniqueCard = (pool, idx) => {
    const available = pool.filter(c=>!usedIds.has(c.id));
    const card = available[Math.floor(rr(available.length, idx)*available.length)];
    if(card) usedIds.add(card.id);
    return card;
  };
  const isLeg = rr(1)<0.10;
  const dailyCards = [
    { card: pickUniqueCard(isLeg ? ALL_CARDS.filter(c=>c.rarity==="Legendary") : ALL_CARDS.filter(c=>c.rarity==="Epic"), 0), price: isLeg ? 1200 : 500 },
    { card: pickUniqueCard(ALL_CARDS.filter(c=>c.rarity==="Epic"), 1), price: 450 },
    { card: pickUniqueCard(ALL_CARDS.filter(c=>c.rarity==="Rare"), 2), price: 200 },
    { card: pickUniqueCard(ALL_CARDS.filter(c=>["Uncommon","Common"].includes(c.rarity)), 3), price: 80 },
    { card: pickUniqueCard(ALL_CARDS.filter(c=>["Uncommon","Common"].includes(c.rarity)), 4), price: 60 },
  ];

  // Countdown to midnight CST
  const msUntilMidnightCST = () => {
    const now = new Date();
    const midnightCST = new Date();
    midnightCST.setUTCHours(6,0,0,0); // midnight CST = 06:00 UTC
    if(midnightCST <= now) midnightCST.setUTCDate(midnightCST.getUTCDate()+1);
    return midnightCST - now;
  };
  const [countdown, setCountdown] = useState(msUntilMidnightCST());
  useEffect(()=>{
    const t = setInterval(()=>setCountdown(msUntilMidnightCST()), 1000);
    return ()=>clearInterval(t);
  },[]);
  const fmtCountdown = ms => {
    const h = Math.floor(ms/3600000);
    const m = Math.floor((ms%3600000)/60000);
    const s = Math.floor((ms%60000)/1000);
    return `${h}h ${m}m ${s}s`;
  };

  // Ad cooldown (30 min)
  const AD_COOLDOWN = 30*60*1000;
  const [adWatching, setAdWatching] = useState(false);
  const [adCountdown, setAdCountdown] = useState(0);
  const canWatchAd = !lastAdWatch || (Date.now()-lastAdWatch) >= AD_COOLDOWN;
  const adCooldownLeft = lastAdWatch ? Math.max(0, AD_COOLDOWN-(Date.now()-lastAdWatch)) : 0;
  const fmtAdCooldown = ms => {
    const m = Math.floor(ms/60000);
    const s = Math.floor((ms%60000)/1000);
    return `${m}:${s.toString().padStart(2,'0')}`;
  };
  const [adDisplay, setAdDisplay] = useState(adCooldownLeft);
  useEffect(()=>{
    if(canWatchAd) return;
    const t = setInterval(()=>setAdDisplay(Math.max(0,AD_COOLDOWN-(Date.now()-lastAdWatch))),1000);
    return ()=>clearInterval(t);
  },[lastAdWatch]);

  const startAd = () => {
    SFX.play("click");
    setAdWatching(true);
    setAdCountdown(5);
    const t = setInterval(()=>{
      setAdCountdown(n=>{
        if(n<=1){ clearInterval(t); setAdWatching(false); onWatchAd(); return 0; }
        return n-1;
      });
    },1000);
  };

  const owned = new Set(collection.map(c=>c.id));

  const tabBtn = (id, label, color) => (
    <button onClick={()=>{SFX.play("click");setShopTab(id);}}
      style={{flex:1,background:shopTab===id?color+"22":"transparent",color:shopTab===id?color:"#475569",
        border:`1px solid ${shopTab===id?color:"#1e293b"}`,borderRadius:8,padding:"8px 4px",
        fontSize:11,fontWeight:shopTab===id?700:400,cursor:"pointer",transition:"all .15s"}}>
      {label}
    </button>
  );

  return (
    <Modal onClose={onClose} title="🏪 Shop">
      <div style={{maxWidth:520,margin:"0 auto"}}>

        {/* Gem balance */}
        <div style={{background:"#0f172a",border:"1px solid var(--t2b)",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{color:"#64748b",fontSize:12}}>Your balance</span>
          <span style={{color:"#a855f7",fontWeight:900,fontSize:18}}>💎 {coins.toLocaleString()}</span>
        </div>

        {/* Tab bar */}
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {tabBtn("packs","🪐 Packs","#a855f7")}
          {tabBtn("cards","🃏 Daily Cards","#06b6d4")}
          {tabBtn("purchases","💳 Purchases","#f59e0b")}
        </div>

        {/* PACKS TAB */}
        {shopTab==="packs"&&<>
          <div style={{background:"linear-gradient(135deg,#1c1008,#2d1a00)",border:"1px solid #f59e0b44",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{color:"#f59e0b",fontWeight:700,fontSize:12}}>🌟 Guaranteed Legendary</div>
              <div style={{color:"#64748b",fontSize:11,marginTop:1}}>Every 20 packs</div>
            </div>
            <div style={{textAlign:"center",background:"#1c1008",borderRadius:8,padding:"6px 12px",border:"1px solid #f59e0b33"}}>
              <div style={{color:"#f59e0b",fontWeight:900,fontSize:24,lineHeight:1}}>{20-packsSinceLeg}</div>
              <div style={{color:"#475569",fontSize:9}}>packs left</div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {PACKS.map(p=>(
              <div key={p.id} style={{background:"linear-gradient(135deg,#0f172a,#1e0a3c)",border:"1px solid #2e1065",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
