// ── GALAXY BATTLE MODAL ──────────────────────────────────────────────────────
function GalaxyBattleModal({collection, savedDecks, onClose, onWin, onLose, node, stamina, onSpendStamina, playerLevel=1}){
  const staminaCost=1;
  // Phase: deckpick | battle | won | lost
  const [phase,setPhase]=useState("deckpick");
  const [selectedDeck,setSelectedDeck]=useState(null);
  const [customDeck,setCustomDeck]=useState([]); // manually picked cards

  // Build enemy deck once
  const [enemyDeckFull]=useState(()=>buildEnemyDeck(node).map(c=>scaleCard(c,node.diff)));

  // Battle state
  const [playerHand,setPlayerHand]=useState([]);       // cards in hand not yet played
  const [playerField,setPlayerField]=useState([]);     // up to 4 on field [{card,hp,defense,defending}]
  const [enemyField,setEnemyField]=useState([]);       // up to 4 on field
  const [enemyHand,setEnemyHand]=useState([]);         // enemy remaining deck
  const [playerDeckLeft,setPlayerDeckLeft]=useState([]);// remaining deck to draw from
  const [battleStamina,setBattleStamina]=useState(1);  // starts at 1, +1 per turn, caps at 8
  const [turn,setTurn]=useState(1);
  const [playerTurn,setPlayerTurn]=useState(true);
  const [log,setLog]=useState([]);
  const [animating,setAnimating]=useState(false);
  const [attackingCard,setAttackingCard]=useState(null); // player fieldIdx mid-lunge
  const [hitCard,setHitCard]=useState(null);             // enemy fieldIdx being hit
  const [dmgPops,setDmgPops]=useState([]);
  const [selectedField,setSelectedField]=useState(null);
  const [phase2,setPhase2]=useState("free");
  const [pendingSpecial,setPendingSpecial]=useState(false);
  const [rewardCard,setRewardCard]=useState(null);
  const [playerHp,setPlayerHp]=useState(0); // set in startBattle based on level
  const [playerMaxHp,setPlayerMaxHp]=useState(0);
  const [enemyHp,setEnemyHp]=useState(0);
  const [enemyMaxHp,setEnemyMaxHp]=useState(0);
  const [actedCards,setActedCards]=useState(new Set()); // uids of cards that acted this turn
  const [specialUsed,setSpecialUsed]=useState(new Set()); // uids that used special this battle
  const [coinFlip,setCoinFlip]=useState(null); // null|"heads"|"tails"
  const [shieldedCards,setShieldedCards]=useState(new Set()); // uids with active Shield buff (absorbs next hit 60%)
  const [intimidatedCards,setIntimidatedCards]=useState({}); // uid -> 0.75 multiplier (permanent until card leaves)
  const [activeEffects,setActiveEffects]=useState({}); // uid -> [{type,ticksLeft}] DoT/buff effects
  const [playedThisTurn,setPlayedThisTurn]=useState(new Set()); // uids played this turn (cannot act same turn)

  const addLog=(text,type="info")=>setLog(prev=>[{text,type,id:Date.now()+Math.random()},...prev].slice(0,20));
  const addDmg=(text,color,fieldIdx,isEnemy)=>{
    const id=Date.now()+Math.random();
    setDmgPops(p=>[...p,{id,text,color,fieldIdx,isEnemy}]);
    setTimeout(()=>setDmgPops(p=>p.filter(x=>x.id!==id)),1200);
  };

  const MANA_COST={Common:1,Uncommon:1,Rare:2,Epic:3,Legendary:4};

  // Start battle after deck is chosen
  const startBattle=(deck, plLevel)=>{
    // Shuffle deck — no forced opening hand guarantee (deck rules allow any composition)
    const shuffled=[...deck].sort(()=>Math.random()-.5);
    const startHand=shuffled.slice(0,4);
    const deckLeft=shuffled.slice(4);
    // Player health: 100 + (5 × player level)
    const maxHp=100+((plLevel||1)*5);
    setPlayerHp(maxHp);
    setPlayerMaxHp(maxHp);
    // Enemy HP = 100 + (5 × node level), where enemy level = node id (node number)
    const enemyLevel=node.id||1;
    const eHp=100+(5*enemyLevel);
    setEnemyHp(eHp);
    setEnemyMaxHp(eHp);
    // Enemy also starts with hand of 4, 0 on field
    const enemyStartHand=enemyDeckFull.slice(0,4);
    const enemyLeft=enemyDeckFull.slice(4);
    // Coin flip — heads = player goes first, tails = enemy goes first
    const flip=Math.random()<0.5?"heads":"tails";
    const playerFirst=flip==="heads";
    setCoinFlip(flip);
    setPlayerHand(startHand.map(c=>({...c,uid:Math.random()})));
    setPlayerDeckLeft(deckLeft.map(c=>({...c,uid:Math.random()})));
    setPlayerField([]);
    setEnemyField([]);
    setEnemyHand([...enemyStartHand,...enemyLeft].map(c=>({...c,uid:Math.random()})));
    setActedCards(new Set());
    setSpecialUsed(new Set());
    setShieldedCards(new Set());
    setIntimidatedCards({});
    setPlayedThisTurn(new Set());
    setActiveEffects({});
    setReplacingSlot(null);
    setBattleStamina(playerFirst?1:0); setTurn(1); setPlayerTurn(playerFirst);
    setLog([
      {text:`⚔️ ${node.name}: "${node.dialogue}"`,type:"system",id:0},
      {text:`🪙 ${flip==="heads"?"You go first!":"Enemy goes first!"}`,type:"system",id:1}
    ]);
    setPhase("battle");
    // If enemy goes first, trigger their turn after short delay
    if(!playerFirst){
      setTimeout(()=>doEnemyTurn(),1200);
    }
  };

  // Play a card from hand onto field
  const playCard=(handCard)=>{
    const cost=MANA_COST[handCard.rarity]||1;
    if(battleStamina<cost){addLog(`Not enough stamina! ${handCard.name} costs ${cost}.`,"err");return;}
    if(playerField.length>=4){addLog("Field is full! (max 4 cards)","err");return;}
    if(playerField.filter(c=>c.id===handCard.id).length>=2){addLog(`Max 2 copies of ${handCard.name} on field at once.`,"err");return;}
    setBattleStamina(s=>s-cost);
    setPlayerHand(h=>h.filter(c=>c.uid!==handCard.uid));
    setPlayerField(f=>[...f,{...handCard,hp:handCard.hp,maxHp:handCard.hp,defending:false,uid:handCard.uid}]);
    // Card cannot act the same turn it is played
    setPlayedThisTurn(prev=>{const next=new Set(prev);next.add(handCard.uid);return next;});
    setReplacingSlot(null);
    addLog(`▶ Played ${handCard.name} (cost: ${cost})`,"player");
    SFX.play("cardFlip");
  };

  // Select a field card to attack with
  const selectAttacker=(idx,isSpecial=false)=>{
    if(!playerTurn||animating)return;
    // Turn 1 restriction: play cards only — no attack, defend, or special
    if(turn===1){addLog("Turn 1: you may only play cards.","err");return;}
    const card=playerField[idx];
    if(card&&playedThisTurn.has(card.uid)){addLog(`${card.name} cannot act the turn it was played.`,"err");return;}
    if(enemyField.length===0){addLog("No enemy cards to attack!","err");return;}
    setSelectedField(idx);
    setPendingSpecial(isSpecial);
    setPhase2("targeting");
    addLog(`Select an enemy card to ${isSpecial?"use special on":"attack with"} ${playerField[idx].name}...`,"info");
  };

  // Ability trigger chance by rarity + foil bonus, hard cap 50%
  // Common=10%, Uncommon=15%, Rare=20%, Epic=25%, Legendary=30%, God=35%, Foil+5%
  const abilityTriggerChance=(card)=>{
    const base={Common:0.10,Uncommon:0.15,Rare:0.20,Epic:0.25,Legendary:0.30,God:0.35}[card.rarity]||0.10;
    const foilBonus=card.foil?0.05:0;
    return Math.min(0.50,base+foilBonus);
  };

  // Execute attack — resolution order per design:
  // 1. base damage  2. type modifier (×1.2/×0.8, floor)
  // 3. Defend (subtract DEF; excess reflected if DEF>dmg)
  // 4. Shield (50% of remaining, floor)  5. apply damage
  // 6. ability trigger roll (Special only, target must survive)
  const doAttack=(attackerIdx, targetIdx, isSpecial=false)=>{
    if(animating)return;
    const cost=isSpecial?3:1;
    if(battleStamina<cost){addLog(`Not enough stamina! ${isSpecial?"Special":"Attack"} costs ${cost}.`,"err");setPhase2("free");setSelectedField(null);return;}
    setAnimating(true);
    setBattleStamina(s=>s-cost);
    setPhase2("free");
    setSelectedField(null);
    setPendingSpecial(false);
    setActedCards(prev=>{const next=new Set(prev);next.add(playerField[attackerIdx]?.uid);return next;});
    if(isSpecial) setSpecialUsed(prev=>{const next=new Set(prev);next.add(playerField[attackerIdx]?.uid);return next;});

    // Trigger lunge animation
    setAttackingCard(attackerIdx);
    setTimeout(()=>setAttackingCard(null),500);

    const atk=playerField[attackerIdx];
    const def=enemyField[targetIdx];

    // Step 1: base damage
    const rawDmg=isSpecial?Math.floor(atk.power*(atk.specialMult||1.5)):atk.power;

    // Step 2: type modifier — +20% or -20%, round DOWN
    const tAdv=TYPE_ADV[atk.type];
    let typeMod=1;
    let typeText=null;
    if(tAdv){
      if(tAdv.strong===def.type){typeMod=1.2;typeText="Super Effective! (+20%)";}
      else if(tAdv.weak===def.type){typeMod=0.8;typeText="Not Very Effective (-20%)";}
    }
    let dmg=Math.floor(rawDmg*typeMod);
    if(typeText) addLog(`${typeText}`,typeMod>1?"good":"err");

    // Step 3: Defend — subtract DEF; if DEF > dmg → reflect excess to attacker
    let reflectDmg=0;
    if(def.defending){
      if(def.defense>=dmg){
        reflectDmg=def.defense-dmg;
        dmg=0;
      } else {
        dmg=dmg-def.defense;
      }
      addLog(`🛡 ${def.name} defended! (DEF ${def.defense})${reflectDmg>0?" — reflects "+reflectDmg+" back!":""}`,
        reflectDmg>0?"good":"info");
    }

    // Step 4: Shield — 50% of remaining damage, round down (applies after Defend)
    let shieldAbsorbed=0;
    if(shieldedCards.has(def.uid)&&dmg>0){
      shieldAbsorbed=Math.floor(dmg*0.50);
      dmg=dmg-shieldAbsorbed;
      setShieldedCards(prev=>{const next=new Set(prev);next.delete(def.uid);return next;});
      addLog(`🛡 ${def.name}'s Shield absorbs ${shieldAbsorbed} dmg (50%)!`,"info");
    }

    // Trigger hit flash
    setTimeout(()=>{
      setHitCard(targetIdx);
      setTimeout(()=>setHitCard(null),400);
    },220);

    // Step 5: apply final damage
    setEnemyField(prev=>{
      const next=[...prev];
      if(targetIdx>=next.length)return prev;
      const newHp=Math.max(0,next[targetIdx].hp-dmg);
      next[targetIdx]={...next[targetIdx],hp:newHp,defending:false};
      addDmg(dmg>0?`-${dmg}`:"BLOCKED","#ef4444",targetIdx,true);
      if(dmg>0) addLog(`⚔️ ${atk.name} → ${def.name}: ${dmg} dmg${isSpecial?" (special)":""}`,
        "player");
      if(newHp<=0){
        addLog(`💀 ${def.name} destroyed!`,"good");
        SFX.play("achievement");
        // Remove effects on destroyed card
        setActiveEffects(prev=>{const next2={...prev};delete next2[def.uid];return next2;});
        setTimeout(()=>{
          setEnemyField(f=>{
            const updated=f.filter((_,i)=>i!==targetIdx);
            setEnemyHand(eh=>{
              if(eh.length>0){
                const [nextCard,...rest]=eh;
                setEnemyField(f2=>[...f2.filter((_,i)=>i!==targetIdx),
                  {... nextCard,hp:nextCard.hp,maxHp:nextCard.hp,defending:false}]);
                return rest;
              }
              return eh;
            });
            return updated;
          });
        },400);
      }
      return next;
    });

    // Apply reflect damage to attacker
    if(reflectDmg>0){
      setPlayerField(prev=>{
        const next=[...prev];
        if(attackerIdx>=next.length)return prev;
        const newHp=Math.max(0,next[attackerIdx].hp-reflectDmg);
        next[attackerIdx]={...next[attackerIdx],hp:newHp};
        addDmg(`-${reflectDmg}`,"#f59e0b",attackerIdx,false);
        addLog(`↩ ${atk.name} takes ${reflectDmg} reflected damage!`,"err");
        return next;
      });
    }

    SFX.play(isSpecial?"specialHit":"hit");

    // Step 6: ability trigger — Special only, roll chance, target must survive
    if(isSpecial){
      const chance=abilityTriggerChance(atk);
      const roll=Math.random();
      if(roll<chance){
        // Check target still alive before resolving enemy-targeted abilities
        setTimeout(()=>{
          setEnemyField(ef=>{
            const targetAlive=ef.some(c=>c.uid===def.uid&&c.hp>0);
            const abilityKey=CARD_ABILITIES[atk.id];
            const isOffensive=["burn","poison","pierce","thorns","laststand","intimidate"].includes(abilityKey);
            if(isOffensive&&!targetAlive){
              // Target dead — offensive ability does not resolve
            } else {
              addLog(`✨ ${atk.name} triggers ${ABILITIES[abilityKey]?.name||abilityKey}! (${Math.round(chance*100)}% chance)`,
                "player");
              resolveAbility(atk, def, "player","enemy");
            }
            return ef;
          });
        },450);
      }
    }

    setTimeout(()=>setAnimating(false),400);
  };

  // Defend a card — pure defensive stance
  const doDefend=(fieldIdx)=>{
    if(!playerTurn||animating)return;
    // Turn 1 restriction: play cards only
    if(turn===1){addLog("Turn 1: you may only play cards.","err");return;}
    const card=playerField[fieldIdx];
    if(playedThisTurn.has(card.uid)){addLog(`${card.name} cannot act the turn it was played.`,"err");return;}
    if(card.defending){addLog(`${card.name} is already defending.`,"err");return;}
    setPlayerField(prev=>{
      const next=[...prev];
      next[fieldIdx]={...next[fieldIdx],defending:true};
      return next;
    });
    setActedCards(prev=>{const next=new Set(prev);next.add(card.uid);return next;});
    addLog(`🛡 ${card.name} braces for impact. DEF absorbs damage; excess reflects!`,"player");
    SFX.play("click");
  };

  // ── resolveAbility ────────────────────────────────────────────────────────────
  // Abilities trigger ONLY on Special, after trigger roll in doAttack.
  // Burn/Poison apply DoT effects (tick at start of controller's next turn).
  // casterOwner: "player"|"enemy"  targetOwner: "player"|"enemy"
  const resolveAbility=(casterCard, targetCard, casterOwner, targetOwner)=>{
    const abilityKey=CARD_ABILITIES[casterCard.id];
    if(!abilityKey){addLog(`${casterCard.name} has no ability.`,"err");return;}

    const setCasterField=casterOwner==="player"?setPlayerField:setEnemyField;
    const setTargetField=targetOwner==="player"?setPlayerField:setEnemyField;

    // Helper: apply a DoT effect to a card (no stacking — refresh duration)
    const applyEffect=(targetUid, effectType, ticks)=>{
      setActiveEffects(prev=>{
        const existing=(prev[targetUid]||[]).filter(e=>e.type!==effectType);
        return {...prev,[targetUid]:[...existing,{type:effectType,ticksLeft:ticks}]};
      });
    };

    switch(abilityKey){

      // ── BURN: 15% of target maxHp per tick, 3 turns ────────────────────────
      case "burn":{
        if(!targetCard){addLog(`${casterCard.name} Burn: no target.`,"err");break;}
        applyEffect(targetCard.uid,"burn",3);
        addLog(`🔥 ${casterCard.name} applies Burn! 15% max HP/turn for 3 turns.`,"player");
        SFX.play("specialHit");
        break;
      }

      // ── POISON: 10% of target maxHp per tick, 3 turns ──────────────────────
      case "poison":{
        if(!targetCard){addLog(`${casterCard.name} Poison: no target.`,"err");break;}
        applyEffect(targetCard.uid,"poison",3);
        addLog(`☠️ ${casterCard.name} applies Poison! 10% max HP/turn for 3 turns.`,"player");
        SFX.play("specialHit");
        break;
      }

      // ── PIERCE: caster power, ignoring 50% of target defense ───────────────
      case "pierce":{
        if(!targetCard){addLog(`${casterCard.name} Pierce: no target.`,"err");break;}
        setTargetField(prev=>{
          const next=[...prev];
          const idx=next.findIndex(c=>c.uid===targetCard.uid);
          if(idx===-1)return prev;
          const effectiveDef=Math.floor(next[idx].defense*0.5);
          const dmg=Math.max(1,casterCard.power-effectiveDef);
          const newHp=Math.max(0,next[idx].hp-dmg);
          next[idx]={...next[idx],hp:newHp};
          addDmg(`-${dmg}`,"#f1f5f9",idx,targetOwner==="enemy");
          addLog(`🗡️ ${casterCard.name} Pierce! ${dmg} dmg (ignores 50% DEF).`,"player");
          if(newHp<=0){addLog(`💀 ${next[idx].name} pierced down!`,"good");setActiveEffects(p=>{const n={...p};delete n[targetCard.uid];return n;});}
          return next;
        });
        SFX.play("specialHit");
        break;
      }

      // ── REGEN: restore HP to caster each turn for 3 turns ──────────────────
      // (REGEN as a self-effect — heals 10 HP/tick for 3 turns)
      case "regen":{
        applyEffect(casterCard.uid,"regen",3);
        addLog(`💚 ${casterCard.name} activates Regen! +10 HP/turn for 3 turns.`,"player");
        SFX.play("coin");
        break;
      }

      // ── SHIELD: next hit reduced 50% (after Defend) ────────────────────────
      case "shield":{
        setShieldedCards(prev=>{const next=new Set(prev);next.add(casterCard.uid);return next;});
        addLog(`🛡️ ${casterCard.name} activates Shield! Next hit reduced by 50%.`,"player");
        SFX.play("click");
        break;
      }

      // ── THORNS: deals 25% of caster defense to target ──────────────────────
      case "thorns":{
        if(!targetCard){addLog(`${casterCard.name} Thorns: no target.`,"err");break;}
        const dmg=Math.max(1,Math.floor(casterCard.defense*0.25));
        setTargetField(prev=>{
          const next=[...prev];
          const idx=next.findIndex(c=>c.uid===targetCard.uid);
          if(idx===-1)return prev;
          const newHp=Math.max(0,next[idx].hp-dmg);
          next[idx]={...next[idx],hp:newHp};
          addDmg(`-${dmg}`,"#86efac",idx,targetOwner==="enemy");
          addLog(`🌵 ${casterCard.name} Thorns! ${dmg} dmg (25% of DEF).`,"player");
          if(newHp<=0){addLog(`💀 ${targetCard.name} spiked!`,"good");setActiveEffects(p=>{const n={...p};delete n[targetCard.uid];return n;});}
          return next;
        });
        SFX.play("specialHit");
        break;
      }

      // ── BERSERKER: +50% power boost to caster this turn ────────────────────
      case "berserker":{
        setCasterField(prev=>{
          const next=[...prev];
          const idx=next.findIndex(c=>c.uid===casterCard.uid);
          if(idx===-1)return prev;
          next[idx]={...next[idx],berserkerActive:true};
          return next;
        });
        addLog(`😤 ${casterCard.name} Berserker! +50% power this turn.`,"player");
        SFX.play("specialHit");
        break;
      }

      // ── LAST STAND: deals current HP as damage (min 20) ────────────────────
      case "laststand":{
        if(!targetCard){addLog(`${casterCard.name} Last Stand: no target.`,"err");break;}
        const dmg=Math.max(20,casterCard.hp);
        setTargetField(prev=>{
          const next=[...prev];
          const idx=next.findIndex(c=>c.uid===targetCard.uid);
          if(idx===-1)return prev;
          const newHp=Math.max(0,next[idx].hp-dmg);
          next[idx]={...next[idx],hp:newHp};
          addDmg(`-${dmg}`,"#f59e0b",idx,targetOwner==="enemy");
          addLog(`⚡ ${casterCard.name} Last Stand! ${dmg} dmg.`,"player");
          if(newHp<=0){addLog(`💀 ${targetCard.name} couldn't withstand it!`,"good");setActiveEffects(p=>{const n={...p};delete n[targetCard.uid];return n;});}
          return next;
        });
        SFX.play("specialHit");
        break;
      }

      // ── RALLY CRY: heal all caster-side field cards 20 HP ──────────────────
      case "rallycry":{
        setCasterField(prev=>{
          const next=prev.map(c=>({...c,hp:Math.min(c.maxHp,c.hp+20)}));
          const totalHealed=next.reduce((sum,c,i)=>sum+Math.min(20,prev[i].maxHp-prev[i].hp),0);
          addLog(`📣 ${casterCard.name} Rally Cry! All allies +20 HP (${totalHealed} total).`,"player");
          return next;
        });
        SFX.play("achievement");
        break;
      }

      // ── INTIMIDATE: reduce target power by 25% (permanent this battle) ──────
      case "intimidate":{
        if(!targetCard){addLog(`${casterCard.name} Intimidate: no target.`,"err");break;}
        setIntimidatedCards(prev=>({...prev,[targetCard.uid]:0.75}));
        setTargetField(prev=>{
          const next=[...prev];
          const idx=next.findIndex(c=>c.uid===targetCard.uid);
          if(idx===-1)return prev;
          const reducedPower=Math.floor(next[idx].power*0.75);
          next[idx]={...next[idx],power:reducedPower};
          addLog(`👁️ ${casterCard.name} Intimidate! ${targetCard.name} power → ${reducedPower} (−25%).`,"player");
          return next;
        });
        SFX.play("sub");
        break;
      }

      default:
        addLog(`${casterCard.name}: ability not recognised.`,"err");
    }
  };

  // ── Tick active effects on a field — called at start of each side's turn ─────
  // fieldSetter: setPlayerField or setEnemyField
  // owner: "player" or "enemy" (for log labels and dmgPop direction)
  const tickEffects=(fieldSetter, owner)=>{
    fieldSetter(prev=>{
      const next=[...prev];
      const toRemove=[];
      next.forEach((card,idx)=>{
        const effects=activeEffects[card.uid];
        if(!effects||effects.length===0)return;
        effects.forEach(eff=>{
          if(eff.type==="burn"){
            const dmg=Math.floor(card.maxHp*0.15);
            const newHp=Math.max(0,next[idx].hp-dmg);
            next[idx]={...next[idx],hp:newHp};
            addDmg(`🔥-${dmg}`,"#f97316",idx,owner==="enemy");
            addLog(`🔥 ${card.name} burns for ${dmg} dmg (15% max HP).`,"err");
          } else if(eff.type==="poison"){
            const dmg=Math.floor(card.maxHp*0.10);
            const newHp=Math.max(0,next[idx].hp-dmg);
            next[idx]={...next[idx],hp:newHp};
            addDmg(`☠-${dmg}`,"#4ade80",idx,owner==="enemy");
            addLog(`☠️ ${card.name} takes ${dmg} poison dmg (10% max HP).`,"err");
          } else if(eff.type==="regen"){
            const heal=Math.min(10,next[idx].maxHp-next[idx].hp);
            next[idx]={...next[idx],hp:Math.min(next[idx].maxHp,next[idx].hp+10)};
            addDmg(`+${heal}`,"#4ade80",idx,owner==="enemy");
            addLog(`💚 ${card.name} regenerates ${heal} HP.`,"player");
          }
        });
      });
      return next;
    });
    // Decrement tick counts, remove expired effects, remove effects from dead cards
    setActiveEffects(prev=>{
      const next={...prev};
      Object.keys(next).forEach(uid=>{
        next[uid]=next[uid]
          .map(e=>({...e,ticksLeft:e.ticksLeft-1}))
          .filter(e=>e.ticksLeft>0);
        if(next[uid].length===0) delete next[uid];
      });
      return next;
    });
  };

  // Remove dead player cards
  useEffect(()=>{
    const dead=playerField.filter(c=>c.hp<=0);
    if(dead.length>0){
      dead.forEach(c=>addLog(`💀 ${c.name} was destroyed!`,"err"));
      setPlayerField(f=>f.filter(c=>c.hp>0));
    }
  },[playerField.map(c=>c.hp).join(",")]);

  // Check win/loss
  useEffect(()=>{
    if(phase!=="battle")return;
    const allEnemyDead=enemyHp<=0;
    const allPlayerDead=playerHp<=0||(playerField.length===0&&playerHand.length===0&&playerDeckLeft.length===0);
    if(allEnemyDead){
      if(node.card){
        const pool=ALL_CARDS.filter(c=>c.rarity===node.card);
        if(pool.length) setRewardCard(pool[Math.floor(Math.random()*pool.length)]);
      }
      setPhase("won");
      setCoinFlip(null);
      setLog([]);
      SFX.play("achievement");
    } else if(allPlayerDead){
      setPhase("lost");
      setCoinFlip(null);
      setLog([]);
      SFX.play("click");
    }
  },[enemyHp,playerHp,enemyField.length,enemyHand.length,playerField.length,playerHand.length,playerDeckLeft.length,phase]);

  // Enemy AI turn
  const doEnemyTurn=useCallback(()=>{
    setAnimating(true);
    addLog(`🤖 ${node.name}'s turn...`,"system");

    setTimeout(()=>{
      // Tick effects on enemy cards at start of enemy turn
      tickEffects(setEnemyField,"enemy");

      // Direct damage to enemy if their field is empty
      setEnemyField(ef=>{
        if(ef.length===0){
          setEnemyHand(eh=>{
            if(eh.length===0){
              // No cards anywhere — take direct damage from player field
              setPlayerField(pf=>{
                const dmg=pf.length;
                if(dmg>0){
                  setEnemyHp(hp=>{
                    const newHp=hp-dmg;
                    addLog(`💥 ${node.name} has no cards! You deal ${dmg} direct damage! (${Math.max(0,newHp)} HP left)`,"good");
                    return Math.max(0,newHp);
                  });
                  SFX.play("achievement");
                }
                return pf;
              });
            }
            return eh;
          });
          setAnimating(false);
          return ef;
        }
        setPlayerField(pf=>{
          if(pf.length===0){setAnimating(false);return pf;}
          let newPf=[...pf];
          let newEf=[...ef];

          // Each enemy card attacks a random player card — same deterministic formula as player
          newEf.forEach((ec)=>{
            if(newPf.length===0)return;
            const targetIdx=Math.floor(Math.random()*newPf.length);
            const target=newPf[targetIdx];
            // Type modifier: +20% or -20%, floor (same as player)
            const tAdv=TYPE_ADV[ec.type];
            let typeMod=1;
            if(tAdv){
              if(tAdv.strong===target.type)typeMod=1.2;
              else if(tAdv.weak===target.type)typeMod=0.8;
            }
            let dmg=Math.floor(ec.power*typeMod);
            // Defend: subtract DEF; excess reflects back to attacker
            let reflectBack=0;
            if(target.defending){
              if(target.defense>=dmg){reflectBack=target.defense-dmg;dmg=0;}
              else dmg=dmg-target.defense;
            }
            // Shield: 50% of remaining, floor
            if(shieldedCards.has(target.uid)&&dmg>0){
              dmg=Math.floor(dmg*0.50);
              setShieldedCards(prev=>{const n=new Set(prev);n.delete(target.uid);return n;});
            }
            addDmg(dmg>0?`-${dmg}`:"BLOCKED","#ef4444",targetIdx,false);
            if(dmg>0) addLog(`🤖 ${ec.name} attacks ${target.name} for ${dmg}`,"info");
            if(target.defending&&target.defense>0) addLog(`🛡 ${target.name} deflects! DEF ${target.defense}${reflectBack>0?` — reflects ${reflectBack}`:""}`,"info");
            newPf[targetIdx]={...newPf[targetIdx],hp:Math.max(0,newPf[targetIdx].hp-dmg),defending:false};
            // Apply reflect to attacking enemy card
            if(reflectBack>0){
              const eidx=newEf.findIndex(c=>c.uid===ec.uid);
              if(eidx>=0) newEf[eidx]={...newEf[eidx],hp:Math.max(0,newEf[eidx].hp-reflectBack)};
              addLog(`↩ ${ec.name} takes ${reflectBack} reflected damage!`,"good");
            }
          });

          // Remove dead player cards (clear their effects)
          newPf.filter(c=>c.hp<=0).forEach(c=>{
            addLog(`💀 ${c.name} fell!`,"err");
            setActiveEffects(prev=>{const n={...prev};delete n[c.uid];return n;});
          });
          newPf=newPf.filter(c=>c.hp>0);
          // Remove dead enemy cards (clear their effects)
          newEf.filter(c=>c.hp<=0).forEach(c=>{
            addLog(`💀 ${c.name} destroyed!`,"good");
            setActiveEffects(prev=>{const n={...prev};delete n[c.uid];return n;});
          });
          newEf=newEf.filter(c=>c.hp>0);

          setAnimating(false);
          return newPf;
        });
        return ef;
      });

      // Enemy plays cards from hand to field (stamina = turn, cap 8)
      setEnemyHand(eh=>{
        setEnemyField(ef=>{
          if(ef.length>=4||eh.length===0) return ef;
          const enemyStamina=Math.min(turn,8);
          let stamLeft=enemyStamina;
          const toPlay=[];
          const remaining=[...eh];
          for(let i=0;i<remaining.length&&toPlay.length<2&&ef.length+toPlay.length<4;i++){
            const c=remaining[i];
            const cost=MANA_COST[c.rarity]||1;
            if(cost<=stamLeft){
              toPlay.push({...c,defending:false,hp:c.hp,maxHp:c.hp});
              stamLeft-=cost;
            }
          }
          if(toPlay.length>0) addLog(`🤖 ${node.name} plays ${toPlay.map(c=>c.name).join(", ")} to field`,"info");
          return [...ef,...toPlay];
        });
        // Trim hand: remove cards that were played
        const enemyStamina2=Math.min(turn,8);
        let stamLeft2=enemyStamina2;
        let played=0;
        for(let i=0;i<eh.length&&played<2;i++){
          const cost=MANA_COST[eh[i].rarity]||1;
          if(cost<=stamLeft2){stamLeft2-=cost;played++;}
        }
        return eh.slice(played);
      });

      // Start next player turn
      setTimeout(()=>{
        setTurn(t=>{
          const nt=t+1;
          const newStam=Math.min(nt,8);
          setBattleStamina(newStam);
          addLog(`── Turn ${nt} — ⚡ ${newStam} stamina ──`,"system");
          return nt;
        });
        // Draw 1 card outside setTurn — skip if hand at max 6 or deck empty
        setPlayerDeckLeft(dl=>{
          if(dl.length===0) return dl;
          const drawn=dl[0];
          const rest=dl.slice(1);
          setPlayerHand(h=>{
            if(h.length>=6) return h; // max hand = 6, skip draw
            addLog(`📥 Drew ${drawn.name}`,"info");
            return [...h,drawn];
          });
          return rest;
        });
        setActedCards(new Set());
        setPlayedThisTurn(new Set()); // reset played-this-turn for new player turn
        setPlayerTurn(true);
        setAnimating(false);
        // Clear defending status — defend expires after enemy turn
        setPlayerField(f=>f.map(c=>({...c,defending:false})));
        // Tick effects on player cards at start of player turn
        tickEffects(setPlayerField,"player");
      },800);
    },1200);
  },[enemyField,playerField,node,activeEffects,shieldedCards]);

  // Replace a card in a field slot with one from hand
  // Discards existing card immediately, removes all its effects, clears Defend.
  const replaceCard=(slotIdx, handCard)=>{
    if(!playerTurn||animating)return;
    const cost=MANA_COST[handCard.rarity]||1;
    if(battleStamina<cost){addLog(`Not enough stamina! ${handCard.name} costs ${cost}.`,"err");setReplacingSlot(null);return;}
    const existing=playerField[slotIdx];
    // Max 2 same card on field: count copies in OTHER slots (excluding slot being replaced)
    const copiesElsewhere=playerField.filter((c,idx)=>idx!==slotIdx&&c.id===handCard.id).length;
    if(copiesElsewhere>=2){addLog(`Max 2 copies of ${handCard.name} on field at once.`,"err");setReplacingSlot(null);return;}
    // Remove all effects from discarded card
    if(existing) setActiveEffects(prev=>{const n={...prev};delete n[existing.uid];return n;});
    // Remove from shielded set
    if(existing) setShieldedCards(prev=>{const n=new Set(prev);n.delete(existing.uid);return n;});
    setBattleStamina(s=>s-cost);
    setPlayerHand(h=>h.filter(c=>c.uid!==handCard.uid));
    setPlayerField(prev=>{
      const next=[...prev];
      next[slotIdx]={...handCard,hp:handCard.hp,maxHp:handCard.hp,defending:false,uid:handCard.uid};
      return next;
    });
    // New card cannot act the turn it was played
    setPlayedThisTurn(prev=>{const n=new Set(prev);n.add(handCard.uid);return n;});
    setReplacingSlot(null);
    addLog(`♻ ${existing?existing.name+" replaced by ":""}${handCard.name} (cost: ${cost})`,"player");
    SFX.play("cardFlip");
  };

  const endTurn=()=>{
    if(!playerTurn||animating)return;
    // Direct damage if player has no cards on field
    if(playerField.length===0&&enemyField.length>0){
      const dmg=enemyField.length;
      setPlayerHp(hp=>{
        const newHp=hp-dmg;
        addLog(`💥 No cards on field! Enemy deals ${dmg} direct damage to you! (${Math.max(0,newHp)} HP left)`,"err");
        if(newHp<=0){
          setTimeout(()=>setPhase("lost"),400);
        }
        return Math.max(0,newHp);
      });
      SFX.play("hit");
    }
    // Shield expires at end of opponent's turn — clear enemy shields when player ends turn
    setShieldedCards(prev=>{
      const next=new Set(prev);
      enemyField.forEach(c=>next.delete(c.uid));
      return next;
    });
    setReplacingSlot(null);
    setPlayerTurn(false);
    setPhase2("free");
    setSelectedField(null);
    setPendingSpecial(false);
    doEnemyTurn();
  };

  // ── DECK PICK PHASE ──
  if(phase==="deckpick"){
    // All unique cards player has
    const allUnique=[...new Map(collection.map(c=>{const base=ALL_CARDS.find(x=>x.id===c.id)||{};return [c.id+(c.foil?"f":""),{...base,...c}];})).values()];

    // Gate: require a saved deck before entering battle
    if(savedDecks.length===0){
      return(
        <Modal onClose={onClose} title={`⚔️ ${node.name} — ${node.title}`}>
          <div style={{maxWidth:480,margin:"0 auto",textAlign:"center",padding:"40px 20px"}}>
            <div style={{fontSize:52,marginBottom:16}}>📋</div>
            <div style={{color:"white",fontWeight:800,fontSize:18,marginBottom:10}}>No Saved Deck</div>
            <div style={{color:"#94a3b8",fontSize:14,lineHeight:1.6,marginBottom:24}}>You need a saved deck to enter battle.<br/>Head to the <span style={{color:"#a855f7",fontWeight:700}}>Deck Builder</span> to build and save one first.</div>
            <button onClick={onClose} style={{background:"linear-gradient(135deg,var(--t1),var(--t2))",color:"white",border:"none",borderRadius:12,padding:"13px 32px",fontWeight:800,fontSize:15,cursor:"pointer"}}>← Go Build a Deck</button>
          </div>
        </Modal>
      );
    }

    return(
      <Modal onClose={onClose} title={`⚔️ ${node.name} — ${node.title}`}>
        <div style={{maxWidth:480,margin:"0 auto"}}>
          <div style={{background:"linear-gradient(135deg,#1e0a3c,#0f172a)",border:"1px solid #4c1d9544",borderRadius:14,padding:16,marginBottom:16,textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:6}}>⚔️</div>
            <div style={{color:"#a855f7",fontWeight:800,fontSize:16,marginBottom:4}}>{node.name}</div>
            <div style={{color:"#64748b",fontSize:12,marginBottom:8}}>{node.title}</div>
            <div style={{color:"#94a3b8",fontSize:13,fontStyle:"italic"}}>"{node.dialogue}"</div>
          </div>
          <div style={{background:"#0f172a",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
            <div style={{color:"#475569",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:6}}>REWARDS</div>
            <div style={{display:"flex",gap:8}}>
              <div style={{background:"#1e293b",borderRadius:8,padding:"6px 12px",color:"#f59e0b",fontWeight:700,fontSize:12}}>💎 {node.gems}</div>
              {node.card&&<div style={{background:"#1e293b",borderRadius:8,padding:"6px 12px",color:RC[node.card]?.color||"#94a3b8",fontWeight:700,fontSize:12}}>{node.boss?"👑":"🃏"} {node.card} card</div>}
              {node.boss&&<div style={{background:"#78350f",borderRadius:8,padding:"6px 12px",color:"#f59e0b",fontWeight:700,fontSize:12}}>⭐ BOSS</div>}
            </div>
          </div>
          <div style={{color:"#f59e0b",fontSize:12,marginBottom:6,fontWeight:600}}>⚡ Costs {staminaCost} stamina · You have {stamina} remaining</div>
          <div style={{color:"white",fontWeight:700,fontSize:14,marginBottom:10}}>Build your deck (4–12 cards):</div>
          <div style={{color:"#475569",fontSize:11,marginBottom:12}}>
            Costs: Common/Uncommon=1 · Rare=2 · Epic=3 · Legendary=4 · Max 2 copies per card
          </div>
          {/* Type advantages quick ref */}
          <div style={{background:"#0f172a",borderRadius:8,padding:"8px 12px",marginBottom:14}}>
            <div style={{color:"#475569",fontSize:9,fontWeight:700,letterSpacing:1,marginBottom:6}}>TYPE ADVANTAGES</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {Object.entries(TYPE_ADV).map(([t,v])=>(
                <div key={t} style={{fontSize:9,color:"#64748b"}}>
                  <span style={{color:"#22c55e",fontWeight:700}}>{t}</span> → <span style={{color:"#f59e0b"}}>{v.strong}</span>
                </div>
              ))}
            </div>
          </div>
          {/* Saved decks shortcut */}
          {savedDecks.length>0&&<>
            <div style={{color:"#64748b",fontSize:12,marginBottom:8}}>Quick select a saved deck:</div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
              {savedDecks.map((d,i)=>{
                const cards=d.cards.slice(0,12).map(dc=>collection.find(c=>c.id===dc.id)||dc).filter(Boolean);
                const padded=[...cards,...Array(Math.max(0,12-cards.length)).fill(null)].map((c,j)=>c||allUnique[j%allUnique.length]||allUnique[0]).slice(0,12);
                return <button key={i} onClick={()=>{if(stamina<staminaCost){alert("Not enough stamina!");return;}onSpendStamina(staminaCost);startBattle(padded, playerLevel);}}
                  style={{background:"linear-gradient(135deg,#1e0a3c,#0f172a)",border:"1px solid #4c1d9544",borderRadius:10,padding:"10px 14px",color:"white",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700}}>{d.name} <span style={{color:"#475569",fontSize:11}}>({d.cards.length} cards)</span></span>
                  <span style={{color:"#a855f7",fontSize:12}}>Use →</span>
                </button>;
              })}
            </div>
          </>}
          {/* Manual card picker */}
          <div style={{color:"#64748b",fontSize:12,marginBottom:8}}>Or pick cards manually ({customDeck.length}/12):</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
            {allUnique.map((card,i)=>{
              const copyCount=customDeck.filter(c=>c.id===card.id&&!!c.foil===!!card.foil).length;
              const foilCount=customDeck.filter(c=>c.foil).length;
              const inDeck=copyCount>0;
              const atCopyMax=copyCount>=2;
              const atFoilMax=card.foil&&foilCount>=3;
              const atDeckMax=customDeck.length>=12;
              const canAdd=!atCopyMax&&!atFoilMax&&!atDeckMax;
              return <div key={i} style={{position:"relative",cursor:inDeck||canAdd?"pointer":"not-allowed",opacity:!inDeck&&!canAdd?0.35:1}} onClick={()=>{
                if(inDeck){setCustomDeck(d=>{const idx=d.findIndex(c=>c.id===card.id&&!!c.foil===!!card.foil);return d.filter((_,j)=>j!==idx);});}
                else if(canAdd){setCustomDeck(d=>[...d,{...card,uid:Math.random()}]);}
              }}>
                <Card card={card} mini selected={inDeck}/>
                {copyCount>0&&<div style={{position:"absolute",top:2,right:2,background:"#a855f7",color:"white",borderRadius:999,width:16,height:16,fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>×{copyCount}</div>}
              </div>;
            })}
          </div>
          <button onClick={()=>{
            if(customDeck.length<4){alert("Pick at least 4 cards!");return;}
            const deck=customDeck.length<12?[...customDeck,...customDeck].slice(0,12):customDeck;
            if(stamina<staminaCost){alert("Not enough stamina!");return;}
            onSpendStamina(staminaCost);
            startBattle(deck, playerLevel);
          }} disabled={customDeck.length<4}
            style={{width:"100%",background:customDeck.length>=4?"linear-gradient(135deg,var(--t1),var(--t2))":"#1e293b",color:customDeck.length>=4?"white":"#475569",border:"none",borderRadius:12,padding:"14px",fontWeight:800,fontSize:15,cursor:customDeck.length>=4?"pointer":"not-allowed"}}>
            ⚔️ Battle! ({customDeck.length}/12 cards)
          </button>
        </div>
      </Modal>
    );
  }

  // ── BATTLE PHASE ──
  if(phase==="battle"){
    const canEndTurn=playerTurn&&!animating;
    // Nebula color shifts by node difficulty
    const nebulaColor=node.boss?"#7f1d1d":node.diff>=0.8?"#1e0a3c":node.diff>=0.5?"#0f1a3c":"#050f2c";
    const nebulaAccent=node.boss?"#ef444422":node.diff>=0.8?"#a855f722":"#3b82f618";
    const isShaking=animating&&dmgPops.some(p=>!p.isEnemy);
    return(
      <Modal onClose={onClose} title={`⚔️ vs ${node.name} — Turn ${turn}`}>
        <div style={{maxWidth:520,margin:"0 auto"}}>

          {/* ── ARENA WRAPPER with nebula bg ── */}
          <div style={{
            background:`radial-gradient(ellipse at 50% 0%, ${nebulaAccent} 0%, transparent 60%), radial-gradient(ellipse at 50% 100%, ${nebulaAccent} 0%, transparent 60%), linear-gradient(180deg,${nebulaColor},#020617)`,
            borderRadius:16,
            border:`1px solid ${node.boss?"#ef444433":"#4c1d9522"}`,
            overflow:"hidden",
            animation:isShaking?"screenShake 0.4s ease-out":"none",
            position:"relative",
            marginBottom:10
          }}>
            {/* Subtle star dots */}
            <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(1px 1px at 20% 30%, #ffffff18 0%, transparent 100%), radial-gradient(1px 1px at 80% 15%, #ffffff12 0%, transparent 100%), radial-gradient(1px 1px at 55% 60%, #ffffff10 0%, transparent 100%), radial-gradient(1px 1px at 10% 70%, #ffffff14 0%, transparent 100%), radial-gradient(1px 1px at 90% 80%, #ffffff10 0%, transparent 100%)",pointerEvents:"none"}}/>

            {/* ── ENEMY INFO BAR ── */}
            <div style={{background:"linear-gradient(90deg,#1a000088,#2d000088)",borderBottom:"1px solid #ef444422",padding:"8px 14px",display:"flex",alignItems:"center",gap:10,backdropFilter:"blur(4px)"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                  <span style={{color:"#ef4444",fontWeight:900,fontSize:12,letterSpacing:1}}>{node.boss?"👑":"⚔️"} {node.name.toUpperCase()}</span>
                  {node.boss&&<span style={{background:"#7f1d1d",color:"#fca5a5",fontSize:8,fontWeight:800,borderRadius:4,padding:"1px 5px",letterSpacing:1}}>BOSS</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:"#ef4444",fontSize:10,fontWeight:700}}>❤️ {enemyHp}/{enemyMaxHp}</span>
                  <div style={{flex:1,background:"#1e293b",borderRadius:999,height:5,maxWidth:120}}>
                    <div style={{width:`${enemyMaxHp>0?Math.max(0,enemyHp/enemyMaxHp*100):0}%`,height:"100%",background:enemyHp/enemyMaxHp>0.5?"linear-gradient(90deg,#dc2626,#ef4444)":enemyHp/enemyMaxHp>0.25?"linear-gradient(90deg,#ea580c,#f97316)":"linear-gradient(90deg,#7f1d1d,#dc2626)",borderRadius:999,transition:"width .4s"}}/>
                  </div>
                </div>
              </div>
              {/* Enemy reserve deck visual */}
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                {[...Array(Math.min(5,enemyHand.length))].map((_,i)=>(
                  <div key={i} style={{width:14,height:20,borderRadius:3,background:"linear-gradient(135deg,#1e293b,#334155)",border:"1px solid #475569",boxShadow:"1px 1px 0 #0f172a",marginLeft:i>0?-8:0,transform:`rotate(${(i-2)*3}deg)`}}/>
                ))}
                {enemyHand.length>0&&<span style={{color:"#475569",fontSize:9,marginLeft:6}}>{enemyHand.length}</span>}
              </div>
            </div>

            {/* ── ENEMY FIELD ── */}
            <div style={{padding:"10px 14px 6px",minHeight:100}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:3}}>
                {[0,1,2,3].map(i=>{
                  const card=enemyField[i];
                  return(
                    <div key={i} style={{position:"relative",minHeight:70,borderRadius:12,border:card?(phase2==="targeting"?"2px solid #ef4444":"1px solid #ef444433"):"1px dashed #ef444420",background:card?"transparent":"#1a00000a",display:"flex",alignItems:"center",justifyContent:"center",cursor:card&&phase2==="targeting"?"pointer":"default",transition:"border-color .2s"}}
                      onClick={()=>{if(card&&phase2==="targeting"&&selectedField!==null)doAttack(selectedField,i,pendingSpecial);}}>
                      {card?(
                        <div style={{position:"relative",width:"100%",display:"flex",flexDirection:"column",alignItems:"center"}}>
                          <div style={{position:"relative",animation:hitCard===i?"hitFlash 0.4s ease-out":"none",transform:"scale(0.72)",transformOrigin:"top center"}}>
                            <Card card={card} mini showHp currentHp={card.hp}/>
                            <div style={{position:"absolute",inset:0,borderRadius:12,background:"rgba(220,38,38,0.18)",pointerEvents:"none"}}/>
                            {card.defending&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,animation:"shieldAppear .3s ease-out",filter:"drop-shadow(0 0 8px #3b82f6)"}}>🛡</div>}
                            {phase2==="targeting"&&<div style={{position:"absolute",inset:0,border:"2px solid #ef4444",borderRadius:12,animation:"pulse 0.8s infinite",boxShadow:"0 0 12px #ef444466"}}/>}
                          </div>
                          {dmgPops.filter(p=>p.isEnemy&&p.fieldIdx===i).map(p=>(
                            <div key={p.id} style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)",color:p.color,fontWeight:900,fontSize:15,animation:"dmgPop .8s ease-out forwards",pointerEvents:"none",whiteSpace:"nowrap",zIndex:20,textShadow:"0 0 8px currentColor"}}>{p.text}</div>
                          ))}
                        </div>
                      ):(
                        <div style={{color:"#ef444420",fontSize:18}}>☠</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ── ARENA DIVIDER ── */}
            <div style={{margin:"4px 14px",display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,#334155,transparent)"}}/>
              <div style={{display:"flex",align:"center",gap:10,background:"#0f172acc",borderRadius:20,padding:"4px 12px",border:"1px solid #1e293b",backdropFilter:"blur(4px)"}}>
                <span style={{color:"#f59e0b",fontSize:10,fontWeight:800}}>TURN {turn}</span>
                <span style={{color:"#334155",fontSize:10}}>·</span>
                <span style={{color:playerTurn?"#22c55e":"#ef4444",fontSize:10,fontWeight:700}}>{playerTurn?"YOUR TURN":"ENEMY TURN"}</span>
                {coinFlip&&turn<=2&&phase==="battle"&&<><span style={{color:"#334155",fontSize:10}}>·</span><span style={{color:coinFlip==="heads"?"#22c55e":"#ef4444",fontSize:10}}>🪙 {coinFlip==="heads"?"HEADS":"TAILS"}</span></>}
              </div>
              <div style={{flex:1,height:1,background:"linear-gradient(90deg,transparent,#334155,transparent)"}}/>
            </div>

            {/* ── PLAYER FIELD ── */}
            <div style={{padding:"6px 8px 10px"}}>
              {replacingSlot!==null&&<div style={{color:"#f59e0b",fontSize:9,fontWeight:700,letterSpacing:1,textAlign:"center",marginBottom:4}}>SELECT A CARD FROM HAND TO REPLACE SLOT {replacingSlot+1} · <span onClick={()=>setReplacingSlot(null)} style={{cursor:"pointer",color:"#ef4444"}}>✕ CANCEL</span></div>}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:3}}>
                {[0,1,2,3].map(i=>{
                  const card=playerField[i];
                  const acted=card&&actedCards.has(card.uid);
                  const justPlayed=card&&playedThisTurn.has(card.uid);
                  const su=card&&specialUsed.has(card.uid);
                  const isLunging=attackingCard===i;
                  const isFirstTurnBlock=turn===1;
                  const actionBlocked=acted||justPlayed||isFirstTurnBlock;
                  const isReplaceTarget=replacingSlot===i;
                  return(
                    <div key={i} style={{position:"relative",minHeight:70,borderRadius:12,
                      border:card?(isReplaceTarget?"2px solid #f59e0b":selectedField===i?"2px solid #a855f7":"1px solid #a855f733"):"1px dashed #a855f720",
                      background:card?"transparent":"#0a001a0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",transition:"border-color .2s",
                      cursor:card&&playerTurn&&!animating&&replacingSlot===null?"pointer":"default"}}
                      onClick={()=>{
                        if(!card||!playerTurn||animating)return;
                        if(replacingSlot===i){setReplacingSlot(null);return;}
                        if(replacingSlot!==null){setReplacingSlot(i);return;}
                        if(phase2==="free"&&!isFirstTurnBlock) setReplacingSlot(i);
                      }}>
                      {card?(
                        <>
                          <div style={{position:"relative",animation:isLunging?"attackLunge 0.45s ease-in-out":(selectedField===i&&phase2==="targeting"?"cardBreathe 1s ease-in-out infinite":"none"),transform:"scale(0.72)",transformOrigin:"top center"}}>
                            <Card card={card} mini showHp currentHp={card.hp}/>
                            {card.defending&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,animation:"shieldAppear .3s ease-out",filter:"drop-shadow(0 0 8px #3b82f6)"}}>🛡</div>}
                            {shieldedCards.has(card.uid)&&<div style={{position:"absolute",top:2,right:2,fontSize:10,filter:"drop-shadow(0 0 4px #3b82f6)"}}>🔵</div>}
                            {selectedField===i&&<div style={{position:"absolute",inset:0,border:"2px solid #a855f7",borderRadius:12,boxShadow:"0 0 14px #a855f766"}}/>}
                            {isReplaceTarget&&<div style={{position:"absolute",inset:0,border:"2px solid #f59e0b",borderRadius:12,boxShadow:"0 0 12px #f59e0b66",animation:"pulse 0.8s infinite"}}/>}
                            {actionBlocked&&!isReplaceTarget&&<div style={{position:"absolute",inset:0,background:"#00000055",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center"}}>
                              <span style={{color:"#475569",fontSize:9,fontWeight:800,textAlign:"center",padding:"0 2px"}}>
                                {isFirstTurnBlock?"TURN 1":justPlayed?"JUST PLAYED":"ACTED"}
                              </span>
                            </div>}
                          </div>
                          {dmgPops.filter(p=>!p.isEnemy&&p.fieldIdx===i).map(p=>(
                            <div key={p.id} style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)",color:p.color,fontWeight:900,fontSize:15,animation:"dmgPop .8s ease-out forwards",pointerEvents:"none",whiteSpace:"nowrap",zIndex:20,textShadow:"0 0 8px currentColor"}}>{p.text}</div>
                          ))}
                          {playerTurn&&!animating&&!actionBlocked&&replacingSlot===null&&(
                            <div style={{display:"flex",gap:3,marginTop:4,justifyContent:"center",width:"100%",paddingBottom:2}}>
                              <button onClick={(e)=>{e.stopPropagation();selectAttacker(i);}} style={{flex:1,background:"#7f1d1d",color:"white",border:"none",borderRadius:5,padding:"3px 0",fontSize:8,fontWeight:800,cursor:"pointer",letterSpacing:0.5}}>⚔️</button>
                              <button onClick={(e)=>{e.stopPropagation();if(!su)selectAttacker(i,true);}} style={{flex:1,background:su?"#1e293b":"#4c1d95",color:su?"#334155":"white",border:"none",borderRadius:5,padding:"3px 0",fontSize:8,fontWeight:800,cursor:su?"not-allowed":"pointer"}}>✨</button>
                              <button onClick={(e)=>{e.stopPropagation();if(!card.defending)doDefend(i);}} disabled={card.defending} style={{flex:1,background:card.defending?"#0f172a":"#1e3a5f",color:card.defending?"#334155":"white",border:card.defending?"1px solid #1e293b":"none",borderRadius:5,padding:"3px 0",fontSize:8,fontWeight:800,cursor:card.defending?"not-allowed":"pointer",opacity:card.defending?0.4:1}}>🛡</button>
                            </div>
                          )}
                        </>
                      ):(
                        <div style={{color:"#a855f720",fontSize:18}}>⬡</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ── PLAYER INFO BAR ── */}
            <div style={{background:"linear-gradient(90deg,#0a001a88,#0f172a88)",borderTop:"1px solid #a855f722",padding:"8px 14px",display:"flex",alignItems:"center",gap:10,backdropFilter:"blur(4px)"}}>
              <div style={{flex:1}}>
                <div style={{color:"#a855f7",fontWeight:800,fontSize:11,marginBottom:3,letterSpacing:1}}>YOU</div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:"#ef4444",fontSize:10,fontWeight:700}}>❤️ {playerHp}/{playerMaxHp}</span>
                  <div style={{flex:1,background:"#1e293b",borderRadius:999,height:5,maxWidth:80}}>
                    <div style={{width:`${playerMaxHp>0?Math.max(0,playerHp/playerMaxHp*100):0}%`,height:"100%",background:playerHp/playerMaxHp>0.5?"linear-gradient(90deg,#dc2626,#ef4444)":playerHp/playerMaxHp>0.25?"linear-gradient(90deg,#ea580c,#f97316)":"linear-gradient(90deg,#7f1d1d,#dc2626)",borderRadius:999,transition:"width .4s"}}/>
                  </div>
                  <span style={{color:"#a855f7",fontSize:10,fontWeight:700,marginLeft:4}}>⚡ {battleStamina}/{Math.min(turn,8)}</span>
                  <div style={{background:"#1e293b",borderRadius:999,height:5,width:50}}>
                    <div style={{width:`${Math.min(turn,8)>0?battleStamina/Math.min(turn,8)*100:0}%`,height:"100%",background:"linear-gradient(90deg,#7c3aed,#a855f7)",borderRadius:999,transition:"width .3s"}}/>
                  </div>
                </div>
              </div>
              {/* Player deck pile visual */}
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                {[...Array(Math.min(5,playerDeckLeft.length))].map((_,i)=>(
                  <div key={i} style={{width:14,height:20,borderRadius:3,background:"linear-gradient(135deg,#1e0a3c,#2d1060)",border:"1px solid #4c1d95",boxShadow:"1px 1px 0 #0f172a",marginLeft:i>0?-8:0,transform:`rotate(${(i-2)*-3}deg)`}}/>
                ))}
                {playerDeckLeft.length>0&&<span style={{color:"#475569",fontSize:9,marginLeft:6}}>{playerDeckLeft.length}</span>}
              </div>
            </div>
          </div>

          {/* ── END TURN + CANCEL ── */}
          <div style={{display:"flex",gap:8,marginBottom:10,position:"sticky",bottom:0,zIndex:50,background:"linear-gradient(0deg,#020617 80%,transparent)",paddingTop:8,paddingBottom:4}}>
            <button onClick={endTurn} disabled={!canEndTurn}
              style={{flex:1,background:canEndTurn?"linear-gradient(135deg,#1d4ed8,#3b82f6)":"#1e293b",color:canEndTurn?"white":"#475569",border:"none",borderRadius:10,padding:"11px",fontWeight:800,fontSize:13,cursor:canEndTurn?"pointer":"not-allowed",boxShadow:canEndTurn?"0 0 16px #3b82f644":"none",transition:"all .2s"}}>
              {canEndTurn?"End Turn ▶":"Waiting..."}
            </button>
            {phase2==="targeting"&&<button onClick={()=>{setPhase2("free");setSelectedField(null);setPendingSpecial(false);}}
              style={{background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:10,padding:"11px 16px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
              ✕ Cancel
            </button>}
          </div>

          {/* ── HAND ── */}
          <div style={{marginBottom:10}}>
            <div style={{color:"#64748b",fontSize:9,fontWeight:700,letterSpacing:2,marginBottom:6}}>
              YOUR HAND ({playerHand.length}/6){replacingSlot!==null&&<span style={{color:"#f59e0b",marginLeft:6}}>— tap a card to replace slot {replacingSlot+1}</span>}
            </div>
            {playerHand.length===0
              ?<div style={{color:"#334155",fontSize:11,textAlign:"center",padding:"14px",background:"#0f172a",borderRadius:10,border:"1px dashed #1e293b"}}>No cards in hand</div>
              :<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {playerHand.map((card,i)=>{
                  const cost=MANA_COST[card.rarity]||1;
                  const canReplace=replacingSlot!==null&&battleStamina>=cost&&playerTurn&&!animating;
                  const canPlay=replacingSlot===null&&battleStamina>=cost&&playerField.length<4&&playerTurn&&!animating;
                  const isActive=canPlay||canReplace;
                  return(
                    <div key={card.uid} style={{position:"relative",opacity:isActive?1:0.45,cursor:isActive?"pointer":"not-allowed",transform:isActive?"translateY(0)":"translateY(2px)",transition:"all .15s",animation:"drawCard .3s ease-out",
                      outline:canReplace?"2px solid #f59e0b":"none",borderRadius:12}}
                      onClick={()=>{
                        if(canReplace){replaceCard(replacingSlot,card);return;}
                        if(canPlay) playCard(card);
                      }}>
                      <Card card={card} mini/>
                      <div style={{position:"absolute",top:2,left:2,background:isActive?(canReplace?"#f59e0b":"#a855f7"):"#475569",color:canReplace?"#000":"white",borderRadius:999,width:16,height:16,fontSize:9,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:isActive?"0 0 6px #a855f788":"none"}}>{cost}</div>
                      {canPlay&&<div style={{position:"absolute",inset:0,borderRadius:12,boxShadow:"0 0 10px #a855f733",pointerEvents:"none"}}/>}
                      {canReplace&&<div style={{position:"absolute",inset:0,borderRadius:12,boxShadow:"0 0 10px #f59e0b55",pointerEvents:"none"}}/>}
                    </div>
                  );
                })}
              </div>
            }
          </div>

          {/* ── BATTLE LOG (collapsible feel, side panel style) ── */}
          <div style={{background:"#0a0f1a",borderRadius:10,padding:"8px 12px",maxHeight:100,overflowY:"auto",border:"1px solid #1e293b"}}>
            <div style={{color:"#334155",fontSize:8,fontWeight:700,letterSpacing:3,marginBottom:4}}>BATTLE LOG</div>
            {log.map((l,i)=>(
              <div key={l.id||i} style={{fontSize:10,marginBottom:2,color:l.type==="err"?"#ef4444":l.type==="good"?"#22c55e":l.type==="player"?"#a855f7":l.type==="system"?"#f59e0b":"#475569",opacity:Math.max(0.3,1-i*0.06)}}>{l.text}</div>
            ))}
          </div>
        </div>
      </Modal>
    );
  }

  // ── WON PHASE ──
  if(phase==="won"){
    return(
      <Modal onClose={()=>{onWin(node.gems,rewardCard);onClose();}} title="🏆 Victory!">
        <div style={{maxWidth:400,margin:"0 auto",textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:12}}>🏆</div>
          <div style={{color:"#22c55e",fontWeight:800,fontSize:20,marginBottom:4}}>Victory!</div>
          <div style={{color:"#94a3b8",fontSize:14,marginBottom:20}}>{node.name} has been defeated!</div>
          <div style={{background:"#052e16",border:"1px solid #14532d",borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{color:"#22c55e",fontWeight:700,marginBottom:8}}>Rewards:</div>
            <div style={{color:"#f59e0b",fontWeight:900,fontSize:22,marginBottom:4}}>+💎 {node.gems}</div>
            {rewardCard&&<div style={{marginTop:8}}>
              <div style={{color:"#94a3b8",fontSize:12,marginBottom:8}}>🃏 Card reward:</div>
              <div style={{display:"flex",justifyContent:"center"}}><Card card={rewardCard} mini/></div>
            </div>}
          </div>
          <button onClick={()=>{onWin(node.gems,rewardCard);onClose();}}
            style={{background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white",border:"none",borderRadius:12,padding:"14px 32px",fontWeight:800,fontSize:16,cursor:"pointer",width:"100%"}}>
            Claim Rewards! ✨
          </button>
        </div>
      </Modal>
    );
  }

  // ── LOST PHASE ──
  return(
    <Modal onClose={()=>{onLose();onClose();}} title="💀 Defeated">
      <div style={{maxWidth:400,margin:"0 auto",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>💀</div>
        <div style={{color:"#ef4444",fontWeight:800,fontSize:20,marginBottom:4}}>Defeated!</div>
        <div style={{color:"#94a3b8",fontSize:14,marginBottom:20}}>{node.name} was too strong this time.</div>
        <div style={{background:"#1a0000",border:"1px solid #7f1d1d",borderRadius:12,padding:14,marginBottom:16,color:"#64748b",fontSize:13}}>
          +40 XP for trying · Stamina not refunded · Try a different deck!
        </div>
        <button onClick={()=>{onLose();onClose();}}
          style={{background:"linear-gradient(135deg,#7f1d1d,#ef4444)",color:"white",border:"none",borderRadius:12,padding:"14px 32px",fontWeight:800,fontSize:16,cursor:"pointer",width:"100%"}}>
          Try Again Later
        </button>
      </div>
    </Modal>
  );
}

function DupesModal({collection,onClose,onSellOne,onSellAll}){
  const [confirm,setConfirm]=useState(false);
  const gv={Legendary:500,Epic:150,Rare:50,Uncommon:15,Common:5};
  const counts={};collection.forEach(c=>{counts[c.id]=(counts[c.id]||0)+1;});
  const dupes=[];
  Object.entries(counts).forEach(([id,cnt])=>{
    if(cnt>1){
      const card=collection.find(c=>c.id===parseInt(id));
      if(card) dupes.push({card,count:cnt,extras:cnt-1,value:(cnt-1)*(gv[card.rarity]||5)});
    }
  });
  dupes.sort((a,b)=>{const o={Legendary:0,Epic:1,Rare:2,Uncommon:3,Common:4};return (o[a.card.rarity]??5)-(o[b.card.rarity]??5);});
  const totalValue=dupes.reduce((s,d)=>s+d.value,0);

  return(
    <Modal onClose={onClose} title="🎴 Duplicate Cards">
      <div style={{maxWidth:480,margin:"0 auto"}}>
        {dupes.length===0
          ?<div style={{textAlign:"center",padding:40,color:"#475569"}}>
            <div style={{fontSize:40,marginBottom:12}}>✨</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>No duplicates!</div>
            <div style={{fontSize:12}}>Open more packs to build your collection.</div>
          </div>
          :<>
            {/* Summary bar */}
            <div style={{background:"linear-gradient(135deg,#0f172a,#1e0a3c)",border:"1px solid #4c1d9544",borderRadius:12,padding:14,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{color:"#a855f7",fontWeight:800,fontSize:15}}>{dupes.reduce((s,d)=>s+d.extras,0)} duplicate cards</div>
                <div style={{color:"#64748b",fontSize:11,marginTop:2}}>across {dupes.length} card types</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:"#f59e0b",fontWeight:800,fontSize:15}}>💎 {totalValue}</div>
                <div style={{color:"#64748b",fontSize:11,marginTop:2}}>total value</div>
              </div>
            </div>

            {/* Sell All button or confirm */}
            {!confirm
              ?<button onClick={()=>{SFX.play("click");setConfirm(true);}} style={{width:"100%",background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",color:"white",border:"none",borderRadius:10,padding:"13px",fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:14}}>
                ♻️ Sell All Duplicates → +💎 {totalValue}
              </button>
              :<div style={{background:"linear-gradient(135deg,#1a0000,#2d0a0a)",border:"1px solid #7f1d1d",borderRadius:10,padding:14,marginBottom:14}}>
                <div style={{color:"#ef4444",fontWeight:800,fontSize:13,marginBottom:10,textAlign:"center"}}>⚠️ Sell ALL {dupes.reduce((s,d)=>s+d.extras,0)} duplicates for 💎 {totalValue}?</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setConfirm(false)} style={{flex:1,background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,padding:"10px",fontWeight:700,cursor:"pointer"}}>Cancel</button>
                  <button onClick={()=>{onSellAll();onClose();}} style={{flex:1,background:"linear-gradient(135deg,#991b1b,#dc2626)",color:"white",border:"none",borderRadius:8,padding:"10px",fontWeight:800,cursor:"pointer"}}>Yes, Sell All</button>
                </div>
              </div>
            }

            {/* Individual dupes list */}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {dupes.map((d,i)=>{
                const rc=RC[d.card.rarity]||{color:"#94a3b8"};
                return(
                  <div key={i} style={{background:"#1e293b",border:`1px solid ${rc.color}33`,borderRadius:10,padding:12,display:"flex",alignItems:"center",gap:12}}>
                    <div style={{flexShrink:0}}><Card card={d.card} mini level={1}/></div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:"white",fontWeight:700,fontSize:13,marginBottom:2}}>{d.card.name}</div>
                      <div style={{color:rc.color,fontSize:11,marginBottom:4}}>{d.card.rarity} · {d.card.type}</div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{background:"#0f172a",borderRadius:6,padding:"3px 8px",fontSize:11,color:"#94a3b8"}}>
                          ×{d.count} owned · <span style={{color:"#ef4444"}}>×{d.extras} extra</span>
                        </div>
                        <div style={{color:"#f59e0b",fontSize:11,fontWeight:700}}>💎 {d.value}</div>
                      </div>
                    </div>
                    <button onClick={()=>{SFX.play("coin");onSellOne(d.card);}} style={{background:"linear-gradient(135deg,#059669,#10b981)",color:"white",border:"none",borderRadius:8,padding:"8px 12px",fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
                      Sell 1<br/><span style={{fontSize:10,fontWeight:600}}>+💎{gv[d.card.rarity]||5}</span>
                    </button>
                  </div>
                );
              })}
            </div>
          </>
        }
      </div>
    </Modal>
  );
}

function BinderTab({unique,collection,cardLevels,setDetail,convertDupes,setDeckBuilder,setFusionModal,newCardIds=new Set(),setNewCardIds,showDupesOnly=false,setShowDupesOnly,setShowDupesModal,decks=[],onDeleteDeck}){
  const [search,setSearch]=useState("");
  const [rarityFilter,setRarityFilter]=useState("All");
  const [binderSection,setBinderSection]=useState("cards"); // cards|missing|wishlist|decks
  const [typeFilter,setTypeFilter]=useState("All");
  const [sortBy,setSortBy]=useState("rarity");
  const [wishlist,setWishlist]=useState(()=>{try{return JSON.parse(localStorage.getItem("vc_wishlist")||"[]");}catch{return [];}});
  const toggleWishlist=(cardId)=>{
    setWishlist(prev=>{
      const next=prev.includes(cardId)?prev.filter(id=>id!==cardId):[...prev,cardId];
      localStorage.setItem("vc_wishlist",JSON.stringify(next));
      return next;
    });
  };
  const countById={};collection.forEach(c=>{countById[c.id]=(countById[c.id]||0)+1;});
  const totalUnique=ALL_CARDS.length;
  const pct=Math.round(unique.length/totalUnique*100);

  const rarities=["All","Legendary","Epic","Rare","Uncommon","Common","Foil"];
  const types=["All","Alien","Robot","Knight","Mage","Dragon","Beast"];
  const rarityOrder={Legendary:0,Epic:1,Rare:2,Uncommon:3,Common:4};

  const dupeCount=Object.values(countById).filter(n=>n>1).length;
  const filtered=unique.filter(c=>{
    const q=search.toLowerCase();
    const matchSearch=!q||c.name.toLowerCase().includes(q)||c.type.toLowerCase().includes(q)||c.special.toLowerCase().includes(q)||c.description.toLowerCase().includes(q);
    const matchRarity=rarityFilter==="All"||(rarityFilter==="Foil"?c.foil:c.rarity===rarityFilter&&!c.foil);
    const matchType=typeFilter==="All"||c.type===typeFilter;
    const matchDupes=!showDupesOnly||(countById[c.id]>1);
    return matchSearch&&matchRarity&&matchType&&matchDupes;
  }).sort((a,b)=>{
    if(sortBy==="rarity") return (rarityOrder[a.rarity]??5)-(rarityOrder[b.rarity]??5);
    if(sortBy==="power") return b.power-a.power;
    if(sortBy==="name") return a.name.localeCompare(b.name);

  return(
    <div>
      {/* Header stats */}

          <div style={{color:"#64748b",fontSize:12}}>{unique.length}<span style={{color:"#334155"}}>/{totalUnique} cards</span></div>
        </div>
        {/* Progress bar */}
        <div style={{background:"#1e293b",borderRadius:999,height:6,marginBottom:4}}>
          <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#7c3aed,#a855f7)",borderRadius:999,transition:"width .5s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"#a855f7",fontSize:11,fontWeight:600}}>{pct}% complete</span>
          <span style={{color:"#334155",fontSize:10}}>{totalUnique-unique.length} more to find</span>
        </div>
      </div>

      {/* Per-rarity completion % */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {["Legendary","Epic","Rare","Uncommon","Common"].map(r=>{
          const total=ALL_CARDS.filter(c=>c.rarity===r).length;
          const owned=unique.filter(c=>c.rarity===r).length;
          const pctR=total>0?Math.round(owned/total*100):0;
          const rc2=RC[r]||{color:"#94a3b8"};
          return(
            <div key={r} style={{flex:1,minWidth:60,background:"#0f172a",border:`1px solid ${rc2.color}33`,borderRadius:8,padding:"5px 8px",textAlign:"center"}}>

            </div>

        })}
      </div>

      {/* Section tabs */}
      <div style={{display:"flex",gap:4,marginBottom:14,flexWrap:"wrap"}}>

          <button key={t.k} onClick={()=>setBinderSection(t.k)}

            {t.l}
          </button>
        ))}
      </div>

      {/* Missing Cards section */}
      {binderSection==="missing"&&(()=>{
        const ownedIds=new Set(unique.map(c=>c.id));

        const rarityOrder={Legendary:0,Epic:1,Rare:2,Uncommon:3,Common:4};

                <div style={{fontSize:48,marginBottom:10}}>🏆</div>

              :<div style={{display:"flex",flexWrap:"wrap",gap:10,padding:"8px 4px"}}>

                    <div key={i} style={{position:"relative",flexShrink:0}}>

                      </button>

              </div>
            }
          </div>
        );
      })()}

      {/* Wishlist section */}
      {binderSection==="wishlist"&&(()=>{
        const wishCards=ALL_CARDS.filter(c=>wishlist.includes(c.id));
        const ownedIds=new Set(unique.map(c=>c.id));

          <div>
            <div style={{color:"#475569",fontSize:11,marginBottom:10}}>{wishlist.length} cards on wishlist</div>
